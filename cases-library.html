与功能\n需要注意的一点是，随着当代科技，尤其是数码技术的快速发展，在很多产品上形式和功能出现了可以脱离的情况。拜技术发展所赐，苹果电脑公司的产品已可以做到简约得无以复加的地步。因此，在21世纪的技术情况下，有些门类的设计上，形式和功能的关系出现了和20世纪不同的情况。不能简单地用“形式追随功能”一言以蔽之。　二、设计的分类和范畴　英语中“设计”（design）这个词包含范围非常广泛，有些属于我们要讨论的范畴，比如产品设计，建筑、室内、景观设计，平面设计，时尚与品牌设计，交通工具设计，界面设计，游戏设计，娱乐设计等等，有些则不在我们这个范畴内，西方学术界一般将设计范围概括为：　商业性设计范畴：　商业设计（Business design）　新产品开发（New product development）　包装设计（Packaging design）　产品设计（Product design）　服务设计（Service design）　程序设计（Process design）　应用设计（Applications design）　体验设计（Experience design）　电玩设计（游戏设计，Game design）　互动设计（Interaction design）　音响互动设计（Sonic interaction design）　软件设计（Software design）　软件开发（Software development）　软件工程（Software engineering）　系统设计（System design）　用户体验设计（User experience design）　用户界面设计（User interface design）　网页可接触性设计（Web accessibility design）　网页设计（Web design）　传达设计范畴（这里指传统","教学分析":"王受之指出，数码技术使产品【形式和功能出现了可以脱离的情况】——苹果产品可以做到极度简约，不再需要以外形暗示内部功能。这宣告了【形式追随功能】这一现代主义金科玉律在数字时代的**历史性松动**：当功能被算法和界面承载，物理形式获得了前所未有的**自由度**。教师可引导：当一块玻璃板（iPhone）可以完成数十种功能，**形式**与**内容**的关系是否彻底倒转？【设计的外形】是否成为纯粹的**品牌语言**而非功能指示？","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1924年，魏玛","排序年":5000,"作品/事件名称":"包豪斯金属壶：功能优先的设计宣言","作者/设计师":"马里安·布兰特（Marianne Brandt）","来源书目":"《外国工艺美术史》","简介":"包豪斯宣示「功能第一，形式第二」，反对一切传统装饰和「多余的矫饰」，以几何形的简明为最高追求。布兰特的金属壶以球形壶体、半圆把手、全几何结构实践了这一理…","原文引用":"——《外国工艺美术史》/ 第二十一章 近代工艺美术·包豪斯时期工艺美术\n包豪斯始终坚持功能第一，形式第二。反对一切传统的痕迹与手工业的表现等多余的矫饰，它追求功能优势，追求几何形的简明。而最能体现包豪斯工艺作品风格的则是金属制品。金属壶（图21-42）即为典型例作。这是马里安-布兰特（MarianeBranat,生卒年不详）于1924年在魏玛包豪斯金属工厂制作的。茶壶的手柄是紫檀木的，壶内壁则是银制的，而壶的外壁是铜制的。从壶的立面看，壶面、壶盖与盖钮均为圆形。从壶的侧面看，壶体为半个球形，壶的把手则呈半圆形。所有部分都是规则的几何体。显然，这受到了荷兰构成主义及风格派的直接影响，所以包豪斯的产品，力求以几何图形的结构完整与平衡来进行造型，并在色彩上追求单纯明快。","教学分析":"包豪斯宣示「**功能第一，形式第二**」，反对一切传统装饰和「多余的矫饰」，以几何形的简明为最高追求。布兰特的金属壶以球形壶体、半圆把手、全几何结构实践了这一理念，明确回答了「**设计服务于谁**」：服务于**使用功能**，而非审美趣味或阶层地位。这一立场的社会含义是：优良设计应当是**民主的**——功能性产品让所有人都能以合理价格获得良好的日用品。引导学生讨论：设计做到功能优先，是否意味着放弃了美？功能与美是否必然冲突？","批注":"","标签":["3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1920年代，德绍包豪斯","排序年":5000,"作品/事件名称":"马谢·布鲁尔钢管椅：形式从材料与功能中生成","作者/设计师":"马谢·布鲁尔（Marcel Breuer）","来源书目":"《外国工艺美术史》","简介":"布鲁尔的钢管家具以「造型与结构的纯粹性」为核心：钢管承重功能恰好满足结构需求，形式由功能自然生成。他同时提出家具生产标准化——将工业逻辑…","原文引用":"——《外国工艺美术史》/ 第二十一章 近代工艺美术·包豪斯时期工艺美术\n布鲁尔是现代家具工艺的前导大师，他强调家具工艺的“造型与结构的纯粹性”，并最先提出家具生产标准化的问题。他采用钢管作为家具的主要材料，同时结合织物、木材，以及玻璃的运用，打破了模仿和因袭，所作家具造型优美，结构单纯紧凑，具有良好的功能，并利用材料和加工技术，将工艺技巧与审美的结合进行了大胆尝试(图21-44 )o布鲁尔是钢管家具的创始人，他还创立了一种“尺度单位的贮藏系统”计划，并设计了一些“标准式”家具—在设计房屋的同时设计配套的标准化家具。他的这一系列创造和设想都给在家具工厂实习的学生以极大的影响，从而使包豪斯的家具设计在欧洲获得了荣誉。","教学分析":"布鲁尔的钢管家具以「**造型与结构的纯粹性**」为核心：钢管承重功能恰好满足结构需求，**形式由功能自然生成**。他同时提出家具生产**标准化**——将工业逻辑引入家具设计，形式服从于批量生产的要求。与莫里斯「手工优先」的形式主张相比，布鲁尔代表了「**形式追随功能**」（Form follows function）原则的彻底实践。引导学生比较：莫里斯与布鲁尔都关注形式，但两人的**形式来源**截然不同——一个来自传统美学，一个来自材料与功能逻辑。","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1870年代—1880年代","排序年":5000,"作品/事件名称":"印象主义——以户外写生颠覆学院褐色调传统","作者/设计师":"莫奈、雷诺阿、德加等","来源书目":"《外国美术简史》","简介":"印象主义的革命性在于户外直接写生——以画家眼睛的当下感受替代学院派沿用三百年的褐色暗调传统。他们不仅改变了技法，更根本地改变了绘画的认识论*…","原文引用":"——《外国美术简史》/ 第五章 19世纪欧洲美术·第四节 印象主义\n究和表现。印象主义画家提倡户外写生，直接描 绘在阳光下的物象，从而摒弃了从16世纪以来变 化甚微的褐色调子,并根据画家自己眼睛的观察 和直接感受，表现微妙的色彩变化。在这方面， 印象主义画家还从荷兰小画派、西班牙画家委 拉斯贵支、英国画家特纳和康斯太勃尔等人那 里接受了有益的经验。","教学分析":"印象主义的革命性在于**户外直接写生**——以画家眼睛的当下感受替代学院派沿用三百年的**褐色暗调传统**。他们不仅改变了技法，更根本地改变了绘画的**认识论**：从『画应该是什么样』转向『画家此刻看到了什么』。荷兰小画派、委拉斯贵支、英国风景画提供的养分表明，**传统并非障碍，而是可以选择性继承的资源**。教师可问：印象主义拒绝的是哪种传统？又在无意识中继承了哪些传统？","批注":"","标签":["2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1880年代—1900年代","排序年":5000,"作品/事件名称":"后印象主义对印象主义的否定与超越","作者/设计师":"塞尚、凡高、高更","来源书目":"《外国美术简史》","简介":"林风眠将后印象主义译为『反印象主义』，精准揭示了它与前者的批判性张力：后印象主义并非抛弃印象主义，而是在充分吸收其光色探索的基础上，转向结构、情感与…","原文引用":"——《外国美术简史》/ 第五章 19世纪欧洲美术·第四节 后印象主义\n和追求从本质上说是对印象主义的否定，所以 林风眠曾经将它译成“反印象主义” o后印象主 义直接影响了 20世纪初法国画坛几乎同时出现 的两大新思潮：注重画面结构的立体主义（受塞 尚的启发）和注重色彩、线条动力与节奏的野兽 主义（受凡高和高更的影响）。","教学分析":"林风眠将后印象主义译为『反印象主义』，精准揭示了它与前者的**批判性张力**：后印象主义并非抛弃印象主义，而是在充分吸收其光色探索的基础上，转向**结构、情感与象征**的更深层追求。这正是**继承与创新**辩证法的教科书式案例——没有印象主义的写生传统，就没有塞尚对体积的重建、没有凡高对线条的爆发。教师可引导：一次真正的艺术创新，是否必然包含对前驱的**否定性继承**？","批注":"","标签":["2.2 继承与创新"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1860年代","排序年":5000,"作品/事件名称":"马奈与官方沙龙——精英审查制度与新艺术的冲突","作者/设计师":"爱德华·马奈","来源书目":"《外国美术简史》","简介":"马奈的作品因构思大胆、手法新颖而遭官方沙龙拒绝，却获得波德莱尔和左拉等批评家的热情赞扬。这一对峙清晰揭示了精英审查机制（学院沙龙）与新兴艺术…","原文引用":"——《外国美术简史》/ 第五章 19世纪欧洲美术·第四节 印象主义·马奈\n但因构思的大胆和手法的新颖而遭官方沙龙拒 绝。不过他杰出的艺术才能却受到波德莱尔和 左拉等人的热情赞扬。他在19世纪60年代初创 作的油画《老乐师》、《弹吉他的人》、《穿西班画摆脱文学的影响，更多地注意绘画语言本身。 在印象主义内部存在着两种类型的画家群：一 是以莫奈为代表，一是以德加为代表。前者偏重 于色彩的表现力，后者仍对古典素描造型有所 迷恋。当然也有画家介于这两种类型之间。","教学分析":"马奈的作品因构思大胆、手法新颖而遭**官方沙龙**拒绝，却获得波德莱尔和左拉等批评家的热情赞扬。这一对峙清晰揭示了**精英审查机制**（学院沙龙）与**新兴艺术话语**（前卫批评家）之间的权力博弈。谁有权决定什么是好艺术？**学院权威**代表的是公众趣味还是少数权贵的品味？教师可引导学生思考：当代艺术世界中类似的【沙龙制度】以何种形式存在？大众审美与**精英批评标准**的关系是否改变了？","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1880年代—1890年代","排序年":5000,"作品/事件名称":"新印象主义色点实验——形式语言走向自律","作者/设计师":"修拉等新印象主义画家","来源书目":"《外国美术简史》","简介":"新印象主义将色彩与光的科学分析推向极致，其对纯粹形式语言的探索【为绘画中的形式主义和抽象主义开创了先河】。这说明形式并不天然为内容（叙事/功…","原文引用":"——《外国美术简史》/ 第五章 19世纪欧洲美术·第四节 新印象主义\n色彩和光，也必然为绘画中的形式主义和抽象 主义开创了先河。　二、新印象主义三、后印象主义第五章19世纪欧洲及美国美术175修拉还和一群年轻画家于1884年组织了不需审 查作品的“独立画家协会二他的代表作,也是新 印象主义中最典型的作品是《大碗岛星期天的下 午》(彩插-21)。1887年之后，修拉越来越注重用 一种图式来表现自己的观念和情绪，作品的理性 精神很强，反映出某种程式化的倾向。这时期的 重要作品是《骚动》、《游行》和《马戏团》O原来学建筑的西涅克，与修拉密切合作，共 同进行色彩分割理论和实践的探索，创造点彩 派的体系。西涅克著有《从德拉克洛瓦到新印象 主义》，这是一本系统阐述新印象主义理论的著 作。除创作油画作品外，他还是一位出色的水彩 画家。建筑在科学理论和理性基础上的新印象 主义，在某些方面恢复了绘画中物象的具体性、 实在性，在色彩分析方面有所探索，但由于过分 注重法则和规则，也使绘画丧失了可贵的直观生 动性。","教学分析":"新印象主义将色彩与光的科学分析推向极致，其对**纯粹形式语言**的探索【为绘画中的形式主义和抽象主义开创了先河】。这说明**形式**并不天然为**内容（叙事/功能）服务**，一旦形式语言被赋予独立价值，它本身即成为目的。这是西方现代艺术走向**形式自律**的关键节点。教师可引导学生思考：当一幅画的主题（【画了什么】）变得不重要，**如何看画**的方式会发生什么改变？这对设计领域的**形式主义**有何启示？","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1860年代","排序年":5000,"作品/事件名称":"马奈与官方沙龙——精英审查制度与新艺术的冲突","作者/设计师":"爱德华·马奈","来源书目":"《外国美术简史》","简介":"官方沙龙是19世纪法国艺术的权威准入机构，它决定了哪些作品能被公众看见、哪些艺术家能获得国家认可——本质上是在定义艺术服务于谁的审美标准。马奈被…","原文引用":"——《外国美术简史》/ 第五章 19世纪欧洲美术·第四节 印象主义·马奈\n但因构思的大胆和手法的新颖而遭官方沙龙拒 绝。不过他杰出的艺术才能却受到波德莱尔和 左拉等人的热情赞扬。他在19世纪60年代初创 作的油画《老乐师》、《弹吉他的人》、《穿西班画摆脱文学的影响，更多地注意绘画语言本身。 在印象主义内部存在着两种类型的画家群：一 是以莫奈为代表，一是以德加为代表。前者偏重 于色彩的表现力，后者仍对古典素描造型有所 迷恋。当然也有画家介于这两种类型之间。","教学分析":"官方沙龙是19世纪法国艺术的**权威准入机构**，它决定了哪些作品能被公众看见、哪些艺术家能获得国家认可——本质上是在定义**艺术服务于谁的审美标准**。马奈被拒绝，意味着他的视觉语言拒绝服务于保守的贵族与上层中产趣味。而波德莱尔和左拉的赞扬，则代表了另一种**批评权力的重新分配**。教师可引导：在当代，谁担当了\"沙龙\"的角色？**策展人、算法平台、艺术博览会**是否以不同形式续写着同一问题——艺术究竟服务于谁的眼睛？","批注":"","标签":["3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1920年代，德绍包豪斯","排序年":5000,"作品/事件名称":"马谢·布鲁尔钢管椅：形式从材料与功能中生成","作者/设计师":"马谢·布鲁尔（Marcel Breuer）","来源书目":"《外国工艺美术史》","简介":"布鲁尔在包豪斯期间设计的钢管椅，在精神上继承了工艺与艺术运动关于功能诚实性的坚持，但在材料与工艺上做出了根本性的创新——将金属工业管材引入家具设…","原文引用":"——《外国工艺美术史》/ 第二十一章 近代工艺美术·包豪斯时期工艺美术\n布鲁尔是现代家具工艺的前导大师，他强调家具工艺的“造型与结构的纯粹性”，并最先提出家具生产标准化的问题。他采用钢管作为家具的主要材料，同时结合织物、木材，以及玻璃的运用，打破了模仿和因袭，所作家具造型优美，结构单纯紧凑，具有良好的功能，并利用材料和加工技术，将工艺技巧与审美的结合进行了大胆尝试(图21-44 )o布鲁尔是钢管家具的创始人，他还创立了一种“尺度单位的贮藏系统”计划，并设计了一些“标准式”家具—在设计房屋的同时设计配套的标准化家具。他的这一系列创造和设想都给在家具工厂实习的学生以极大的影响，从而使包豪斯的家具设计在欧洲获得了荣誉。","教学分析":"布鲁尔在包豪斯期间设计的钢管椅，在精神上**继承了工艺与艺术运动关于功能诚实性的坚持**，但在材料与工艺上做出了根本性的**创新**——将金属工业管材引入家具设计，创造出一种全新的视觉与结构语言。这正是**继承与创新**最典型的路径：目标不变（功能诚实、形式简洁），但实现手段与材料完全颠覆。教师可问：布鲁尔是在\"背叛\"莫里斯，还是在以更彻底的方式实现莫里斯的原则？**媒介的更换**是否总意味着精神的背离？","批注":"","标签":["2.2 继承与创新"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1880年代—1890年代","排序年":5000,"作品/事件名称":"新印象主义色点实验——形式语言走向自律","作者/设计师":"修拉等新印象主义画家","来源书目":"《外国美术简史》","简介":"修拉的分色法（点彩法）以谢弗勒尔色彩理论和光学混色原理为直接依据：相邻色点在视网膜上自动混合的现象，取代了调色盘上的颜料混合。这是19世纪科学主…","原文引用":"——《外国美术简史》/ 第五章 19世纪欧洲美术·第四节 新印象主义\n色彩和光，也必然为绘画中的形式主义和抽象 主义开创了先河。　二、新印象主义三、后印象主义第五章19世纪欧洲及美国美术175修拉还和一群年轻画家于1884年组织了不需审 查作品的“独立画家协会二他的代表作,也是新 印象主义中最典型的作品是《大碗岛星期天的下 午》(彩插-21)。1887年之后，修拉越来越注重用 一种图式来表现自己的观念和情绪，作品的理性 精神很强，反映出某种程式化的倾向。这时期的 重要作品是《骚动》、《游行》和《马戏团》O原来学建筑的西涅克，与修拉密切合作，共 同进行色彩分割理论和实践的探索，创造点彩 派的体系。西涅克著有《从德拉克洛瓦到新印象 主义》，这是一本系统阐述新印象主义理论的著 作。除创作油画作品外，他还是一位出色的水彩 画家。建筑在科学理论和理性基础上的新印象 主义，在某些方面恢复了绘画中物象的具体性、 实在性，在色彩分析方面有所探索，但由于过分 注重法则和规则，也使绘画丧失了可贵的直观生 动性。","教学分析":"修拉的分色法（点彩法）以**谢弗勒尔色彩理论**和**光学混色原理**为直接依据：相邻色点在视网膜上自动混合的现象，取代了调色盘上的颜料混合。这是19世纪科学主义进入绘画实践的最极端案例——画家将自己定位为**视觉科学的实验者**。与达芬奇以解剖学服务于造型不同，修拉让科学直接成为**形式生成的规则本身**。教师可引导：当科学规律决定了绘画的每一笔，**艺术家的主观性**还剩多少？这与今天**算法生成图像**有何哲学上的相似之处？","批注":"","标签":["4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1924年，魏玛","排序年":5000,"作品/事件名称":"包豪斯金属壶：功能优先的设计宣言","作者/设计师":"马里安·布兰特（Marianne Brandt）","来源书目":"《外国工艺美术史》","简介":"包豪斯的设计宣言\"功能决定形式\"（Form follows Function）在布兰特的金属壶中得到完美体现：球形壶身来自于最大容积与最小散热面积的热工…","原文引用":"——《外国工艺美术史》/ 第二十一章 近代工艺美术·包豪斯时期工艺美术\n包豪斯始终坚持功能第一，形式第二。反对一切传统的痕迹与手工业的表现等多余的矫饰，它追求功能优势，追求几何形的简明。而最能体现包豪斯工艺作品风格的则是金属制品。金属壶（图21-42）即为典型例作。这是马里安-布兰特（MarianeBranat,生卒年不详）于1924年在魏玛包豪斯金属工厂制作的。茶壶的手柄是紫檀木的，壶内壁则是银制的，而壶的外壁是铜制的。从壶的立面看，壶面、壶盖与盖钮均为圆形。从壶的侧面看，壶体为半个球形，壶的把手则呈半圆形。所有部分都是规则的几何体。显然，这受到了荷兰构成主义及风格派的直接影响，所以包豪斯的产品，力求以几何图形的结构完整与平衡来进行造型，并在色彩上追求单纯明快。","教学分析":"包豪斯的设计宣言\"**功能决定形式**\"（Form follows Function）在布兰特的金属壶中得到完美体现：球形壶身来自于最大容积与最小散热面积的热工学计算，而非装饰意志。这是西方设计史上**形式彻底从属于功能**的宣言性案例。与莫里斯的\"手工形式具有道德优越性\"相对，包豪斯的回答是：**功能自身即是形式的合法性来源**。教师可问：一把完全按功能设计的壶，是否仍然具有审美？当代产品设计中，功能与审美是否真的可以分离？","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1960年代末","排序年":5000,"作品/事件名称":"帕帕纳克《为真实世界的设计》——设计目的性的重新定义","作者/设计师":"维克多·帕帕纳克（Victor Papanek）","来源书目":"《世界现代设计史》","简介":"帕帕纳克揭示了1960年代设计界的根本性错位：设计师从【社会工程师】角色蜕变为商业附庸，设计本体（设计是什么、为了什么）被消费主义覆盖。他质问的正是设计的本…","原文引用":"——《世界现代设计史》/ 第十四章 走向可持续：设计与社会责任\n1960年代，西方的现代设计发展得特别迅速，同时，美国的消费主义泛滥亦在环境、安全方面造成恶劣的负面影响。城市蔓延，漫无边际，全民从公共交通转而依赖私人汽车，耗费能源、污染环境。设计上片面追求奢华效果，甚至无视产品安全性，而设计师也从本来的社会工程师角色转而追求高额收入，无原则地讨好大企业、大集团。有良心的设计工作者在大潮流前面集体噤声，社会良知严重缺失。针对这种局面，美国设计理论家维克多·帕帕纳克（Victor Papanek, 1923—1998）在1960年代末出版了《为真实世界的设计：人类生态和社会变化》（Design For The Real World: Human Ecology and Social Change　 ），用犀利的语言、尖锐的批评洞察力，严谨地提出了对于设计目的性的新看法。明确提出了三个重要的原则：　①设计应该为广大人民服务，而不是为少数富裕国家服务。在这里，他特别强调设计应该为第三世界的人民服务。","教学分析":"帕帕纳克揭示了1960年代设计界的根本性错位：设计师从【社会工程师】角色蜕变为商业附庸，设计本体（设计是什么、为了什么）被消费主义覆盖。他质问的正是设计的**本体与客体**关系——设计的客体究竟是【商业利润】还是【社会整体】？这一追问直指现代设计的核心悖论：技术和美学能力越强，对错误目的的服务就越有效率。教师可问：今天AI辅助设计工具的强大，是否加剧了同样的风险——**工具的中立性**是否掩盖了**目的的偏差**？","批注":"","标签":["1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1933年—1950年代","排序年":5000,"作品/事件名称":"包豪斯关闭→人才移居美国→国际主义风格全球扩散","作者/设计师":"格罗皮乌斯、米斯·凡·德·罗等包豪斯教师群体","来源书目":"《世界现代设计史》","简介":"包豪斯1933年被强制关闭，却以另一种方式延续：核心人物流亡美国，将欧洲现代主义设计思想移植到新土壤，并借助美国的经济实力，演变为影响全球的国际主义风格…","原文引用":"——《世界现代设计史》/ 第七章 包豪斯与现代主义设计的确立\ny）、室内设计、摄影、艺术等方面都为现代设计教育体系奠定了基础，并将欧洲的现代主义设计运动推上一个空前的高度。包豪斯发展过程中，前期是德国地方政府的公立性质的学校，先后分别由魏玛政府、德绍地方政府拨款维持；到1930年，在当地右倾势力的胁迫下，学校被迫迁去柏林，并变成私立性质的。虽然这所学院在1933年4月被纳粹政府强行关闭了，但是，它对于现代设计教育的影响却是巨大而难以估量的。1930年代末期，包豪斯的主要领导人物和大批学生、教员因为逃避欧洲的战火和纳粹法西斯的政治迫害而移居到美国，从而把他们在欧洲进行的设计探索，以及欧洲现代主义设计思想也带到了新大陆。第二次世界大战结束以后，通过他们的教育和设计实践，以美国经济的强大实力为依托，终于把包豪斯的影响发展成一种新的设计风格——“国际主义”风格，从而影响到全世界。","教学分析":"包豪斯1933年被强制关闭，却以另一种方式延续：核心人物流亡美国，将欧洲现代主义设计思想移植到新土壤，并借助美国的经济实力，演变为影响全球的**国际主义风格**。这是设计史上最有力的**联系与发展**案例之一——政治压制切断了一个机构，却无意间将其思想播散至全球。教师可引导学生思考：**历史的断裂**与**思想的传播**之间常常存在悖论关系。今天哪些设计运动正经历类似的【强制扩散】？","批注":"","标签":["1.3 联系与发展"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1917年起","排序年":5000,"作品/事件名称":"风格派（De Stijl）——纯粹抽象语言进入设计领域","作者/设计师":"蒙德里安、凡·杜斯伯格等风格派艺术家/设计师","来源书目":"《世界现代设计史》","简介":"荷兰风格派以水平线、垂直线与三原色为唯一语言，彻底排除具象元素，将绘画中的抽象直接引入家具、建筑、平面等设计领域。蒙德里安的方格与红黄蓝成为20…","原文引用":"——《世界现代设计史》/ 第六章 欧洲现代主义设计运动·荷兰风格派\n第一次世界大战期间，荷兰作为中立国逃脱了战争的蹂躏，同时，作为一个中立国，它为各国艺术家、设计家提供了一个庇护所，很多艺术家，特别是前卫艺术家在战争期间都来荷兰避难，因而一时人才济济。比如比利时艺术家乔治·凡通格卢（Georges Vantongerloo, 1886—1965），在德国入侵比利时期间作为难民逃到荷兰；皮埃特·蒙德里安（Piet Mondrian, 1872—1944）与罗伯特·凡德·霍夫（Robert van't Hoff, 1887—1979）战前在巴黎和伦敦工作，因为战争也逃入荷兰。由于战争的原因，荷兰与外界在战时完全隔绝，因此基本没有可能与欧洲其他国家联系，这批艺术家和设计家在完全隔绝的情况下，开始从单纯荷兰的文化传统本身寻找参考，发展自己的新艺术。他们对于荷兰这个小工业国的文化、设计、审美观念进行研究，深入探索和分析，从中找寻自己感兴趣的内容。利用这个条件，杜斯伯格得以发展“荷兰对于现代主义的贡献”。他们在此期间发展出的新风格具有以下几个鲜明的特征：　①把传统的建筑、家具和产品设计、绘画、雕塑的特征完全剥除，变成最基本的几何结构单体，或者称为“元素”（element）；　②把这些几何结构单体，或者“元素”进行组合，形成简单的结构组合，但是，在新的结构组合当中，单体依然保持相对独立性和鲜明的可视性；　③对于非对称性的深入研究与运用；　④对于纵横几何结构，以及基本原色和中性色非常特别的反复运用。","教学分析":"荷兰风格派以**水平线、垂直线与三原色**为唯一语言，彻底排除具象元素，将绘画中的**抽象**直接引入家具、建筑、平面等设计领域。蒙德里安的方格与红黄蓝成为20世纪设计语汇中最持久的视觉基因之一。风格派证明：**抽象不是艺术的回避，而是视觉本质的提炼**——去掉具体叙事后剩下的，才是形式语言最纯粹的骨架。教师可问：为何**格子与三原色**在百年后仍然出现在大量商业设计中？**抽象符号**与**品牌识别**之间有什么内在联系？","批注":"","标签":["1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1960年代末","排序年":5000,"作品/事件名称":"帕帕纳克三原则——设计为第三世界、残疾人和地球资源服务","作者/设计师":"维克多·帕帕纳克（Victor Papanek）","来源书目":"《世界现代设计史》","简介":"帕帕纳克以三条原则重新定义了设计的服务对象：第三世界人民、残疾人、地球资源——三者都是被主流消费设计系统性忽视的群体与议题。这一宣言因此被视为异端而遭美…","原文引用":"——《世界现代设计史》/ 第十四章 走向可持续：设计与社会责任\n他的这几个观点阐明了自从现代设计出现以来，一些一直被忽视的重要因素。第一次提出设计必须从国际主义的立场来考虑，为第三世界国家人民服务；也是第一次明确提出为残疾人设计的问题；更加重要的是，他提出了设计应考虑地球资源有限这个要点，对于这一点当时能够了解的人并不多，但是，自从1970年代初期爆发世界能源危机以来，帕帕纳克的有限资源观点得到普遍的认同。　这本著作出版以后，立即被翻译成20多国文字，影响深远。在消费社会、丰裕社会、波普设计的高潮时，这本书非常冷静地为人们敲响了警钟：设计的目的性必须明确，设计必须为社会整体服务。帕帕纳克的理论被当时的美国设计界视为异端，1991年他在洛杉矶曾亲口告诉我：因为这本书，他在1960年代末被美国工业设计师协会开除，理由是他在设计理论上的“危言耸听”。当时美国设计界的本位主义和保守程度，真是令人难以想象。","教学分析":"帕帕纳克以三条原则重新定义了设计的服务对象：**第三世界人民、残疾人、地球资源**——三者都是被主流消费设计系统性忽视的群体与议题。这一宣言因此被视为异端而遭美国工业设计师协会开除，折射出当时设计界的**服务对象默认值**：富裕国家的有购买力消费者。帕帕纳克的问题至今未过时：当设计由**市场逻辑**驱动，谁来为没有购买力的人设计？教师可引导：今天的**通用设计**（Universal Design）、**包容性设计**是否真正接续了帕帕纳克的追问？","批注":"","标签":["3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1980年代","排序年":5000,"作品/事件名称":"日本战后平面设计——在全球化与民族性之间找到结合点","作者/设计师":"日本战后平面设计师群体","来源书目":"《世界现代设计史》","简介":"日本战后设计的成就在于找到了一条可复制的路径：不亦步亦趋地跟随西方，而是在国际风格与民族设计之间寻找结合可能。民族绘画、书法、色彩计划、审美立场——这些…","原文引用":"——《世界现代设计史》/ 第十三章 亚洲现代设计·日本平面设计\n日本战后开始发展起来的现代平面设计，经过40年的发展，到1980年代末，已经成为非常成熟的设计体系。日本与欧洲、美国的设计联系相当密切，在现代艺术、现代设计、现代文化等方面，日本亦受到西方文化的深刻影响。重要的是日本的设计家并没有对西方的设计亦步亦趋，而是在国际风格、流行的西方风格与日本的民族设计中找寻结合的可能性。战后开始的日本现代设计发展过程，表明这个探索是成功的，民族绘画、民族传统设计风格、民族文化观念、民族的色彩计划、民族的审美立场、民族的文字（特别是书法）等等，都能够在一定水平上得到保存和发展，通过与现代设计的结合，得到国际的承认。日本平面设计的发展，还对许多远东的亚洲国家和地区，比如韩国、中国台湾、中国香港、新加坡等，产生了深刻的影响，促进了这个地区平面设计的新发展。","教学分析":"日本战后设计的成就在于找到了一条可复制的路径：**不亦步亦趋地跟随西方，而是在国际风格与民族设计之间寻找结合可能**。民族绘画、书法、色彩计划、审美立场——这些在地元素以一种不排斥现代性的方式被保存。结果是：日本设计不仅获得国际认可，还对韩国、台湾、香港、新加坡等地设计产生深远影响。教师可引导：为何日本能做到而许多地区未能成功？**文化自信**在**全球化**压力下的设计实践中扮演着怎样的角色？","批注":"","标签":["5.2 全球化与在地性"],"image":"","link":"","importance":0},{"类别":"国外","年代":"维也纳分离派（1897年起）","排序年":5000,"作品/事件名称":"维也纳分离派——克里姆特与功能装饰","作者/设计师":"古斯塔夫·克里姆特","来源书目":"《世界现代设计史》","简介":"氛围非常吻合。约瑟夫·霍夫曼（Josef Hoffmann, 1870—1956）和科罗曼·莫瑟（Koloman Moser, 1868—1918）都是维也纳“分离派”运动的主将，霍夫曼是建筑师，而莫瑟是平面设计家，他们在1903年合作设计的普科斯多夫椅子（Purkesdorf），用白色、黑色几何图案设计坐垫，是“分离…","原文引用":"氛围非常吻合。约瑟夫·霍夫曼（Josef Hoffmann, 1870—1956）和科罗曼·莫瑟（Koloman Moser, 1868—1918）都是维也纳“分离派”运动的主将，霍夫曼是建筑师，而莫瑟是平面设计家，他们在1903年合作设计的普科斯多夫椅子（Purkesdorf），用白色、黑色几何图案设计坐垫，是“分离派”著名的作品之一。他们的其他几件设计作品也都很成功：约瑟夫·霍夫曼1904年设计的平扁刀叉具（flat model），由奥地利的维也纳工作同盟（Wiener Werkstatte）从1904年开始出品；同年，霍夫曼设计了银器水果盘（fruit bowl），也是由奥地利的维也纳工作同盟出品的，1970年后转为佛兰兹公司（Franz Mobelwerkstatten）出品。果盘好像个大汤盘，周边是方格形的托栅，具有强烈的“分离派”的特色。这些产品都是工业设计萌芽时期具有代表性的作品，已经成为博物馆、收藏家们珍爱的收藏品了。","教学分析":"","批注":"","标签":["1.2 二元与多元","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国外","年代":"德意志制造联盟（1907年起）","排序年":5000,"作品/事件名称":"德意志制造联盟——艺术与工业的调解","作者/设计师":"穆特修斯；彼得·贝伦斯","来源书目":"《世界现代设计史》","简介":"德意志制造联盟力图调解艺术（个性）与工业（标准化）的矛盾，贝伦斯为AEG设计的系统性企业形象是世界上最早的\"企业识别\"实践。","原文引用":"","教学分析":"","批注":"","标签":["1.2 二元与多元","4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"俄国构成主义（1917年后）","排序年":5000,"作品/事件名称":"俄国构成主义——革命艺术为社会服务","作者/设计师":"罗德钦科等","来源书目":"《世界现代设计史》","简介":"三、俄国构成主义设计运动　四、荷兰的“风格派”运动　第六章　工业设计的兴起　一、美国工业设计发展的背景和概况　二、美国工业设计先驱人物　三、制造业对美国现代设计的影响　四、美国现代工业设计的重要推手——大型展览和博览会　第七章　消费时代的设计　一、战后重建时期的产品设计　二、工业设计体制的形成　三、工业设计在联邦德国的…","原文引用":"三、俄国构成主义设计运动　四、荷兰的“风格派”运动　第六章　工业设计的兴起　一、美国工业设计发展的背景和概况　二、美国工业设计先驱人物　三、制造业对美国现代设计的影响　四、美国现代工业设计的重要推手——大型展览和博览会　第七章　消费时代的设计　一、战后重建时期的产品设计　二、工业设计体制的形成　三、工业设计在联邦德国的确立　四、美国战后工业产品设计——“世纪中叶”（Mid-Century）设计浪潮　五、批判设计理论的形成　六、人体工程学的发展　七、建筑上的“国际主义”风格　八、战后平面设计的发展","教学分析":"","批注":"","标签":["3.2 服务于谁","4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"孟菲斯（1981年，意大利）","排序年":5000,"作品/事件名称":"索特萨斯与孟菲斯——后现代设计的反叛","作者/设计师":"埃托雷·索特萨斯","来源书目":"《世界现代设计史》","简介":"在其中文名称后面附加了原文名称，比如：“新艺术”运动，用“Art Nouveau”标明；“装饰艺术运动”，用“Art Deco”标明；意大利的“激进设计”集团“孟菲斯”，用“Memphis”标明；日文中的汉字中国读音和日本读音完全不同，比如深泽直人，读音是Fukasawa Naoto，因此全部用罗马拼音注出。中文索引是…","原文引用":"在其中文名称后面附加了原文名称，比如：“新艺术”运动，用“Art Nouveau”标明；“装饰艺术运动”，用“Art Deco”标明；意大利的“激进设计”集团“孟菲斯”，用“Memphis”标明；日文中的汉字中国读音和日本读音完全不同，比如深泽直人，读音是Fukasawa Naoto，因此全部用罗马拼音注出。中文索引是最费时费力的部分，人物的姓名排列中西是颠倒的：东亚人姓在前，名在后；西方人刚刚相反，名在前，姓在后。本书划一把姓放在前面，名放在后面，做统一的索引。在西方的出版物中，根据西方人的习惯，把远东人物的姓名排列按照他们的习惯——姓在后、名在前排列，在本书索引中，给予统一处理，无论西方人还是亚洲人，姓在前，名在后，便于查找。","教学分析":"","批注":"","标签":["1.2 二元与多元","4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"信息时代（1984年至今）","排序年":5000,"作品/事件名称":"数字时代的界面设计——从GUI到移动端","作者/设计师":"苹果公司等","来源书目":"《世界现代设计史》","简介":"麦金塔的图形用户界面（GUI，1984）将计算机从工程师工具变为大众消费品，手机触屏界面进一步模糊硬件与软件、物质设计与非物质体验的边界。","原文引用":"","教学分析":"","批注":"","标签":["4.3 媒介、材料与内容","1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1746年","排序年":1746,"作品/事件名称":"巴托《统一原理下的美的艺术》——\"美的艺术\"与\"实用艺术\"的历史分野","作者/设计师":"Charles Batteaux（巴托，1713—1780）","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第二章·2.1 美术与工艺的分离\n1746年，法国哲学家巴托出版了《被归结为统一原理的美的艺术》，将绘画、雕塑、建筑、音乐和诗歌归为\"美的艺术\"（beaux-arts），以\"制造快乐\"为其共同原则，并与以实用为目的的\"工艺\"（mechanical arts）明确区分。这是欧洲思想史上第一次将\"美的艺术\"作为一个独立文化领域加以系统界定，奠定了近代\"美术\"概念的基础。自此，艺术创作被视为心智劳动而非手工技艺，\"美术\"与\"工艺\"之间的等级划分正式确立。","教学分析":"巴托1746年的分类体系是西方近代\"美术\"概念的起点：**绘画、雕塑、音乐、诗歌、舞蹈**被纳入\"美的艺术\"，而陶瓷、纺织、金工等**实用工艺**则被排除在外。这一分野的核心标准是**目的**——美的艺术以\"快乐\"为目的，工艺以\"实用\"为目的。教师可引导学生思考：这条分界线是否合理？**中国传统中工艺与美术的关系**是否也适用同一逻辑？这一历史分类如何影响了今天我们对\"设计\"与\"艺术\"的理解？","批注":"","标签":["1.2 二元与多元"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1872年","排序年":1872,"作品/事件名称":"日本引入\"美术\"概念参加维也纳世博会","作者/设计师":"明治政府","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第二章·2.1 美术与工艺的分离\n日本是东亚第一个接受西方\"fine arts\"概念的国家。1872年明治政府为参加维也纳世博会，首次以\"美术\"（bijutsu）一词来对应西方语境中的\"fine arts\"，将绘画、雕塑等与工艺品分类展出。这一译语随后经由日本传入中国，成为近代汉语中\"美术\"概念的来源。西方近代的艺术等级制度，由此进入东亚文化语境，对中国20世纪的艺术教育与批评体系产生了深远影响。","教学分析":"**\"美术\"并非中国原有概念**，而是明治维新时期由日本引介的西方译词。这一\"概念移植\"的过程揭示了**文化概念如何跨越语言与地域流动**，以及**现代化过程中的知识转译**问题。值得讨论的是：以西方\"beaux-arts\"为模板建立的\"美术\"概念，是否适用于中国传统艺术（如书法、篆刻）的语境？**概念的引入是否同时带来了价值判断的转移**，将原本不分高下的艺术/工艺实践重新排列了等级？","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1956年","排序年":1956,"作品/事件名称":"威茨《美学中理论的作用》——艺术的\"开放概念\"论","作者/设计师":"Morris Weitz（威茨，1916—1981）","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第二章·2.4 重新定义艺术的尝试\n威茨在1956年发表的论文中指出，\"艺术\"是一个开放性概念（open concept），任何试图给出必要条件与充分条件的封闭定义都将失败。他认为，艺术实践始终在不断扩展，每一次前卫运动都在挑战既有的艺术定义；正因如此，\"艺术\"不可能被穷尽地定义，它更像维特根斯坦所说的\"家族相似\"（family resemblance）——不同的艺术形式之间存在重叠交错的相似性，而非共享某一本质特征。","教学分析":"威茨的论文是20世纪美学的重要转折点：他将维特根斯坦的**语言哲学**引入艺术定义问题，主张\"艺术\"概念**不可封闭定义**。这一立场既是对传统美学（形式论、表现论、摹仿论）的挑战，也为此后的**制度论**（Dickie）和**历史论**（Levinson）铺路。教师可用以下问题激发讨论：**如果艺术没有本质，艺术批评的标准从哪里来？** 如何判断一件争议性作品（如杜尚的小便器）是否是艺术？","批注":"","标签":["1.1 本体与客体"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1964年","排序年":1964,"作品/事件名称":"丹托\"艺术界\"理论与艺术的制度定义","作者/设计师":"Arthur Danto（丹托，1924—2013）；George Dickie（迪基，1926—）","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第二章·2.4 重新定义艺术的尝试\n丹托于1964年提出\"艺术界\"（artworld）概念，认为使一件物品成为艺术品的，不是它的物理属性或美学特征，而是它所处的**制度性背景**——即它是否被置于艺术理论和艺术史的氛围中加以呈现。迪基在此基础上发展出\"制度论\"，认为艺术品是\"被艺术界的某个代表人物代表艺术界赋予欣赏资格的人工制品\"。这一定义将艺术的边界从形式/感官转向**社会认可机制**。","教学分析":"丹托和迪基的制度论将\"什么是艺术\"的问题从审美判断转向**权力与制度**：是博物馆、策展人、评论家和艺术史家共同构成的\"**艺术界**\"，决定了某物是否具有艺术资格。这一理论既能解释**杜尚的现成品**（artworld赋予其地位），也引出争议：**艺术界是否存在门槛？** 谁有资格加入艺术界？这对于讨论**当代艺术的合法性**和**民间艺术的边界**极具启发意义。","批注":"","标签":["1.1 本体与客体"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1859年","排序年":1859,"作品/事件名称":"波德莱尔《现代公众与摄影》——摄影对绘画的挑战与诗人的抵抗","作者/设计师":"Charles Baudelaire（波德莱尔，1821—1867）","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第六章·6.4 绘画与摄影\n1839年摄影术发明后，关于摄影是否属于艺术的争论迅速展开。波德莱尔在1859年评论沙龙时，对摄影术提出了严厉批判：他认为摄影只是工业的产物，是科学对艺术领域的侵入；摄影若被允许进入艺术领域，将成为艺术最大的敌人。在他看来，**艺术依赖想象与个性，而摄影只是对现实的机械复制，无法超越所见**。波德莱尔同时也承认摄影作为文献和科学工具的价值，但坚决拒绝将其纳入艺术范畴。","教学分析":"摄影术的发明是19世纪最重要的媒介事件，它从根本上改变了\"**再现**\"的含义。波德莱尔的批判代表了**精英主义**对机械复制的抵抗：绘画是心智与情感的产物，摄影不过是精确的镜子。然而历史证明，**摄影最终获得了艺术地位**，并催生了绘画从再现走向抽象的解放。教师可引导讨论：**新技术如何改变艺术的本质？** 今天类似的问题是否在AI生成图像上重演？","批注":"","标签":["4.2 艺术与科学"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1914年","排序年":1914,"作品/事件名称":"克莱夫·贝尔《艺术》——\"有意味的形式\"理论","作者/设计师":"Clive Bell（克莱夫·贝尔，1881—1964）","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第七章·7.3 有意味的形式\n贝尔在1914年出版的《艺术》中提出，所有视觉艺术作品之中存在一种能够激发审美情感的共同性质，他将其称为\"有意味的形式\"（significant form）——即线条、色彩的关系与组合，而非再现内容或叙事意义。贝尔认为，真正的艺术欣赏者所感受到的不是对现实的描绘，而是**纯粹的形式关系所激发的审美激情**。他以后印象主义绘画为范例：塞尚的画面在形式构成上胜过对自然的忠实再现。","教学分析":"贝尔的\"有意味的形式\"是20世纪**形式主义美学**的核心命题：评价艺术的唯一标准是**形式关系**，与内容、故事、道德无关。这一理论使人们重新理解了**从印象主义到抽象艺术**的演变逻辑——绘画的自律性建立在形式而非内容之上。但贝尔的理论也有局限：它如何处理**语境意义**（如宗教绘画、政治宣传画）？**形式与内容可以真正分离吗**？这是引导学生批判性阅读形式主义的好切入点。","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1960年","排序年":1960,"作品/事件名称":"格林伯格《现代主义绘画》——媒介纯粹性与平面性的追求","作者/设计师":"Clement Greenberg（格林伯格，1909—1994）","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第七章·7.4 媒介的纯粹性\n格林伯格在1960年发表的《现代主义绘画》中提出，现代主义艺术的使命是对每种艺术媒介自身本质的追问与纯化。绘画的独特性在于**平面性**（flatness）：它是二维的，不应模拟三维错觉。真正的现代主义绘画——从马奈到波洛克——正是通过清除叙事、文学性和三维幻觉，回归颜料在平面上的物质性，来实现绘画的**自律**。格林伯格由此将抽象表现主义定义为现代绘画的顶峰，认为其他混入文学内容的绘画是对媒介本质的背叛。","教学分析":"格林伯格的**媒介纯粹性论**是战后美国艺术批评的权威话语：每种艺术媒介都应聚焦自身独特性，绘画的本质是**平面与颜色**，雕塑的本质是**三维与材料**。这一理论解释了为什么抽象表现主义（波洛克、德·库宁）被视为正统，而带有叙事的具象绘画被批评为\"退步\"。然而，格林伯格的权威在波普艺术和观念艺术兴起后遭到强烈质疑：**媒介的边界真的如此固定吗？** 在多媒体、跨媒介盛行的今天，媒介纯粹性还有意义吗？","批注":"","标签":["4.3 媒介、材料与内容"],"image":"","link":"","importance":3},{"类别":"国内","年代":"1942年","排序年":1942,"作品/事件名称":"延安文艺座谈会——确立\"艺术为人民服务\"的文艺方针","作者/设计师":"毛泽东","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第八章·8.1 艺术为人民服务\n1942年5月，毛泽东在延安文艺座谈会上发表讲话，确立了新中国文艺的根本方向：\"我们的文学艺术都是为人民大众的，首先是为工农兵的。\"讲话明确要求文艺工作者深入生活、服务群众，反对\"为艺术而艺术\"的超功利立场。这一方针以政治命令的形式重新定义了艺术的目的和受众，也彻底改变了中国20世纪文艺的生态——艺术家的个人表达必须服从于集体的政治目标。","教学分析":"延安讲话是中国现代艺术史上最重要的政治事件之一，它提出了一个根本性的问题：**艺术应该为谁服务？** 讲话以**工农兵**（最广大的人民群众）作为文艺的首要受众，直接对抗了五四以来知识分子精英取向的文艺理想。这一方针在艺术实践上产生了深远影响——**木刻版画、秧歌剧、连环画**等贴近大众的形式得到鼓励，而脱离现实的纯艺术实验受到批判。教师可引导讨论：**艺术的\"人民性\"与艺术自律性之间的张力如何化解？** 今天的公共艺术是否延续了这一逻辑？","批注":"","标签":["3.2 服务于谁"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1970年代","排序年":1972,"作品/事件名称":"博伊斯\"人人都是艺术家\"与\"社会雕塑\"概念","作者/设计师":"Joseph Beuys（博伊斯，1921—1986）","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第八章·8.4 人人都是艺术家\n博伊斯提出了\"扩展的艺术概念\"（expanded concept of art）：艺术不再是专业艺术家在画布或大理石上的创作，而是每个人参与社会变革的能力。他的核心命题\"人人都是艺术家\"（Every human being is an artist）并不意味着每个人都能作画，而是强调每个人都有创造性地重塑社会的潜力。在此基础上，博伊斯提出\"社会雕塑\"（social sculpture）——将整个社会视为一件可塑造的作品，而每个公民都是这件作品的共同创作者。","教学分析":"博伊斯的\"人人都是艺术家\"是对**艺术精英主义**的根本挑战：如果艺术的边界扩展到社会实践，艺术家的特殊身份便失去了排他性。**社会雕塑**概念将艺术从美术馆带向政治、教育和日常生活，预示了后来的**社区艺术、参与式艺术和关系美学**。然而这一主张也引出质疑：**如果每件事都是艺术，艺术是否失去了意义？** 博伊斯自身的实践（如与死兔交谈、荒野营地）是否真的消除了专业艺术家与普通人的距离？","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1853—1870年","排序年":1860,"作品/事件名称":"奥斯曼改造巴黎与印象主义的都市根源","作者/设计师":"Georges-Eugène Haussmann（奥斯曼，1809—1891）；莫奈、雷诺阿等印象派画家","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第十章·10.2 都市现代化与法国印象派\n在拿破仑三世支持下，奥斯曼对巴黎进行了大规模城市改造（1853—1870），将中世纪的迷宫式街道改造为宽阔的林荫大道，咖啡馆、百货公司、赛马场和火车站构成了全新的都市景观。印象派画家——莫奈、雷诺阿、毕沙罗——走出画室，在这片现代化的城市空间中以快速笔触记录瞬间印象：光线在塞纳河上的闪烁、林荫道上人群的流动、咖啡馆里的社交场景。印象主义的题材与风格，正是对都市现代性的视觉回应。","教学分析":"印象主义并非纯粹的\"光色实验\"，它与**19世纪巴黎的城市化进程**密不可分。奥斯曼改造创造了新的**中产阶级休闲空间**，也为印象派提供了新题材。**社会与艺术的联系**在这里显而易见：城市改造催生了新的观看方式，城市游荡者（flâneur）的漫步目光正是印象主义的眼睛。教师可引导学生思考：**艺术风格的变化，究竟是纯粹的形式探索，还是社会历史条件的产物？** 这个案例是从**社会史视角解读艺术**的经典范例。","批注":"","标签":["1.3 联系与发展"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1909年","排序年":1909,"作品/事件名称":"马里内蒂《未来主义宣言》——以速度与机器取代博物馆","作者/设计师":"Filippo Marinetti（马里内蒂，1876—1944）","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第十一章·11.2 未来主义与机器美学的起源\n1909年2月20日，马里内蒂在法国《费加罗报》头版发表《未来主义宣言》，宣告：速度之美是一种新的美，一辆呼啸的赛车\"比萨摩特拉斯的胜利女神更美\"。宣言呼吁摧毁博物馆、图书馆和学术界，以机器的动感、工业的力量和战争的暴力取代一切传统。未来主义成为20世纪先锋艺术中**最彻底的反传统姿态**之一，深刻影响了此后的达达主义、构成主义和苏联先锋艺术。","教学分析":"未来主义宣言是20世纪艺术史上最激进的宣言之一：它以对**速度、机器、暴力**的崇拜取代对古典传统的敬仰，提出了一种全新的**时间美学**（瞬间、动感、同时性）。这是**工业现代性进入艺术语言**的关键时刻。然而宣言中的男性沙文主义和对战争的颂扬，也与意大利法西斯主义有着危险的亲缘关系。教师可引导讨论：**前卫艺术的革命性与政治危险性之间的关系**；以及\"**用新媒介推翻旧传统**\"的逻辑，在今天是否仍然成立？","批注":"","标签":["2.2 继承与创新"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1916—1924年","排序年":1916,"作品/事件名称":"达达主义与苏黎世卡巴莱伏尔泰——艺术的自我否定","作者/设计师":"Hugo Ball（雨果·鲍尔，1886—1927）；Tristan Tzara（特里斯坦·查拉，1896—1963）等","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第十三章·13.1 达达主义\n达达主义发端于1916年苏黎世\"卡巴莱伏尔泰\"（Cabaret Voltaire）。第一次世界大战的屠杀使参与者对欧洲文明的理性基础彻底失望。雨果·鲍尔等人通过声音诗（sound poetry）、拼贴、偶发表演来攻击一切语言意义、艺术惯例和社会秩序。\"达达\"（Dada）本身就是一个无意义的词——这是对意义本身的拒绝。达达主义的核心姿态是**否定**：否定艺术的美化功能，否定艺术与生活的边界，否定艺术家的天才身份。","教学分析":"达达主义是\"**艺术为何物**\"这个问题最激进的追问：既然战争证明了文明的虚伪，那么美化文明的\"艺术\"也应被摧毁。达达以**无意义**对抗虚假意义，以**偶然性**对抗精心构建。这使达达成为**观念艺术、行为艺术和装置艺术**的重要先驱。教师可用达达引导讨论：**艺术是否需要技能？** **审美愉悦是否是艺术的必要条件？** 对比波普艺术与达达——两者都挑战\"高雅艺术\"，但策略截然不同：达达是激烈否定，波普是温和渗透。","批注":"","标签":["1.5 物质与非物质"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1936年","排序年":1936,"作品/事件名称":"本雅明《机械复制时代的艺术作品》——\"灵晕\"的消逝","作者/设计师":"Walter Benjamin（本雅明，1892—1940）","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第五章·5.4 低俗趣味\n本雅明在1936年的文章中提出，机械复制技术（摄影、电影、印刷）使艺术品失去了其\"此时此地\"的**灵晕**（aura）——那种只有面对原作时才能感受到的独特气息与权威感。原作的\"灵晕\"来源于其**仪式背景**和**不可复制性**；而复制技术打破了这种独特性，使艺术品可以大量流通和普及。本雅明对此态度复杂：复制技术一方面使艺术民主化，使大众有机会接触艺术；另一方面也可能被政治宣传所利用，产生\"政治的审美化\"。","教学分析":"本雅明的\"灵晕\"概念是讨论**原作与复制、精英与大众**的核心理论工具。**原作的灵晕从哪里来？** 是物理材料的独特性、历史的积淀，还是观看者的心理预设？数字时代的今天，当一张图片可以被无限复制，\"灵晕\"是否彻底消失？还是以另一种形式（如NFT的\"数字原作\"）重新出现？本雅明的分析还揭示了**技术与政治的关系**：纳粹德国将政治变成壮观的审美奇观（如纽伦堡大会），这正是\"政治审美化\"的危险所在。","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":3},{"类别":"国外","年代":"1990年代至今","排序年":1994,"作品/事件名称":"全球化语境下当代艺术的跨文化资源整合","作者/设计师":"蔡国强、徐冰等当代艺术家；William Robinson等理论家","来源书目":"《艺术概论》","简介":"","原文引用":"——《艺术概论》/ 第十四章·14.1 全球化与大尺度资源整合\n全球化进程使当代艺术突破了民族与地域的边界，形成了跨文化的创作与展示网络。在国际双年展、画廊和艺术博览会体系中，来自不同文明的艺术家可以整合全球视觉资源进行创作。中国当代艺术家蔡国强以火药爆破为媒介，将中国传统文化符号纳入国际当代艺术语境；徐冰以汉字字形创造跨文化的视觉语言。这些实践体现了全球化时代\"**在地性与全球性**\"的张力：艺术家既要保持文化根源的辨识度，又要在国际语境中被理解和接受。","教学分析":"全球化并非文化的均质化，它创造了一种**不对等的跨文化对话**：西方仍主导着国际艺术市场和批评话语，非西方艺术家必须在\"**本土特色**\"与\"**国际语言**\"之间寻找平衡。蔡国强和徐冰的案例展示了中国当代艺术如何以**差异性**而非相似性进入国际舞台。教师可引导讨论：**全球化是否意味着文化同质化？** 当艺术家以\"在地性\"作为进入国际市场的卖点时，这种在地性是否已经被商品化？这是讨论**文化认同与全球资本主义**关系的绝佳案例。","批注":"","标签":["5.2 全球化与在地性"],"image":"","link":"","importance":3},{"类别":"国外","年代":"15—16世纪","排序年":1490,"作品/事件名称":"达·芬奇：艺术与科学的统一者","作者/设计师":"列奥纳多·达·芬奇（Leonardo da Vinci）","来源书目":"《艺术设计概论》","简介":"达·芬奇同时身为画家、雕刻家、建筑师、工程师和科学家，其创作实践打破了艺术与科学之间的壁垒，成为艺术与设计统一的历史典范。","原文引用":"——《艺术设计概论》/ 第4章·第二节 科学技术与艺术\n科学上富有成就的人，往往在艺术上也有很深的造诣。从历史上看，艺术和科学的关系，通常相辅相成，往往是同一个人的两种工作。科学与艺术的最高境界的关系，更是融汇贯通，水乳交融。设计是科学与艺术的统一这一理念，在达·芬奇身上体现得最为充分，他的工作是集科学研究与艺术创作于一身。","教学分析":"达·芬奇的多面性揭示了**艺术与科学并非对立**，而是人类认识世界的两种方式。他的解剖学研究服务于绘画写实；他的工程设计融入了审美考量。教师可引导学生思考：**当代分工日益精细的时代，设计师还需要科学素养吗**？这与现代**STEAM教育**的理念直接呼应，也反驳了艺术设计只是纯技能的片面认识。","批注":"","标签":["4.2 艺术与科学","1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国外","年代":"17—18世纪","排序年":1700,"作品/事件名称":"西方纯艺术概念形成与设计艺术的独立","作者/设计师":"（多位启蒙思想家）","来源书目":"《艺术设计概论》","简介":"17世纪西方逐渐形成以绘画、雕塑为核心的纯艺术（Fine Art）概念，将实用艺术与纯艺术区分开来，为后来设计作为独立学科奠定了概念基础。","原文引用":"——《艺术设计概论》/ 第3章·第一节 艺术与设计艺术\n在西方，17世纪以前，艺术是一个广义概念，包括了绘画、雕塑、建筑、音乐、文学、手工艺等所有技艺。直到17世纪以后，才逐渐形成了我们今天所理解的纯艺术（Fine Art）的概念，指绘画、雕塑等自由艺术，而将有实用功能的应用艺术或实用艺术从中分离出来。于是，艺术的概念便发生了分化：一方面是以自我表达为本体的纯艺术，一方面是以功能服务为本体的设计艺术（实用艺术）。","教学分析":"这一历史分化是理解**艺术与设计根本区别**的前提。**纯艺术以自我表达为本体，设计艺术以功能服务为本体**——这句话是本课程的核心命题之一。教师可追问：**这种分化是历史的进步还是人为的割裂**？工艺美术运动、包豪斯等运动恰恰是对这一分化的反思与弥合。","批注":"","标签":["1.1 本体与客体","1.2 二元与多元"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1919—1933年","排序年":1919,"作品/事件名称":"包豪斯：艺术与技术的新统一","作者/设计师":"格罗皮乌斯（Walter Gropius）等","来源书目":"《艺术设计概论》","简介":"包豪斯学校（1919—1933）提出艺术与技术的新统一，打破纯艺术与工艺之间的壁垒，成为现代设计教育的奠基，对全球设计产生了深远影响。","原文引用":"——《艺术设计概论》/ 第3章·第三节 装饰艺术与设计\n包豪斯打破了纯艺术与工艺美术之间的壁垒，将艺术创作与工艺制作统一起来，这在西方设计史上是一次革命性的跨越。包豪斯的教学理念是艺术与技术的新统一，其目标是培养出既具有艺术家气质、又具有工艺师技能的设计师，从而为工业生产提供有创造力的设计方案。包豪斯的这一实践，使现代设计从传统的装饰艺术中解放出来，走向了与工业生产相结合的新道路。","教学分析":"包豪斯是**艺术与技术二元对立走向统一**的最重要历史实践。其口号**艺术与技术的新统一**直接回应了工业革命以来艺术与生产相分离的问题。教师可引导学生讨论：**今天的设计学院课程是否实现了这个统一？艺术气质与工程素养在当代设计师身上如何共存**？","批注":"","标签":["1.2 二元与多元","4.2 艺术与科学","2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国内","年代":"新石器时代（约前3000—前2000年）","排序年":-3000,"作品/事件名称":"马家窑文化彩陶纹样：从具象到抽象的演化","作者/设计师":"（马家窑文化先民）","来源书目":"《艺术设计概论》","简介":"马家窑文化彩陶纹样经历了从具象自然形态到抽象几何纹样的演变过程，体现了早期设计中形态抽象化的规律。","原文引用":"——《艺术设计概论》/ 第1章·第一节 艺术设计的概念与定义\n中国最早的设计可以追溯到新石器时代的彩陶，马家窑文化的彩陶纹样是中国早期设计的杰出代表。这些纹样显示出早期人类将自然形象进行提炼、概括、抽象化的能力——从最初的具体动物、植物形象，逐渐演化为富有节律感的几何图形。这一演化过程揭示了设计中形态语言从具象到抽象的普遍规律，也体现了装饰本身所承载的文化意义与审美意识的演进。","教学分析":"马家窑彩陶纹样是讨论**具象与抽象转化**的最直观中国案例。纹样从写实的鱼纹演化为几何线条，这不是退步而是**抽象思维能力的提升**——设计师用更少的视觉元素传达更丰富的意义。教师可追问：**抽象化是设计的简化还是升华？这种提炼背后有哪些文化与功能的考量**？","批注":"","标签":["1.4 具象与抽象","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1957年（建成1973年）","排序年":1957,"作品/事件名称":"悉尼歌剧院：仿生形态的建筑设计","作者/设计师":"约恩·乌松（Jørn Utzon）","来源书目":"《艺术设计概论》","简介":"悉尼歌剧院以贝壳形态为灵感，将自然具象形态抽象转化为建筑造型语言，是仿生设计的经典案例。","原文引用":"——《艺术设计概论》/ 第3章·第二节 造型与形态\n在自然形态中寻找灵感，将其转化为设计中的形态语言，这是仿生设计的基本方法。仿生设计并不是对自然形态的简单模仿，而是对自然形式规律的提炼与再创造。以悉尼歌剧院为例，建筑师从贝壳的自然形态中提取造型元素，通过现代结构技术将其转化为宏伟的建筑形体，使建筑既具有自然形态的有机感与生命力，又体现出现代技术的精确与理性，成为20世纪建筑设计中形态创新的典范。","教学分析":"悉尼歌剧院完美展示了**仿生形态如何在具象（贝壳）与抽象（建筑结构）之间转化**。乌松并非复制贝壳，而是提取了其**弯曲、层叠、轻盈**的形式规律并加以几何化。教师可追问学生：**仿生设计的边界在哪里？当自然形态被完全几何化后，它还是仿生吗**？这引导出设计中形态转化的本质讨论。","批注":"","标签":["1.4 具象与抽象","4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪90年代至今","排序年":1995,"作品/事件名称":"非物质设计与信息设计的兴起","作者/设计师":"（马克·第亚尼等理论家）","来源书目":"《艺术设计概论》","简介":"20世纪90年代，随着信息技术的发展，非物质设计理念兴起，设计对象从物质产品扩展到信息、界面、服务、体验等非物质领域，根本性地改变了设计的本体定义。","原文引用":"——《艺术设计概论》/ 第9章·第三节 非物质设计与信息设计\n非物质设计的兴起，意味着设计的对象从有形的物质产品向无形的信息、服务和体验扩展。在非物质设计中，设计师不再主要关注物品的形态、材料和制造工艺，而是更多地关注信息的组织与传递、人与系统的交互关系，以及使用过程中的体验与感受。非物质设计不仅包括软件界面设计、信息图形设计，还包括各种服务设计，它的出现标志着设计领域的又一次重大转型——从造物到设事，设计的本体从物质层面上升到了信息与体验层面。","教学分析":"非物质设计是理解**物质与非物质**矛盾对立的最前沿案例。它提出了一个根本问题：**当设计的对象是无形的信息流、交互体验时，设计的本体究竟是什么**？教师可以对比工业时代的椅子设计（物质）与今天的APP界面设计（非物质）——**两者都叫设计，但设计思维、评价标准、成功指标是否一样**？这是当代设计教育必须回答的核心问题。","批注":"","标签":["1.5 物质与非物质","4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1880年代—1900年代","排序年":1888,"作品/事件名称":"工艺美术运动：以传统手工艺对抗机械化","作者/设计师":"威廉·莫里斯（William Morris）等","来源书目":"《艺术设计概论》","简介":"工艺美术运动（Arts and Crafts Movement）由威廉·莫里斯等人主导，以复兴中世纪手工艺传统来抵制工业革命带来的粗劣机器产品，是设计史上传统与当代关系的标志性事件。","原文引用":"——《艺术设计概论》/ 第3章·第三节 装饰艺术与设计\n19世纪中叶的工业革命带来了大规模的机器生产，机器生产的产品在艺术质量上远不如手工艺品精良。威廉·莫里斯等人发起的工艺美术运动，正是对机器生产的一种反动，他们主张回归中世纪的手工艺传统，认为只有手工制作才能保持产品的艺术性与个性。这一运动虽然否定了机器生产，带有一定的复古倾向，但它率先提出了提高日用品审美品质的主张，对后来的现代设计运动产生了深远的影响。","教学分析":"工艺美术运动是**传统与当代**矛盾的典型悖论：莫里斯试图用**中世纪传统**来回应**工业化当代**，却因精英化的手工艺品价格高昂而无法惠及普通大众。这揭示了一个深刻矛盾：**捍卫传统的方式本身可能成为新的精英主义**。教师可引导讨论：在中国当代语境下，传统手工艺的复兴（如非遗）是否面临同样的困境？","批注":"","标签":["2.1 传统与当代","3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1890年代—1910年代","排序年":1895,"作品/事件名称":"新艺术运动：从自然形态中寻找装饰语言","作者/设计师":"（多国设计师，包括穆夏、高迪等）","来源书目":"《艺术设计概论》","简介":"新艺术运动（Art Nouveau）在欧洲多国同步展开，以有机曲线、植物纹样等自然形态为装饰语言，拒绝历史样式的简单模仿，寻求一种新的时代风格。","原文引用":"——《艺术设计概论》/ 第3章·第三节 装饰艺术与设计\n新艺术运动是19世纪末、20世纪初在欧洲和美国产生的一次大规模艺术设计革新运动。它反对历史主义的装饰风格，试图建立一种全新的、具有时代精神的装饰体系。新艺术运动从自然界中汲取灵感，尤其以植物的有机曲线为主要装饰语言，将花草、藤蔓等自然形态转化为富有活力的装饰纹样，广泛应用于建筑、室内、家具、海报等各个设计领域，在欧洲各地形成了不同的地区风格，如法国的新艺术、德国的青年风格、英国格拉斯哥学派等。","教学分析":"新艺术运动是**传统（自然形态）与当代（工业时代新美学）**之间张力的产物。它没有回到中世纪（反历史主义），而是以**自然**作为超越历史样式的灵感来源。值得关注的是，新艺术运动在不同国家发展出了**不同的地区风格**——说明同一运动理念如何被地方文化改造，是讨论**全球化与在地性**的好案例。","批注":"","标签":["2.1 传统与当代","1.4 具象与抽象","5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪60—70年代","排序年":1965,"作品/事件名称":"日本设计的崛起：从仿制到超越","作者/设计师":"（日本工业设计界集体）","来源书目":"《艺术设计概论》","简介":"二战后日本通过系统学习欧美设计，在20世纪60至70年代实现了从模仿到创新的跨越，形成了融合传统美学与现代技术的独特日本设计风格，并以此打入国际市场。","原文引用":"——《艺术设计概论》/ 第7章·第三节 文化与传统\n日本设计的成功经验值得中国设计界借鉴。战后日本设计首先是学习欧洲的设计，大量引进西方技术和设计理念，而不是固守传统、排斥外来影响。但日本并未止步于模仿，而是在充分消化吸收的基础上，将本民族的传统审美观念融入现代设计之中，形成了既有西方现代感又有东方民族特色的日本设计风格，并凭借这种独特风格在国际市场上取得了巨大成功。这种学习—消化—创新的路径，对于中国今天的设计发展具有重要的参考价值。","教学分析":"日本设计的发展轨迹清晰展示了**继承与创新的辩证路径**：先是**虚心继承**（学习西方），再是**批判性消化**，最终形成**自主创新**的风格。这套**学习—消化—创新**模式值得与中国当前情况对比：中国是否处于类似的历史节点？教师可进一步追问：**日本设计的传统是哪些元素？它们如何以现代方式呈现？中国传统又有哪些元素可以走同样的路径**？","批注":"","标签":["2.2 继承与创新","5.1 本土与异域","5.2 全球化与在地性"],"image":"","link":"","importance":0},{"类别":"国内","年代":"21世纪初","排序年":2003,"作品/事件名称":"为中国制造而设计：中国设计自主创新之路","作者/设计师":"（中国设计界集体）","来源书目":"《艺术设计概论》","简介":"21世纪初，随着中国制造在世界市场的崛起，中国设计界开始反思代工模式的局限性，提出通过自主设计实现从制造到创造的转型。","原文引用":"——《艺术设计概论》/ 第8章·第五节 为中国制造而设计\n中国制造已经成为当今世界最重要的经济现象之一，中国是世界上最大的制造业国家，但我们的产品大多是为别人代工生产的，缺乏自己的品牌和独立的设计。设计师应当成为中国制造转型升级的重要推动力量。为中国制造而设计，意味着中国的设计师要有民族责任感，要着眼于提升中国产品的自主设计水平，要用设计创造出中国自己的品牌价值，让中国制造不仅代表价格低廉，也代表高品质和高创造力的产品。","教学分析":"这个案例直接将设计与**国家产业战略**联结，揭示了**设计的社会功能**远不只是美化产品。**从制造到创造**的转型命题，要求设计师不仅有技能，还要有**民族文化自觉**和**战略意识**。教师可引导讨论：**华为、小米、大疆的成功，设计在其中扮演了什么角色？中国设计的自主性应该如何体现**？","批注":"","标签":["2.2 继承与创新","5.2 全球化与在地性","3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国外","年代":"18世纪末—19世纪","排序年":1800,"作品/事件名称":"工业革命与大众设计的诞生","作者/设计师":"（工业革命时期）","来源书目":"《艺术设计概论》","简介":"工业革命使大批量机器生产成为可能，设计从为少数权贵服务的工艺精品，转向为广大普通消费者设计量产产品，标志着现代设计大众化时代的开始。","原文引用":"——《艺术设计概论》/ 第8章·第一节 设计与设计师\n在工业革命以前，设计师的角色往往由工匠、艺术家来承担，他们主要为权贵、教会和富裕阶层创作精美的手工艺品，产品量少而精。工业革命使大规模机器生产成为可能，产品的对象不再是少数特权阶层，而是广大的社会中下层消费者。这一转变要求设计师必须考虑批量生产的可能性、材料与工艺的标准化，以及面向大众的审美接受度，设计由此真正走向了为大众服务的现代使命。","教学分析":"工业革命是**精英设计向大众设计**转型的历史节点。在这之前，设计是特权的象征（皇家瓷器、宫廷家具）；在这之后，设计必须面对**大众趣味与批量生产**的双重约束。教师可引导学生追问：**为大众设计究竟是降低了设计水准，还是提出了更高的挑战**？今天IKEA的家具设计与明清官窑瓷器，哪个更难？","批注":"","标签":["3.1 精英与大众","4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国内","年代":"20世纪20—40年代","排序年":1925,"作品/事件名称":"月份牌广告：都市大众文化与商业设计","作者/设计师":"郑曼陀、杭樨英等","来源书目":"《艺术设计概论》","简介":"月份牌广告是民国时期上海兴起的商业平面设计形式，将西洋绘画技法与中国审美趣味结合，面向市民大众，成为中国近代商业设计与大众视觉文化的重要载体。","原文引用":"——《艺术设计概论》/ 第8章·第一节 设计与设计师\n中国近代的商业设计中，月份牌广告是最具代表性的平面设计形式之一。它兴起于20世纪初的上海，最初由外资企业委托中国画师创作，逐渐发展成为上海商业文化的重要符号。月份牌广告的画面多以时装仕女为主题，融合了西洋水彩写实技法与中国传统仕女画的审美趣味，兼具商业宣传与审美欣赏的双重功能，深受市民阶层的喜爱，广泛张贴于城市各处，成为近代中国都市大众文化的重要组成部分。","教学分析":"月份牌广告是**精英与大众**矛盾在中国近代语境中的典型展现。它使用了精英的绘画技法（西洋写实），却服务于大众的消费趣味；它既是商业工具，也成为了城市审美文化的一部分。教师可追问：**谁在定义大众趣味？月份牌中的女性形象折射出怎样的社会价值观**？","批注":"","标签":["3.1 精英与大众","5.1 本土与异域","2.2 继承与创新"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪后期","排序年":1980,"作品/事件名称":"设计师的社会意识与职责：超越甲方的设计伦理","作者/设计师":"（维克多·帕帕纳克等设计理论家）","来源书目":"《艺术设计概论》","简介":"现代设计伦理要求设计师不仅服务于委托方和市场，更要对社会大众、环境和未来负责，挑战了设计为消费主义服务的主流模式。","原文引用":"——《艺术设计概论》/ 第8章·第三节 设计师的社会意识与职责\n设计从本质上讲是人类的一种社会行为，设计师的工作不能脱离社会责任而存在。设计师的责任，首先是对使用者负责，要使产品真正方便、安全地服务于人；其次是对社会负责，设计不能以牺牲社会公共利益为代价来实现商业目的；再次是对自然环境负责，设计应该减少对自然资源的消耗和对生态环境的破坏；最后是对文化负责，设计师有责任通过设计传承和发展文化价值。只有具备了这种多层次的社会责任感，设计师才能真正实现设计的社会价值。","教学分析":"这段话将设计师的责任定义为**四个维度**：对使用者、对社会、对自然、对文化——而非仅仅满足甲方需求。教师可追问：**当市场需求与社会公益冲突时，设计师该站在哪一边**？烟草包装设计、快时尚、一次性产品——这些都是检验设计师**社会意识**的真实场景。","批注":"","标签":["3.2 服务于谁","1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1890年代","排序年":1896,"作品/事件名称":"形式追随功能——沙利文的功能主义宣言","作者/设计师":"路易斯·沙利文（Louis Sullivan）","来源书目":"《艺术设计概论》","简介":"美国建筑师路易斯·沙利文提出的形式追随功能（Form Follows Function）成为现代设计最重要的信条之一，直接影响了20世纪功能主义设计运动的走向。","原文引用":"——《艺术设计概论》/ 第6章·第四节 设计美学\n功能主义设计理论的核心口号是形式追随功能，这一命题最早由美国建筑师路易斯·沙利文提出。他认为建筑的外在形式应当由其内在功能所决定，一切多余的装饰都应当去除，设计的美在于功能得到完美实现时自然流露出来的形式。这一理念后来被包豪斯所发扬，成为整个20世纪功能主义设计运动的指导思想。然而，批评者也指出，纯粹追求功能而忽视精神与审美需求，往往导致设计作品的冷漠与单调，功能与形式的关系在实践中远比这一口号所表达的更为复杂。","教学分析":"**形式追随功能**是设计史上最具争议的命题之一。它一方面解放了设计——不必再堆砌历史装饰；另一方面又可能导致**功能独裁**（丑陋但实用）。批评者指出：**精神需求、文化意义、审美愉悦本身也是功能的一部分**。教师可追问：**苹果手机的设计是形式追随功能吗？如果用户体验和美感也是功能，这句话还有没有约束力**？","批注":"","标签":["4.1 形式与功能","1.2 二元与多元"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪40—60年代","排序年":1950,"作品/事件名称":"人机工学与人的尺度：设计以人为中心","作者/设计师":"（亨利·德莱弗斯等人机工学先驱）","来源书目":"《艺术设计概论》","简介":"人机工学（Ergonomics）的兴起将人的生理与心理尺度引入设计，要求产品适应人而非人适应产品，从根本上重新定义了功能的含义——功能必须以人为中心。","原文引用":"——《艺术设计概论》/ 第6章·第二节 人的尺度\n人机工效学是研究人、机器与环境三者之间关系的科学，其目的是使设计适合于人的生理和心理特性，从而提高工作效率，减少人为错误，保证人在使用产品时的安全与舒适。在设计中考虑人的尺度，不仅意味着要按照人体的自然尺寸来设定产品的基本参数，还要考虑人的感觉系统（视觉、听觉、触觉）、人的认知能力和情感需求。设计中的人的尺度，因此成为衡量一件产品是否真正适用的首要标准——不符合人的尺度的设计，功能再强大也是失败的。","教学分析":"人机工学将**形式与功能**的讨论落地为可量化的人体数据，但它更深刻的意义在于：**设计必须以人作为一切尺度的基准**。教师可展示德莱弗斯的人体测量图表，引导学生思考：**人的尺度是普遍的还是因人而异的？为残障人士设计时，人的尺度意味着什么**？这将讨论引向**包容性设计（Universal Design）**的前沿议题。","批注":"","标签":["4.1 形式与功能","3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国外","年代":"18—19世纪","排序年":1780,"作品/事件名称":"工业革命：技术重塑艺术生产方式","作者/设计师":"（工业革命时期）","来源书目":"《艺术设计概论》","简介":"18世纪工业革命用机器代替手工，根本性地改变了设计的生产方式，迫使艺术家和设计师重新思考技术与艺术的关系，催生了现代设计学科的诞生。","原文引用":"——《艺术设计概论》/ 第4章·第一节 技术：古典技术与现代技术\n工业革命是人类技术史上的一次根本性变革，它以机器大工业代替了手工工场，以蒸汽动力代替了人力和畜力。这场技术革命不仅改变了生产方式，也从根本上改变了艺术与设计的面貌。一方面，机器生产使大批量制造成为可能，产品可以快速、廉价地生产出来，惠及广大民众；另一方面，机器制造的产品往往缺乏手工艺的精良品质和个性化特征，艺术性大为下降。这种两难困境，促使艺术家和设计师开始认真思考：在工业时代，技术与艺术应当是对立的还是统一的？","教学分析":"工业革命提出了**艺术与科学**关系的现代版本：技术（机器）提升了效率，却可能损伤了艺术性；手工艺保留了艺术性，却效率低下无法惠及大众。这个矛盾至今未解——**大规模个性化生产（Mass Customization）**是目前最接近解答的尝试。教师可引导讨论：**3D打印、AI生成设计，是否正在打破量产即无个性的铁律**？","批注":"","标签":["4.2 艺术与科学","3.1 精英与大众","1.3 联系与发展"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪","排序年":1950,"作品/事件名称":"手工艺技术与机器技术的美学差异","作者/设计师":"（多位设计理论家）","来源书目":"《艺术设计概论》","简介":"手工艺与机器生产在技术属性上的根本差异，造就了两种截然不同的美学形态：手工艺美学强调个人痕迹、材料感与偶然性；机器美学强调精确、标准化与几何理性。","原文引用":"——《艺术设计概论》/ 第6章·第四节 设计美学\n手工艺技术与机器技术相比，有着根本的不同。手工技术是手工艺人以手与工具直接操作材料的过程，它保留了个人的技艺、感知和判断，因而手工艺品具有个性化的特征，材料的自然纹理和偶然效果都是手工艺美的组成部分。相比之下，机器技术的特征是标准化、精确性和可重复性，它要求统一规格的材料和精确的工艺流程，排除了偶然因素，产品的美是一种数学的精确之美、结构的理性之美。两种技术产生了两种不同的美学形态，它们并不是简单的高下之分，而是各有其独特的审美价值和文化意义。","教学分析":"这个案例直接揭示了**媒介（手工/机器）如何决定内容（美学形态）**，印证了麦克卢汉**媒介即信息**的设计版本。手工艺美的核心是**不可复制的偶然性**——陶器上的指纹、木材的年轮；机器美的核心是**可复制的精确性**——齿轮的咬合、屏幕的像素。教师可追问：**当你用手机设计一张海报时，你在使用哪种媒介？它如何影响了你的创作**？","批注":"","标签":["4.3 媒介、材料与内容","4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国内","年代":"明清时期（约16—19世纪）","排序年":1600,"作品/事件名称":"中国传统漆器家具：材料工艺与造型内容的统一","作者/设计师":"（历代工匠）","来源书目":"《艺术设计概论》","简介":"中国传统漆器家具以大漆为材料，将髹漆工艺的材料特性与器物的造型功能融为一体，是中国传统设计中媒介、材料与内容高度统一的典范。","原文引用":"——《艺术设计概论》/ 第7章·第三节 文化与传统\n中国传统工艺设计，无论是漆器、铜器、玉器还是竹木器，都体现了一个共同的特征：对材料本性的深刻理解和充分利用。以漆器为例，大漆的特性是光洁、耐久、防潮，中国工匠不仅将其用于保护器物表面，更发展出了丰富的髹漆技法——剔红、螺钿、描金等——将材料的物性与装饰的美感完美结合。传统家具的设计也是如此，榫卯结构不仅是连接方式，更成为了木材性能与造型语言的高度统一，材料本身的纹理、色泽成为设计语言的一部分。","教学分析":"中国漆器家具展示了**材料即语言**的设计哲学——大漆的光泽、榫卯的精密，不仅是功能需要，更是**内容表达**的一部分。这与西方现代设计中**真实材料（Truth to Materials）**的原则高度呼应。教师可引导学生比较：**宜家批量生产的橡木贴皮家具与苏州明式家具的榫卯，两者对材料的态度有什么本质不同？这种不同折射了怎样的文化价值观**？","批注":"","标签":["4.3 媒介、材料与内容","2.1 传统与当代","5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国内","年代":"20世纪初","排序年":1910,"作品/事件名称":"近代中国设计：中西文化碰撞与融合","作者/设计师":"（中国近代设计师群体）","来源书目":"《艺术设计概论》","简介":"20世纪初，西方现代设计理念随工业化浪潮进入中国，中国传统工艺设计面临本土与异域的激烈碰撞，如何在接受现代化的同时保持文化主体性成为核心命题。","原文引用":"——《艺术设计概论》/ 第7章·第三节 文化与传统\n文化是有其独特性的，每一民族的文化都有自己的根脉，不能简单地以一种文化取代另一种文化。在中国近现代设计发展的过程中，西方现代设计的影响是全面而深刻的，但是一味照搬西方设计模式而忽视本土文化传统，往往会导致设计的无根性和文化认同的危机。与此同时，固守传统、拒绝外来影响，又会导致设计的保守与僵化。中国设计的出路，在于在吸收外来文化精华的同时，立足于本民族的文化土壤，形成自己的设计语言和设计风格。","教学分析":"近代中国设计的困境是**本土与异域**矛盾最为真实的历史呈现。这不是哪个更好的问题，而是**如何在文化接触中保持主体性**的问题。教师可以香港、台湾、大陆三地的设计风格演变为例，展示不同的本土化路径。更深层的追问：**当国潮设计成为市场热点，这是文化自信的体现，还是另一种消费主义包装**？","批注":"","标签":["5.1 本土与异域","2.1 传统与当代","3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪90年代至今","排序年":1995,"作品/事件名称":"生态设计：可持续发展时代的设计责任","作者/设计师":"（维克多·帕帕纳克等）","来源书目":"《艺术设计概论》","简介":"20世纪末兴起的生态设计（Eco-design）将环境可持续性纳入设计的核心考量，要求设计在全生命周期内减少环境影响，是对全球化工业消费模式的根本性反思。","原文引用":"——《艺术设计概论》/ 第9章·第二节 生态设计\n生态设计是基于可持续发展理念的设计实践，它要求设计师在进行产品设计时，不仅要考虑产品的功能与美观，还要考虑产品从原材料获取、生产制造、使用到废弃处理的全生命周期中对环境的影响。生态设计的核心原则是少就是多——用最少的材料和能源实现最佳的使用功能，减少废弃物的产生，延长产品的使用寿命，便于拆解和回收。生态设计不仅是一种技术方法，更是一种设计哲学：它要求设计师在面对消费社会的物质欲望时，保持清醒的生态良知。","教学分析":"生态设计的**少就是多**原则与消费主义的更多更好形成了根本对立，这是**全球化（大规模工业消费）与在地性（本地生态系统）**矛盾的设计表达。教师可引导学生讨论：**绿色包装、碳中和承诺、循环经济——这些是企业的真诚转变，还是漂绿的营销策略**？并进一步追问：**一个负责任的设计师，在全球化供应链中能做什么**？","批注":"","标签":["5.2 全球化与在地性","3.2 服务于谁","1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪后期至今","排序年":1990,"作品/事件名称":"设计与消费社会：生活方式的塑造者","作者/设计师":"（多位设计理论家与社会学家）","来源书目":"《艺术设计概论》","简介":"消费社会中，设计不再仅仅是解决功能问题的手段，而成为构建生活方式、传递符号意义的重要工具，设计与消费文化之间的关系成为理解现代社会的重要视角。","原文引用":"——《艺术设计概论》/ 第7章·第二节 生活方式与设计\n设计与生活方式之间存在着深刻的双向互动关系。一方面，生活方式的变化推动着设计的演变——工业化、城市化、数字化，每一次社会转型都带来了新的设计需求和设计形式；另一方面，设计本身也在塑造和引领生活方式，它不仅满足人们现有的需求，还不断创造出新的需求和新的生活可能。在消费社会中，设计越来越成为一种符号生产活动——产品的意义不再仅仅来自其物质功能，而更多地来自它所传递的品味、身份和生活态度。","教学分析":"这个案例揭示了设计在消费社会中的**双重角色**：既是**回应生活方式**的工具，也是**塑造生活方式**的力量。**设计创造需求**与**设计满足需求**之间的张力，正是当代设计伦理的核心困境。教师可以iPhone的出现如何改变人类生活方式为例，追问：**设计师有责任为自己创造的需求负责吗？社交媒体的UI设计让人上瘾，这是好设计还是坏设计**？","批注":"","标签":["5.2 全球化与在地性","3.2 服务于谁","1.3 联系与发展"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪后期至今","排序年":1985,"作品/事件名称":"设计的艺术化：菲利普·斯塔克等人的探索","作者/设计师":"菲利普·斯塔克（Philippe Starck）等","来源书目":"《艺术设计概论》","简介":"20世纪后期兴起的设计艺术化趋势，使产品设计越来越追求艺术性与个性表达，部分设计师的作品已具有鲜明的艺术品气质，模糊了设计与艺术的边界。","原文引用":"——《艺术设计概论》/ 第9章·第四节 艺术化的生活与设计的艺术化\n20世纪末期，随着社会经济的发展和人们精神文化需求的提高，设计正日益向艺术化方向发展。所谓设计的艺术化，是指设计在完成其基本功能的前提下，越来越注重造型的艺术性、情感表达与个性化特征，使产品超越纯粹的功能性商品，成为兼具使用价值与审美价值、甚至收藏价值的艺术品。与此同时，艺术化的生活也成为现代人追求的重要目标之一，人们希望通过高质量的设计产品来提升日常生活的审美品质，这种需求进一步推动了设计向艺术化方向演进。","教学分析":"设计艺术化是**形式与功能**关系走向新阶段的表征——当基本功能需求被满足后，**艺术性、情感性、叙事性**成为设计的核心价值。教师可以斯塔克的榨汁机（Juicy Salif）为例：它榨汁效果一般，却是艺术品般的存在。追问：**这算成功的设计吗？无用之用在设计中有合法性吗？当设计成为收藏品，它还服务于谁**？","批注":"","标签":["1.1 本体与客体","4.1 形式与功能","3.1 精英与大众"],"image":"","link":"","importance":0}];
const MODULES   = [["一、本体框架论", ["1.1 本体与客体", "1.2 二元与多元", "1.3 联系与发展", "1.4 具象与抽象", "1.5 物质与非物质"]], ["二、时间框架论", ["2.1 传统与当代", "2.2 继承与创新"]], ["三、社会框架论", ["3.1 精英与大众", "3.2 服务于谁"]], ["四、生产框架论", ["4.1 形式与功能", "4.2 艺术与科学", "4.3 媒介、材料与内容"]], ["五、空间框架论", ["5.1 本土与异域", "5.2 全球化与在地性"]]];
const BOOKS     = ["《中国工艺美术史新编》", "《中国美术简史》", "《外国工艺美术史》", "《外国美术简史》", "《世界现代设计史》", "《艺术概论》", "《艺术设计概论》"];
const ALL_NODES = ["1.1 本体与客体", "1.2 二元与多元", "1.3 联系与发展", "1.4 具象与抽象", "1.5 物质与非物质", "2.1 传统与当代", "2.2 继承与创新", "3.1 精英与大众", "3.2 服务于谁", "4.1 形式与功能", "4.2 艺术与科学", "4.3 媒介、材料与内容", "5.1 本土与异域", "5.2 全球化与在地性"];

// ── State ─────────────────────────────────────────────────────
let D = ORIGINAL.map((c,i)=>({...c,_i:i}));
let curTab='books', curSel=null, curFilters=new Set();
let editIdx=null, editImg=null;

function bookCnt(b){ return D.filter(c=>c.来源书目===b).length }
function suppCnt(){ return D.filter(c=>!BOOKS.includes(c.来源书目)).length }
function nodeCnt(n){ return D.filter(c=>(c.标签||[]).includes(n)).length }

// ── Sidebar ────────────────────────────────────────────────────
function switchTab(t){
  curTab=t; curSel=null;
  document.getElementById('tbooks').classList.toggle('active',t==='books');
  document.getElementById('tnodes').classList.toggle('active',t==='nodes');
  renderNav(); applyAll();
}

function renderNav(){
  const nav=document.getElementById('sbNav');
  let h='';
  const allActive=!curSel;
  if(curTab==='books'){
    h+=ni('全部','all','all',D.length,allActive,false);
    BOOKS.forEach(b=>{
      const cnt=bookCnt(b);
      const act=curSel&&curSel.t==='book'&&curSel.v===b;
      h+=ni(b,'book',b,cnt,act,false);
    });
    // 补充阅读固定在最后（兜底：来源书目不在 BOOKS 列表的案例）
    const sc=suppCnt();
    if(sc>0){
      const suppAct=curSel&&curSel.t==='supplement';
      h+=ni('补充阅读','supplement','',sc,suppAct,false);
    }
  } else {
    const taggedTotal=D.filter(c=>(c.标签||[]).length>0).length;
    h+=ni('全部（含标签案例）','all','all',taggedTotal,allActive,false);
    MODULES.forEach(([title,nodes])=>{
      h+=`<div class="nav-module">${title}</div>`;
      nodes.forEach(node=>{
        const cnt=nodeCnt(node);
        const act=curSel&&curSel.t==='node'&&curSel.v===node;
        h+=ni(node,'node',node,cnt,act,true);
      });
    });
    const untagged=D.filter(c=>!(c.标签||[]).length).length;
    if(untagged){
      h+=`<div class="nav-module">补充</div>`;
      const act=curSel&&curSel.t==='untagged';
      h+=ni('未标注（史实综述）','untagged','',untagged,act,true);
    }
  }
  nav.innerHTML=h;
}

function ni(label,type,val,cnt,active,indent){
  const cls=['nav-item',active?'active':'',type==='all'?'all':'',indent?'nav-indent':''].filter(Boolean).join(' ');
  return `<div class="${cls}" data-t="${type}" data-v="${e(val)}">
    <span>${e(label)}</span>
    <span class="nav-badge">${cnt}</span>
  </div>`;
}

// Event delegation for nav clicks — fixes HTML-escaping issues
document.getElementById('sbNav').addEventListener('click',ev=>{
  const item=ev.target.closest('.nav-item');
  if(!item) return;
  const t=item.dataset.t, v=item.dataset.v;
  curSel = (t==='all') ? null : {t,v};
  renderNav(); applyAll();
  if(window.innerWidth<768) closeSidebar();
});

// ── Filter & Sort ──────────────────────────────────────────────
function toggleChip(btn){
  const f=btn.dataset.f;
  if(curFilters.has(f)) curFilters.delete(f); else curFilters.add(f);
  btn.classList.toggle('on',curFilters.has(f));
  applyAll();
}

function applyAll(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const sort=document.getElementById('sortSel').value;
  let arr=[...D];

  if(curSel){
    if(curSel.t==='book')           arr=arr.filter(c=>c.来源书目===curSel.v);
    else if(curSel.t==='supplement')arr=arr.filter(c=>!BOOKS.includes(c.来源书目));
    else if(curSel.t==='node')      arr=arr.filter(c=>(c.标签||[]).includes(curSel.v));
    else if(curSel.t==='untagged')  arr=arr.filter(c=>!(c.标签||[]).length);
  }
  if(curFilters.has('hasImage')) arr=arr.filter(c=>c.image);
  if(curFilters.has('hasNote'))  arr=arr.filter(c=>c.批注&&c.批注.trim());
  if(q) arr=arr.filter(c=>
    [c['作品/事件名称'],c['作者/设计师'],c.年代,c.来源书目,c.简介,c.教学分析]
    .join(' ').toLowerCase().includes(q)
  );
  if(sort==='year-asc')    arr.sort((a,b)=>a.排序年-b.排序年);
  else if(sort==='year-desc')arr.sort((a,b)=>b.排序年-a.排序年);
  else arr.sort((a,b)=>(b.importance||0)-(a.importance||0));

  renderCards(arr);
  document.getElementById('statsbar').textContent=
    `显示 ${arr.length} / ${D.length} 个案例`;
}

// ── Cards ──────────────────────────────────────────────────────
function renderCards(arr){
  const g=document.getElementById('grid');
  if(!arr.length){g.innerHTML='<div class="empty">🔍 没有符合条件的案例</div>';return}
  g.innerHTML=arr.map(c=>card(c)).join('');
  g.querySelectorAll('.card').forEach(initLP);
}

function card(c){
  const dom=c.类别==='国内';
  const idx=c._i;
  const tags=(c.标签||[]);
  const imp=c.importance||0;
  const rawQuote=(c.原文引用||'').trim();
  const analysis=(c.教学分析||'').trim();
  const body=analysis;
  const note=(c.批注||'').trim();
  const link=(c.link||'').trim();
  // Shorten era: keep text up to first paren
  const era=(c.年代||'').replace(/[（(].*$/,'').trim().slice(0,20);

  // Parse ——书名/章节 prefix from quote
  let quoteText=rawQuote, chapter='';
  if(rawQuote.startsWith('——')){
    const nl=rawQuote.indexOf('\n');
    const header=nl>-1?rawQuote.slice(0,nl):rawQuote;
    quoteText=nl>-1?rawQuote.slice(nl+1).trim():'';
    const si=header.indexOf('/');
    if(si>-1) chapter=header.slice(si+1).trim();
    // also handle · separator with no /
    else { const m=header.match(/——[^·]*·(.+)/); if(m) chapter=m[1].trim(); }
  }

  const starsH=imp?`<div class="c-stars">${starsDisp(imp)}</div>`:'';

  const quoteH=quoteText?`<div class="quote">
    <div class="q-text">${e(quoteText)}</div>
    <span class="q-toggle" onclick="togQ(this)">展开 ▾</span>
  </div>`:'';

  const bodyH=body?`<div class="analysis">${bold(e(body))}</div>`:'';
  const imgH=c.image?`<img class="card-img" src="${c.image}" alt="">`:'';
  const noteH=note?`<div class="note"><div class="note-lbl">📌 批注</div>${e(note)}</div>`:'';
  const linkH=link?`<hr class="link-sep">
    <div class="link-row">🔗 <a href="${e(link)}" target="_blank" rel="noopener">${e(link.length>55?link.slice(0,55)+'…':link)}</a></div>
    <hr class="link-sep">`:'';

  // Tags: [国内/国外] [年代?] [subject tags...]
  const catCls=dom?'cat-dom':'cat-for';
  const catChip=`<span class="tag ${catCls}">${e(c.类别||'')}</span>`;
  const eraChip=era?`<span class="tag era-tag">${e(era)}</span>`:'';
  const nodeChips=tags.map(t=>`<span class="tag" data-node="${e(t)}">${e(t)}</span>`).join('');
  const tagsH=catChip+eraChip+nodeChips;

  // Meta: 来源书目 (+ 章节 if any), single line
  const src=(c.来源书目||'').replace(/[《》]/g,'');
  const metaH=`<div class="c-meta">${e(src)}${chapter?`<br><span class="c-chapter">${e(chapter)}</span>`:''}</div>`;

  return `<div class="card ${dom?'dom':'for'}" data-idx="${idx}">
  <button class="edit-btn" onclick="openEdit(${idx})">✎ 编辑</button>
  <div class="c-title-row">
    <div class="c-title">${e(c['作品/事件名称']||'')}</div>
    ${starsH}
  </div>
  ${quoteH}${bodyH}${imgH}${noteH}${linkH}
  <div class="c-foot">
    <div class="tags">${tagsH}</div>
    ${metaH}
  </div>
</div>`;
}

// Tag click → filter by node
document.getElementById('grid').addEventListener('click',ev=>{
  const tag=ev.target.closest('.tag');
  if(!tag) return;
  const node=tag.dataset.node;
  if(!node) return;
  curTab='nodes'; curSel={t:'node',v:node};
  document.getElementById('tbooks').classList.remove('active');
  document.getElementById('tnodes').classList.add('active');
  renderNav(); applyAll();
});

function starsDisp(r){
  let h='';
  for(let i=1;i<=5;i++){
    if(r>=i)      h+=`<span class="s full">★</span>`;
    else if(r>=i-.5) h+=`<span class="s half">★</span>`;
    else           h+=`<span class="s">★</span>`;
  }
  return h;
}
function togQ(btn){
  const t=btn.closest('.quote').querySelector('.q-text');
  const open=t.classList.toggle('open');
  btn.textContent=open?'收起 ▴':'展开 ▾';
}
function bold(s){return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}
function e(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Long press ─────────────────────────────────────────────────
let lpt=null;
function initLP(card){
  card.addEventListener('touchstart',()=>{
    lpt=setTimeout(()=>card.classList.add('lp'),480);
  },{passive:true});
  ['touchend','touchmove','touchcancel'].forEach(ev=>
    card.addEventListener(ev,()=>clearTimeout(lpt),{passive:true})
  );
  card.addEventListener('touchend',()=>
    setTimeout(()=>card.classList.remove('lp'),2500),{passive:true}
  );
}

// ── Edit Modal ──────────────────────────────────────────────────
function openEdit(idx){
  editIdx=idx; editImg=null;
  const c=D[idx];
  document.getElementById('mtitle').textContent=c['作品/事件名称']||'编辑案例';
  document.getElementById('mbody').innerHTML=buildForm(c);
  document.getElementById('mbd').classList.add('show');
  document.getElementById('mbox').classList.add('show');
}

function buildForm(c){
  const r=c.importance||0;
  const siClass=i=>r>=i?'si lit':r>=i-.5?'si half-lit':'si';
  const siChar =i=>r>=i?'★':r>=i-.5?'★':'☆';
  const starsIn=[1,2,3,4,5].map(i=>
    `<span class="spos" data-p="${i}"><span class="${siClass(i)}">${siChar(i)}</span></span>`
  ).join('');
  const imgSec=c.image
    ?`<div class="img-wrap"><img class="img-preview" src="${c.image}"><span class="img-rm" onclick="rmImg()">✕</span></div>`
    :`<div class="img-area" onclick="document.getElementById('imgFile').click()">📷 点击上传图片</div>`;

  // Tag editor: existing chips + input
  const existChips=(c.标签||[]).map(t=>
    `<span class="te-chip" data-v="${e(t)}">${e(t)}<button class="te-rm" type="button" onclick="rmTeChip(this)">×</button></span>`
  ).join('');
  const datalistOpts=ALL_NODES.map(n=>`<option value="${e(n)}">`).join('');

  return `
<div class="fg"><label class="fl">标题</label>
  <input class="fin" id="ftitle" type="text" value="${e(c['作品/事件名称']||'')}"></div>
<div class="fg"><label class="fl">原文引用</label>
  <textarea class="fta" id="fq" rows="4">${e(c.原文引用||'')}</textarea></div>
<div class="fg"><label class="fl">教学分析</label>
  <textarea class="fta" id="fa" rows="6">${e(c.教学分析||'')}</textarea></div>
<div class="fg"><label class="fl">批注</label>
  <textarea class="fta" id="fn" rows="3">${e(c.批注||'')}</textarea></div>
<div class="fg"><label class="fl">主题标签 <span class="opt">（输入后按 Enter 添加）</span></label>
  <div class="tag-editor" id="tagEditor" onclick="this.querySelector('.te-in').focus()">
    ${existChips}
    <input class="te-in" id="tagInput" list="nodeList" placeholder="选择或输入标签…" onkeydown="onTeKey(event)" oninput="onTeInput(event)">
  </div>
  <datalist id="nodeList">${datalistOpts}</datalist>
</div>
<div class="fg"><label class="fl">图片 <span class="opt">（可选）</span></label>
  <div id="imgArea">${imgSec}</div></div>
<div class="fg"><label class="fl">链接 <span class="opt">（可选）</span></label>
  <input class="fin" id="fl2" type="url" placeholder="https://…" value="${e(c.link||'')}"></div>
<div class="fg"><label class="fl">重要性 <span class="opt">（可选 · 单击½星 双击整星）</span></label>
  <div class="sinput" id="sinput" data-r="${r}">
    ${starsIn}
    <span class="sval" id="sval">${r>0?r+'星':'未评'}</span>
  </div></div>`;
}

// Star events via delegation
document.getElementById('mbox').addEventListener('click',ev=>{
  const sp=ev.target.closest('.spos');
  if(!sp) return;
  const p=parseInt(sp.dataset.p);
  const inp=document.getElementById('sinput');
  if(!inp) return;
  const cur=parseFloat(inp.dataset.r)||0;
  // Single click: set to p-0.5; if already p-0.5, clear back one step
  const nr=(cur===p-.5)?Math.max(0,p-1):p-.5;
  setStar(nr);
});
document.getElementById('mbox').addEventListener('dblclick',ev=>{
  const sp=ev.target.closest('.spos');
  if(!sp) return;
  const p=parseInt(sp.dataset.p);
  const inp=document.getElementById('sinput');
  if(!inp) return;
  const cur=parseFloat(inp.dataset.r)||0;
  const nr=(cur===p)?p-.5:p;
  setStar(nr);
});

function setStar(r){
  r=Math.max(0,Math.min(5,r));
  const inp=document.getElementById('sinput');
  if(!inp) return;
  inp.dataset.r=r;
  inp.querySelectorAll('.spos').forEach((sp,i)=>{
    const si=sp.querySelector('.si');
    const n=i+1;
    if(r>=n)        { si.className='si lit';      si.textContent='★' }
    else if(r>=n-.5){ si.className='si half-lit'; si.textContent='★' }
    else             { si.className='si';          si.textContent='☆' }
  });
  document.getElementById('sval').textContent=r>0?r+'星':'未评';
}

// Tag editor helpers
function rmTeChip(btn){ btn.closest('.te-chip').remove(); }

function onTeKey(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const v=e.target.value.trim().replace(/,/g,'');
    if(v) addTeChip(v);
    e.target.value='';
  } else if(e.key==='Backspace'&&!e.target.value){
    const chips=document.querySelectorAll('#tagEditor .te-chip');
    if(chips.length) chips[chips.length-1].remove();
  }
}

function onTeInput(e){
  // Auto-add when user selects from datalist (value matches exactly)
  const v=e.target.value.trim();
  if(ALL_NODES.includes(v)){ addTeChip(v); e.target.value=''; }
}

function addTeChip(v){
  const ed=document.getElementById('tagEditor');
  const inp=document.getElementById('tagInput');
  const existing=[...ed.querySelectorAll('.te-chip')].map(c=>c.dataset.v);
  if(existing.includes(v)) return;
  const chip=document.createElement('span');
  chip.className='te-chip'; chip.dataset.v=v;
  chip.innerHTML=`${e(v)}<button class="te-rm" type="button" onclick="rmTeChip(this)">×</button>`;
  ed.insertBefore(chip,inp);
}

function onImgPick(ev){
  const f=ev.target.files[0];
  if(!f) return;
  const rd=new FileReader();
  rd.onload=e=>{
    editImg=e.target.result;
    document.getElementById('imgArea').innerHTML=
      `<div class="img-wrap"><img class="img-preview" src="${editImg}"><span class="img-rm" onclick="rmImg()">✕</span></div>`;
  };
  rd.readAsDataURL(f);
  ev.target.value='';
}
function rmImg(){
  editImg='';
  document.getElementById('imgArea').innerHTML=
    `<div class="img-area" onclick="document.getElementById('imgFile').click()">📷 点击上传图片</div>`;
}

function saveEdit(){
  if(editIdx===null) return;
  const c=D[editIdx];
  const newTitle=document.getElementById('ftitle').value.trim();
  if(newTitle) c['作品/事件名称']=newTitle;
  c.原文引用 = document.getElementById('fq').value;
  c.教学分析  = document.getElementById('fa').value;
  c.批注     = document.getElementById('fn').value;
  c.link     = document.getElementById('fl2').value;
  if(editImg!==null) c.image=editImg;
  const inp=document.getElementById('sinput');
  if(inp) c.importance=parseFloat(inp.dataset.r)||0;
  // Save tags
  const tagChips=document.querySelectorAll('#tagEditor .te-chip');
  // Also check if there's a partial typed tag to commit
  const tagInpVal=(document.getElementById('tagInput')||{}).value?.trim();
  const tagArr=[...tagChips].map(ch=>ch.dataset.v);
  if(tagInpVal) tagArr.push(tagInpVal);
  c.标签=tagArr;
  editImg=null;
  closeModal(); applyAll();
}
function closeModal(){
  document.getElementById('mbd').classList.remove('show');
  document.getElementById('mbox').classList.remove('show');
  editIdx=null;
}

// ── Mobile sidebar ─────────────────────────────────────────────
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── Export ─────────────────────────────────────────────────────
function exportJSON(){
  const out=D.map(c=>{const {_i,...r}=c;return r;});
  const a=Object.assign(document.createElement('a'),{
    href:URL.createObjectURL(new Blob([JSON.stringify(out,null,2)],{type:'application/json'})),
    download:'案例库_export.json'
  });
  a.click(); URL.revokeObjectURL(a.href);
}

// ── Init ────────────────────────────────────────────────────────
renderNav(); applyAll();
</script>
</body>
</html>
