<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Art-case</title>
<style>
:root{
  --sw:256px; --th:54px;
  /* Brand palette */
  --black:#111111; --beige:#c4b5a7; --purple:#9b7ed4; --cream:#f5efe7;
  /* Layout */
  --bg:#fdfaf6; --sb:#ffffff; --bd:transparent;
  /* Primary / accent */
  --p:#191919; --pl:#ede8f6; --acc:#9b7ed4;
  /* 国内 — warm beige */
  --dom:#8c7f75; --doml:#f0e8df; --domdk:#5c4e42;
  /* 国外 — lavender */
  --for:#9b7ed4; --forl:#ede8f6; --fordk:#7a5eb8;
  /* Misc */
  --muted:#7a6b5e; --text:#191919; --star:#9b7ed4;
  --amber:#fdf5e8; --amberbd:transparent; --ambertext:#6b4820;
  --r:10px; --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",Arial,sans-serif;
  background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}
a{color:var(--acc);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Layout ── */
.layout{display:flex;height:100vh;overflow:hidden}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40}
.overlay.show{display:block}

/* ── Sidebar ── */
.sidebar{
  width:var(--sw);min-width:var(--sw);height:100vh;
  background:var(--sb);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;z-index:50;
  transition:transform .22s ease;
}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid var(--bd)}
.brand{font-size:20px;font-weight:700;color:var(--p);line-height:1.2;margin-bottom:12px;letter-spacing:-.3px}
.vtabs{display:flex;background:#fdfaf6;border-radius:8px;padding:3px;gap:2px}
.vtab{
  flex:1;padding:6px 4px;font-size:12px;font-weight:600;border-radius:6px;
  color:var(--muted);transition:all .15s;
}
.vtab.active{background:#fff;color:var(--p);box-shadow:0 1px 3px rgba(0,0,0,.1)}

.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:#fff;border-radius:2px}

.nav-module{
  padding:10px 14px 3px;font-size:10px;font-weight:700;
  color:var(--muted);letter-spacing:.8px;text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;justify-content:space-between;
  margin:1px 8px;padding:6px 10px;font-size:13px;color:#191919;cursor:pointer;
  border-radius:7px;transition:background .1s,color .1s;
  user-select:none;
}
.nav-item:hover{background:#fdfaf6;color:var(--p)}
.nav-item.active{
  background:#ede8f6;color:var(--acc);font-weight:600;
}
.nav-item.all{font-weight:700;color:var(--p)}
.nav-indent{padding-left:20px}
.nav-badge{
  font-size:11px;color:var(--muted);background:#fdfaf6;
  padding:1px 6px;border-radius:10px;flex-shrink:0;
}
.nav-item.active .nav-badge{background:#ede8f6;color:var(--acc)}

.sb-foot{padding:12px 14px;border-top:1px solid var(--bd);flex-shrink:0}
.sb-stats{font-size:11px;color:var(--muted);text-align:center;margin-bottom:8px}
.export-btn{
  width:100%;padding:9px;background:var(--p);color:#fff;
  border-radius:8px;font-size:13px;font-weight:600;transition:background .15s;
}
.export-btn:hover{background:var(--acc)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  padding:9px 14px;background:var(--sb);border-bottom:1px solid var(--bd);
}
.hamburger{
  display:none;width:34px;height:34px;border-radius:7px;
  flex-direction:column;justify-content:center;gap:4px;padding:6px;flex-shrink:0;
}
.hamburger span{display:block;width:100%;height:2px;background:var(--p);border-radius:2px}
.hamburger:hover{background:#f0ebe4}
.search-wrap{
  flex:1;min-width:0;display:flex;align-items:center;gap:7px;
  background:#fdfaf6;border:1px solid #f6f1ec;border-radius:8px;
  padding:0 10px;transition:border-color .15s,background .15s;
}
.search-wrap:focus-within{border-color:var(--acc);background:#fff}
.search-icon{color:var(--muted);font-size:13px;flex-shrink:0}
#searchInput{
  flex:1;border:none;background:none;outline:none;padding:7px 0;
  font-size:13px;color:var(--text);min-width:0;
}
#searchInput::placeholder{color:var(--muted)}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sort-select{
  padding:6px 8px;border:1px solid #f6f1ec;border-radius:7px;
  font-size:12px;font-family:inherit;background:#fdfaf6;color:var(--text);
  cursor:pointer;outline:none;transition:border-color .15s;
}
.sort-select:focus{border-color:var(--acc)}
.filter-chip{
  padding:5px 9px;font-size:12px;font-weight:500;
  border:1px solid #f6f1ec;border-radius:7px;
  color:var(--muted);background:#fdfaf6;
  transition:all .15s;white-space:nowrap;
}
.filter-chip:hover{border-color:var(--acc);color:var(--acc);background:#fdf5e8}
.filter-chip.on{background:#ede8f6;color:#9b7ed4;border-color:transparent}

/* ── Stats bar ── */
.statsbar{
  padding:6px 14px;font-size:12px;color:var(--muted);
  border-bottom:1px solid var(--bd);background:var(--sb);flex-shrink:0;
}

/* ── Cards area ── */
.cards-area{flex:1;overflow-y:auto;padding:14px}
.cards-area::-webkit-scrollbar{width:5px}
.cards-area::-webkit-scrollbar-thumb{background:#e2d8cf;border-radius:3px}
.grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:1000px){.grid{grid-template-columns:1fr 1fr}}
.empty{
  grid-column:1/-1;text-align:center;padding:64px 20px;
  color:var(--muted);font-size:15px;
}

/* ── Card ── */
.card{
  background:#fff;border-radius:var(--r);border:1px solid #f6f1ec;
  padding:15px;position:relative;
  display:flex;flex-direction:column;gap:9px;
}

/* Edit button — hidden until hover/longpress */
.edit-btn{
  position:absolute;top:10px;right:10px;
  padding:3px 9px;font-size:11px;font-weight:600;
  background:#fff;border:1px solid #f6f1ec;border-radius:6px;
  color:var(--muted);opacity:0;transition:opacity .15s,background .15s,color .15s;
  z-index:2;
}
.edit-btn:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
@media(hover:hover){.card:hover .edit-btn{opacity:1}}
.card.lp .edit-btn{opacity:1}

/* Card inner */
.c-title-row{display:flex;align-items:flex-start;gap:8px;padding-right:68px}
.c-title{font-size:15px;font-weight:700;color:var(--p);line-height:1.4;flex:1;min-width:0}
.c-stars{display:flex;gap:1px;flex-shrink:0;margin-top:3px}
.c-stars .s{font-size:14px;color:#d4c8be;display:inline-block;position:relative}
.c-stars .s.full{color:var(--star)}
.c-stars .s.half{color:#d4c8be}
.c-stars .s.half::after{
  content:"★";color:var(--star);position:absolute;
  left:0;top:0;width:50%;overflow:hidden;display:inline-block;
}

.quote{
  background:#fefaf7;border-radius:6px;padding:8px 10px;
  font-size:12px;color:#7a6b5e;line-height:1.7;
}
.q-text{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.q-text.open{display:block}
.q-toggle{font-size:11px;color:var(--acc);cursor:pointer;margin-top:3px;display:inline-block}

.analysis{font-size:13px;color:#191919;line-height:1.75}
.note{
  background:var(--amber);border-radius:7px;
  padding:9px 11px;font-size:12px;color:var(--ambertext);line-height:1.65;
}
.note-lbl{font-size:10px;font-weight:700;color:#6b4820;margin-bottom:4px;letter-spacing:.3px}
.card-img{width:100%;border-radius:6px;max-height:220px;object-fit:cover}

.link-sep{border:none;border-top:1px solid #e8e0d8}
.link-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}

/* Card footer: tags left, meta right */
.c-foot{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap}
.tags{display:flex;flex-wrap:wrap;gap:4px;flex:1;min-width:0}
.tag{
  display:inline-block;padding:2px 7px;border-radius:4px;
  font-size:11px;font-weight:500;background:#fdfaf6;
  color:#191919;border:1px solid #f6f1ec;cursor:pointer;
}
.no-tag{font-size:11px;color:#b0a49c;font-style:italic}
.tag.cat-dom{background:var(--dom);color:#fff;border-color:var(--dom)}
.tag.cat-for{background:var(--dom);color:#fff;border-color:var(--dom)}
.tag.era-tag{background:var(--dom);color:#fff;border-color:var(--dom)}
.c-chapter{font-size:10px;color:#b0a49c}
.c-meta{
  font-size:11px;color:var(--muted);text-align:right;
  flex-shrink:0;white-space:nowrap;
}
.c-cat{
  display:inline-block;padding:1px 5px;border-radius:3px;
  font-size:10px;font-weight:700;margin-left:2px;
}
.c-cat.dom{background:var(--doml);color:var(--domdk)}
.c-cat.for{background:var(--forl);color:var(--fordk)}

/* ── Modal ── */
.mbd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100}
.mbd.show{display:block}
.mbox{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(600px,95vw);max-height:90vh;background:#fff;border-radius:12px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);z-index:101;
  flex-direction:column;overflow:hidden;
}
.mbox.show{display:flex}
.mhead{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--bd);flex-shrink:0;
}
.mhead h3{font-size:15px;font-weight:700;color:var(--p)}
.mclose{
  width:28px;height:28px;border-radius:6px;font-size:16px;
  color:var(--muted);display:flex;align-items:center;justify-content:center;
}
.mclose:hover{background:#fdfaf6}
.mbody{flex:1;overflow-y:auto;padding:18px}
.mbody::-webkit-scrollbar{width:4px}
.mbody::-webkit-scrollbar-thumb{background:#d4c8be}
.mfoot{
  display:flex;gap:8px;justify-content:flex-end;
  padding:12px 18px;border-top:1px solid var(--bd);flex-shrink:0;
}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:600;color:#191919;margin-bottom:5px}
.fl .opt{color:var(--muted);font-weight:400;margin-left:3px}
.fta,.fin{
  width:100%;padding:7px 9px;border:1px solid #f6f1ec;border-radius:7px;
  font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;
}
.fta{resize:vertical;min-height:72px}
.fta:focus,.fin:focus{border-color:var(--acc)}
/* Tag editor */
.tag-editor{
  display:flex;flex-wrap:wrap;align-items:center;gap:5px;
  padding:6px 8px;border:1px solid #f6f1ec;border-radius:7px;
  background:#fff;min-height:38px;cursor:text;transition:border-color .15s;
}
.tag-editor:focus-within{border-color:var(--acc)}
.te-chip{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 7px;border-radius:4px;font-size:12px;
  background:#ede8f6;color:var(--acc);border:1px solid #d8ceef;
}
.te-rm{
  font-size:11px;color:#c4b5e8;padding:0 1px;line-height:1;
  border-radius:2px;transition:color .1s;
}
.te-rm:hover{color:#ef4444}
.te-in{
  border:none;outline:none;font-size:13px;font-family:inherit;
  flex:1;min-width:100px;background:transparent;padding:2px 4px;color:var(--text);
}
.img-area{
  border:2px dashed #f6f1ec;border-radius:8px;padding:20px;
  text-align:center;cursor:pointer;color:var(--muted);font-size:13px;
  transition:border-color .15s;
}
.img-area:hover{border-color:var(--acc);color:var(--acc)}
.img-wrap{position:relative;display:inline-block}
.img-preview{max-width:100%;max-height:130px;border-radius:6px;display:block}
.img-rm{
  position:absolute;top:-7px;right:-7px;width:20px;height:20px;
  border-radius:50%;background:#dc2626;color:#fff;font-size:11px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
/* Star input */
.sinput{display:flex;align-items:center;gap:3px}
.spos{font-size:22px;cursor:pointer;user-select:none;line-height:1;display:inline-block}
.spos:hover{transform:scale(1.15)}
.spos .si{color:#d4c8be;transition:color .1s;display:inline-block;position:relative}
.spos .si.lit{color:var(--star)}
.spos .si.half-lit{color:#d4c8be}
.spos .si.half-lit::after{
  content:"★";color:var(--star);position:absolute;
  left:0;top:0;width:50%;overflow:hidden;display:inline-block;
}
.sval{font-size:12px;color:var(--muted);margin-left:8px}
.bsave{
  padding:8px 20px;background:var(--p);color:#fff;border-radius:8px;
  font-size:13px;font-weight:600;transition:background .15s;
}
.bsave:hover{background:var(--acc)}
.bcancel{
  padding:8px 15px;background:#fdfaf6;color:#191919;
  border-radius:8px;font-size:13px;font-weight:600;
}
.bcancel:hover{background:#f0ebe4}
/* Mobile */
@media(max-width:767px){
  .hamburger{display:flex}
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sort-select .long{display:none}
  .cards-area{padding:10px}
}
/* Narrow phones: filters wrap below search */
@media(max-width:440px){
  .topbar{flex-wrap:wrap;row-gap:7px}
  .search-wrap{flex-basis:0;flex-grow:1}
  .tb-right{width:100%;gap:6px;justify-content:flex-start}
  .sort-select{flex:1;min-width:0}
}
@media(max-width:500px){
  .filter-chip span{display:none}
  .tb-right{gap:4px}
}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="layout">

<aside class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="brand">Art Cases</div>
    <div class="vtabs">
      <button class="vtab active" id="tbooks" onclick="switchTab('books')">学科汇总</button>
      <button class="vtab"        id="tnodes" onclick="switchTab('nodes')">主题案例</button>
    </div>
  </div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-foot">
    <div class="sb-stats" id="sbStats">265 个案例</div>
    <button class="export-btn" onclick="exportJSON()">↓ 导出 JSON</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hbg" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="search" id="searchInput" placeholder="搜索案例名称、作者、年代…" oninput="applyAll()">
    </div>
    <div class="tb-right">
      <select class="sort-select" id="sortSel" onchange="applyAll()">
        <option value="year-asc">↑ 时间从远到近</option>
        <option value="year-desc">↓ 时间从近到远</option>
        <option value="importance">★ 重要性从高到低</option>
      </select>
      <button class="filter-chip" data-f="hasImage" onclick="toggleChip(this)">🖼 <span>有图片</span></button>
      <button class="filter-chip" data-f="hasNote"  onclick="toggleChip(this)">📝 <span>有批注</span></button>
    </div>
  </div>
  <div class="statsbar" id="statsbar">加载中…</div>
  <div class="cards-area">
    <div class="grid" id="grid"></div>
  </div>
</div>
</div>

<!-- Modal -->
<div class="mbd" id="mbd" onclick="closeModal()"></div>
<div class="mbox" id="mbox">
  <div class="mhead">
    <h3 id="mtitle">编辑案例</h3>
    <button class="mclose" onclick="closeModal()">✕</button>
  </div>
  <div class="mbody" id="mbody"></div>
  <div class="mfoot">
    <button class="bsave" onclick="saveEdit()">保存</button>
    <button class="bcancel" onclick="closeModal()">取消</button>
  </div>
</div>

<script>
const ORIGINAL  = [{"类别":"国内","年代":"新石器时代（约公元前8000—前2000年）","排序年":-8000,"作品/事件名称":"新石器时代骨牙雕刻与装饰品","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"新石器时代的骨牙雕刻与装饰品，反映了早期人类对非物质意义（图腾、巫术）的物质化表达。","原文引用":"","教学分析":"","批注":"","标签":["1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国内","年代":"新石器时代至近代（跨朝代）","排序年":-7000,"作品/事件名称":"丝绸与陶瓷：中国文明物质传播的双轨","作者/设计师":"（历代工匠）","来源书目":"《中国工艺美术史新编》","简介":"\"丝绸图案长期主宰着中国装饰的潮流\"，陶器演化出瓷器\"始终是应用最多的容器类型\"——这两条线索的联系与发展构成了中国工艺美术史的主干叙事…","原文引用":"——《中国工艺美术史新编》/ 第一章·第五节\n不过，最有意义的还是丝绸和陶器的发明。丝绸不仅是理想的服用面料，其图案还长期主宰着中国装饰的潮流，而陶器和由它在东汉演化出的瓷器，则始终是应用最多的容器类型。在后代，中国丝绸和陶瓷艺术成就辉煌，产量渐次增加，技术不断创新，提高了人类的物质生活水平，成为中国工艺美术尤其重要的门类。","教学分析":"\"丝绸图案**长期主宰着中国装饰的潮流**\"，陶器演化出瓷器\"**始终是应用最多的容器类型**\"——这两条线索的联系与发展构成了中国工艺美术史的**主干叙事**。教师可以此为框架引导学生理解：**技术发明（陶→瓷）与材料延续（蚕丝），如何在不同历史语境中被反复赋予新的文化意义**，并借助丝绸之路成为中华文明向外传播的物质媒介。","批注":"","标签":[],"image":"","link":"","importance":0},{"类别":"国内","年代":"仰韶文化（约公元前5000—前3000年）","排序年":-5000,"作品/事件名称":"仰韶彩陶——半坡类型与庙底沟类型","作者/设计师":"","来源书目":"《中国美术简史》","简介":"仰韶文化半坡类型　高23cm　红陶　陕西洛南出土　彩-3　　错金银骑士刺虎纹镜　战国　直径17.5cm　青铜　传出洛阳金村　现藏日本永青文库　彩-4　　舞蹈纹彩陶盆　马家窑文化　高14cm　红陶　青海大通上孙家寨出土　彩-5　　陶塑跪射佣　秦　高120cm　灰陶　陕西临潼西杨村秦俑二号坑出土　彩-6　　T字形帛画　西汉…","原文引用":"仰韶文化半坡类型　高23cm　红陶　陕西洛南出土　彩-3　　错金银骑士刺虎纹镜　战国　直径17.5cm　青铜　传出洛阳金村　现藏日本永青文库　彩-4　　舞蹈纹彩陶盆　马家窑文化　高14cm　红陶　青海大通上孙家寨出土　彩-5　　陶塑跪射佣　秦　高120cm　灰陶　陕西临潼西杨村秦俑二号坑出土　彩-6　　T字形帛画　西汉　纵205cm　丝帛　湖南长沙马王堆一号墓出土　彩-7　　鸿门宴壁画　西汉晚期　高23cm　壁画　河南洛阳烧沟61号　西汉墓后室后壁　彩-8","教学分析":"","批注":"","标签":["1.4 具象与抽象","1.2 二元与多元"],"image":"","link":"","importance":0},{"类别":"国内","年代":"约公元前4800—前4300年（仰韶文化）","排序年":-4800,"作品/事件名称":"仰韶彩陶：从写实鱼纹到几何纹的抽象化过程","作者/设计师":"（新石器时代先民）","来源书目":"《中国工艺美术史新编》","简介":"仰韶彩陶纹样\"装饰纹样繁多，主要为抽象的几何形，也有少量的写实动物\"。考古学揭示了一个关键过程：写实鱼纹在演化中逐步几何化、符号化，最终成为纯抽…","原文引用":"——《中国工艺美术史新编》/ 第一章·第二节\n仰韶文化1921年首先发现于河南滝池的仰韶村，因发现时间最早,又地处华夏文明的中心地区，故声名赫赫。其陶器以砂质和泥质的红陶为主，并有少量褐陶、橙黄陶、灰陶与黑陶。器物多以捏塑、泥条盘筑法成形，有些以慢轮修整。仰韶文化的彩陶多为泥质的钵、盆、盂。图案常绘在陶衣上，色彩以红、黑、白为主，兼有少量棕褐、赭、橙黄色。装饰纹样繁多，主要为抽象的几何形，也有少量的写实动物等。","教学分析":"仰韶彩陶纹样\"**装饰纹样繁多，主要为抽象的几何形，也有少量的写实动物**\"。考古学揭示了一个关键过程：写实鱼纹在演化中逐步**几何化、符号化**，最终成为纯抽象图案。这是人类视觉史上**最早的抽象化案例之一**，说明抽象并非20世纪的西方发明，而是**人类图像思维的普遍冲动**。教师可引导学生讨论：这种抽象化是**有意识的审美选择**，还是传播中的**信息简化**？","批注":"","标签":["1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国内","年代":"约公元前4800—前2000年","排序年":-4800,"作品/事件名称":"新石器彩陶：集体创作与匿名艺术的大众性","作者/设计师":"（新石器时代先民，集体匿名）","来源书目":"《中国工艺美术史新编》","简介":"新石器时代彩陶是集体、匿名、实用的创作，没有\"艺术家\"的个人署名，也没有\"精英\"的专属消费——这与后代宫廷工艺美术的精英性形成根本对比。教师可引…","原文引用":"——《中国工艺美术史新编》/ 第一章·第二节\n仰韶文化1921年首先发现于河南滝池的仰韶村，因发现时间最早,又地处华夏文明的中心地区，故声名赫赫。其陶器以砂质和泥质的红陶为主，并有少量褐陶、橙黄陶、灰陶与黑陶。器物多以捏塑、泥条盘筑法成形，有些以慢轮修整。仰韶文化的彩陶多为泥质的钵、盆、盂。图案常绘在陶衣上，色彩以红、黑、白为主，兼有少量棕褐、赭、橙黄色。装饰纹样繁多，主要为抽象的几何形，也有少量的写实动物等。","教学分析":"新石器时代彩陶是**集体、匿名、实用**的创作，没有\"艺术家\"的个人署名，也没有\"精英\"的专属消费——这与后代宫廷工艺美术的**精英性**形成根本对比。教师可引导学生反思：**我们今天以\"艺术史\"眼光审视这些器物，是否在将一个本无\"艺术\"概念的生产物强行纳入精英叙事**？这个追问触及艺术史学科本身的**意识形态前提**。","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国内","年代":"红山文化（约公元前3500—前3000年）","排序年":-3500,"作品/事件名称":"红山文化玉器——C形龙与勾云纹","作者/设计师":"","来源书目":"《中国美术简史》","简介":"河姆渡文化与嘉兴的马家浜文化，上海青浦的崧泽文化，江苏南京的北阴阳营文化，安徽潜山的薛家岗文化及含山的凌家滩文化。辽西及燕山北麓地区有敖汉旗的赵宝沟文化及赤峰的红山文化。珠江三角洲有咸头岭文化（或称大湾文化）。台湾有台北县的大坌坑文化。黑龙江有密山县的新开流文化。本期农业与手工业出现分工，生产规模扩大；到本期后段，手工…","原文引用":"河姆渡文化与嘉兴的马家浜文化，上海青浦的崧泽文化，江苏南京的北阴阳营文化，安徽潜山的薛家岗文化及含山的凌家滩文化。辽西及燕山北麓地区有敖汉旗的赵宝沟文化及赤峰的红山文化。珠江三角洲有咸头岭文化（或称大湾文化）。台湾有台北县的大坌坑文化。黑龙江有密山县的新开流文化。本期农业与手工业出现分工，生产规模扩大；到本期后段，手工业内部也有了新的分工。彩陶艺术十分流行，琢玉已成独立的部门。私有制已经出现，作为记事的刻画符号得到广泛采用。本期前段，流行向心式的聚落布局及氏族公共墓地，血缘纽带还比较牢固；本期后段，出现氏族权贵，红山文化出现坛、庙、冢等礼制性建筑，屈家岭文化出现城堡，社会处于剧烈的动荡变革之中。","教学分析":"","批注":"","标签":["1.5 物质与非物质","1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国内","年代":"约公元前3000年（马家窑文化）","排序年":-3000,"作品/事件名称":"彩陶几何纹与写实纹的二元并存","作者/设计师":"（新石器时代先民）","来源书目":"《中国工艺美术史新编》","简介":"马家窑彩陶同时出现几何纹（抽象）与动物、人物纹（写实）两种倾向，彩陶艺术在此达到顶峰。这说明具象与抽象并非进化论意义上的先后阶段，而是人…","原文引用":"——《中国工艺美术史新编》/ 第一章·第二节\n2.马家窑文化彩陶马家窑文化1924年首先发现于甘肃临洗马家窑村，主要分布在甘肃中部与青海东北部，也远及四川北部、宁夏东南部，约从公元前3000年延续到公元前190。年。马家窑文化陶器分砂质红陶、泥质红陶、泥质灰陶等几种，器形有盆、钵、壶、瓮、罐、瓶等。彩陶花纹多为黑彩或黑红兼施，绘制于橙黄或红地上，纹样以几何形为主，动物、人物为辅，题材丰富，行笔流畅，装饰繁满。其彩陶数量众多，装饰丰富，屮国彩陶艺术至此达到顶峰。典型出在青海乐都的柳湾，1974—1978年，对那里的170。余座墓葬进行发掘，获得陶器逾万，其中，彩陶壶、罐达8000余件。彩陶常饰有内填图案的圆环，内填的图案多达414种。","教学分析":"马家窑彩陶同时出现**几何纹（抽象）**与**动物、人物纹（写实）**两种倾向，彩陶艺术在此达到顶峰。这说明**具象与抽象并非进化论意义上的先后阶段**，而是人类视觉思维的两种**同等有效的策略**。教师可借此破除\"艺术从具象进化到抽象\"的线性迷思，引导学生理解：**装饰纹样的抽象化往往是主动的符号化选择，而非对写实能力不足的补偿**。","批注":"","标签":["1.2 二元与多元"],"image":"","link":"","importance":0},{"类别":"国内","年代":"约公元前3000—前1900年","排序年":-3000,"作品/事件名称":"马家窑彩陶：地域性风格与彩陶顶峰","作者/设计师":"（甘肃-青海先民）","来源书目":"《中国工艺美术史新编》","简介":"马家窑文化主要分布在甘肃、青海，\"中国彩陶艺术至此达到顶峰\"——这一顶峰并非出现在中原华夏文明中心，而是在西北边缘地带。这挑战了\"中原中心主义\"…","原文引用":"——《中国工艺美术史新编》/ 第一章·第二节\n2.马家窑文化彩陶马家窑文化1924年首先发现于甘肃临洗马家窑村，主要分布在甘肃中部与青海东北部，也远及四川北部、宁夏东南部，约从公元前3000年延续到公元前190。年。马家窑文化陶器分砂质红陶、泥质红陶、泥质灰陶等几种，器形有盆、钵、壶、瓮、罐、瓶等。彩陶花纹多为黑彩或黑红兼施，绘制于橙黄或红地上，纹样以几何形为主，动物、人物为辅，题材丰富，行笔流畅，装饰繁满。其彩陶数量众多，装饰丰富，屮国彩陶艺术至此达到顶峰。典型出在青海乐都的柳湾，1974—1978年，对那里的170。余座墓葬进行发掘，获得陶器逾万，其中，彩陶壶、罐达8000余件。彩陶常饰有内填图案的圆环，内填的图案多达414种。","教学分析":"马家窑文化主要分布在甘肃、青海，\"**中国彩陶艺术至此达到顶峰**\"——这一顶峰并非出现在中原华夏文明中心，而是在**西北边缘地带**。这挑战了\"中原中心主义\"的历史叙事，证明**边缘地区可能在特定工艺门类上领先于中心**。马家窑的高峰期与中原仰韶文化晚期的装饰衰减形成对比，说明文明演进在地域间的**非同步性**。","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国内","年代":"约公元前2600—前2000年（龙山文化时期）","排序年":-2600,"作品/事件名称":"良渚玉器：象征体系的图像建构","作者/设计师":"（良渚先民）","来源书目":"《中国工艺美术史新编》","简介":"良渚玉琮外方内圆、神人兽面纹极度精细微小——需借助放大镜才能看清。这种非视觉性的精微刻绘说明良渚玉器的意义不在视觉欣赏，而在于符号象征的神圣性：…","原文引用":"——《中国工艺美术史新编》/ 第一章·第三节\n鸡骨白、淡绿、暗绿、米黄等是良渚玉器常见的呈色，玉材多为透闪石，也有阳起石和蛇纹石。作品有钺、琮、琮形管、璧、环、璜、纺轮、半圆形饰、串饰、冠形饰、牌饰、坠饰、项饰、三叉形器、锥形器、镯、蛙、鱼、蝉、鸟等。","教学分析":"良渚玉琮外方内圆、神人兽面纹极度精细微小——需借助放大镜才能看清。这种**非视觉性的精微刻绘**说明良渚玉器的意义不在视觉欣赏，而在于**符号象征的神圣性**：**图像的具象程度与其社会功能无关，反而越是隐秘细小的刻纹，越指向权力与宗教的神秘维度**。这挑战了\"具象=可见=有功能\"的常识逻辑。","批注":"","标签":["1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国内","年代":"龙山文化（约公元前2600—前2000年）","排序年":-2600,"作品/事件名称":"龙山黑陶","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"原龙山文化大墓里的作品颇精美，多施黑陶衣，再以红、黄、白等色彩绘，也有红地绘黄、白纹者。花纹工整，有些形象似夔，而蟠龙纹大盘【图1・23】尤其引人瞩目。它们与成套的礼器同时出土，因此，也被判断为礼器。此外，在东北的红山文化晚期遗址，也有应当同祭祀联系的彩绘陶出土…","原文引用":"原龙山文化大墓里的作品颇精美，多施黑陶衣，再以红、黄、白等色彩绘，也有红地绘黄、白纹者。花纹工整，有些形象似夔，而蟠龙纹大盘【图1・23】尤其引人瞩目。它们与成套的礼器同时出土，因此，也被判断为礼器。此外，在东北的红山文化晚期遗址，也有应当同祭祀联系的彩绘陶出土。","教学分析":"","批注":"","标签":["4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"新石器—商周（约公元前2000—前771年）","排序年":-2000,"作品/事件名称":"青铜礼器的传统延续：陶→铜→瓷的形制传承","作者/设计师":"（历代工匠）","来源书目":"《中国工艺美术史新编》","简介":"陶器的\"袋足\"被青铜鬲沿用，陶盆碗的比例在后世仍为经典，玉琮甚至到清代还被高档瓷器取法——一种形制可以在不同材质中跨越数千年持续存活。这揭示了中…","原文引用":"——《中国工艺美术史新编》/ 第二章·第三节\n段。而其兽面纹到商成为主要的装饰纹样，至于爵、角、塁、噩等所占比例甚高，则开了商代酒器众多的先河。进入商代，青铜器逐渐增多。二里岗文化是商早期文明的代表，其中心区地域与二里头文化大致重合，但向四方发展更远。二里岗所在的郑州曾是商的都城，出土器物最多，也最典型。青铜礼器已形成较完整的系统，酒器、食器及水器都有不少发现。虽然酒器最多，礼器的组合以觥、爵、穽为中心，但作为食器的鼎，地位突出，有些形体很大，特别是方鼎。合范技术已经相当　040中国工艺美术史新编已知商代早中期最大的青铜鼎。类似的造型与装饰以后也能见到。","教学分析":"陶器的\"**袋足**\"被青铜鬲沿用，陶盆碗的比例在后世仍为经典，玉琮甚至到清代还被高档瓷器取法——**一种形制可以在不同材质中跨越数千年持续存活**。这揭示了中国工艺美术传统的**惊人持续性**：形制（传统）超越了材质与技术（当代性）而独立存在。教师可引导学生思考：**形制的传承是文化保守主义，还是一种创造性的再语境化**？","批注":"","标签":["2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国内","年代":"商代（约公元前1600—前1046年）","排序年":-1600,"作品/事件名称":"饕餮纹——商代青铜器的主体纹样","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"饕餮纹是商代青铜器最具代表性的纹样，介于具象与抽象之间，兼具神秘威慑与宗教象征功能。","原文引用":"","教学分析":"","批注":"","标签":["1.4 具象与抽象","1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国内","年代":"商代（约公元前1600—前1046年）","排序年":-1600,"作品/事件名称":"商代青铜器纹样——饕餮纹与神秘主义","作者/设计师":"","来源书目":"《中国美术简史》","简介":"龟、玉蝉、玉虎、玉猪、玉豹等为特色。山东龙山文化出土玉器较多，器形以生产工具形的礼器如玉斧、玉铲、玉锛等为特色，还有璿玑等礼器，玉锛上的兽面纹可视为商代青铜器上饕餮纹的祖型。良渚文化玉器所用玉料也出自当地，玉质不如北方，但已是较成熟的礼器，并在墓葬中出现了一定的组合规律，符合《周礼》所谓“苍璧礼天，黄琮礼地”之制，器形…","原文引用":"龟、玉蝉、玉虎、玉猪、玉豹等为特色。山东龙山文化出土玉器较多，器形以生产工具形的礼器如玉斧、玉铲、玉锛等为特色，还有璿玑等礼器，玉锛上的兽面纹可视为商代青铜器上饕餮纹的祖型。良渚文化玉器所用玉料也出自当地，玉质不如北方，但已是较成熟的礼器，并在墓葬中出现了一定的组合规律，符合《周礼》所谓“苍璧礼天，黄琮礼地”之制，器形以璧和琮最有特色，也有斧、钺等从生产工具转化而来的权威象征。浙江余杭反山12号墓出土的一件大玉琮，高8.8厘米，外径17.1~17.6厘米，内径4.9厘米，重量达6.5千克，宽博厚重为目前所知良渚玉器之首，有“琮王”之称。上面刻画的神徽图像，可能是多个氏族图腾符号组合、演变而成的。","教学分析":"","批注":"","标签":["1.5 物质与非物质","1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国内","年代":"公元前1000年—汉代","排序年":-1000,"作品/事件名称":"丝绸之路与中国丝绸的早期西传","作者/设计师":"（中国织工 / 草原商人）","来源书目":"《中国工艺美术史新编》","简介":"\"远远早于汉武帝时丝绸之路的开通，中国丝绸已经出现在域外\"——俄罗斯阿尔泰山巴泽雷克古墓（约公元前1000年）出土的中国丝绸，证明东西方文明交流比汉代官…","原文引用":"——《中国工艺美术史新编》/ 第三章·第二节\n远远早于汉武帝时丝绸之路的开通，中国丝绸已经出现在域外。巴泽雷克古墓群在俄罗斯阿尔泰山的北麓，时代约为公元前1000 年，墓里有不少中国的绢、锦、刺绣等。在5号墓，还同时出土了西亚的毛织物和羊毛绒毯。这证明，那时的东西之间已有往来，中国丝绸也会因此辗转进入西方。公元前5到4世纪的古希腊文献已经　第三章春秋战国081图3,28器物小巧，装饰单纯，但造型以正反两个龙头共用一身，设计极具匠心。","教学分析":"\"**远远早于汉武帝时丝绸之路的开通，中国丝绸已经出现在域外**\"——俄罗斯阿尔泰山巴泽雷克古墓（约公元前1000年）出土的中国丝绸，证明东西方文明交流比汉代官方通道更早。这说明**文明交融不依赖官方政治意志**，民间贸易和草原游牧通道是更古老的**跨文明媒介**。教师可引导学生讨论：正式的\"丝绸之路\"叙事是否低估了非官方、非汉族主导的文明交流路径？","批注":"","标签":[],"image":"","link":"","importance":0},{"类别":"国内","年代":"战国时期（公元前475—前221年）","排序年":-475,"作品/事件名称":"战国漆器","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"战国漆器已发现在全国的许多地点，而以鄂、湘为代表的楚地数量最多。曾侯乙墓的漆器固然量 　第三章春秋战国085大且精美，但其主人毕竟是国君。湖北江陵的出土更加典型，其小型墓常有数件乃至十余件，中型墓则常有数十以至百多件，充分显示了漆器的普及°楚地岀土漆器最多，这有当地墓葬的填充物宜于有机物保存的原因，但那里更是最重要的漆…","原文引用":"战国漆器已发现在全国的许多地点，而以鄂、湘为代表的楚地数量最多。曾侯乙墓的漆器固然量 　第三章春秋战国085大且精美，但其主人毕竟是国君。湖北江陵的出土更加典型，其小型墓常有数件乃至十余件，中型墓则常有数十以至百多件，充分显示了漆器的普及°楚地岀土漆器最多，这有当地墓葬的填充物宜于有机物保存的原因，但那里更是最重要的漆器产区,就连浪漫的庄子也当过楚国的漆园吏。成都也是漆器重镇，其作品还能出土在湖北云梦，成都漆器名扬遐迩，行销天下的历史也在战国开启了。","教学分析":"","批注":"","标签":["4.3 媒介、材料与内容","1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国内","年代":"战国（公元前433年）","排序年":-433,"作品/事件名称":"曾侯乙编钟","作者/设计师":"楚惠王","来源书目":"《中国工艺美术史新编》","简介":"图0・9曾侯乙青铜尊盘尊高30.1厘米尊与盘可分可合。均先分铸，再焊钥,共由72个组件构成。制作虽精，但繁缚太甚…","原文引用":"图0・9曾侯乙青铜尊盘尊高30.1厘米尊与盘可分可合。均先分铸，再焊钥,共由72个组件构成。制作虽精，但繁缚太甚。","教学分析":"","批注":"","标签":["4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国内","年代":"约公元前221—207年（秦代）","排序年":-221,"作品/事件名称":"秦兵马俑：皇权的视觉震慑机器","作者/设计师":"（秦代官作工匠，无名氏）","来源书目":"《中国美术简史》","简介":"秦始皇陵兵马俑以数量、规模、逼真度的极端化构建对皇权的视觉臣服——数千陶俑面孔各异，却统一朝向主人，这种个性化中的秩序化本身就是权力的视觉语法。…","原文引用":"——《中国美术简史》/ 第二编·概况\n秦、西汉（含新莽）、东汉三个朝代，是中国统一的多民族封建国家建立与巩固时期，也是我国民族艺术风格确立与发展的极为重要的时期。　公元前221年，秦始皇嬴政统一中国，定都咸阳，建立了我国历史上第一个中央集权制的封建大帝国，在政治、经济、文化等领域，进行一系列改革，如推行郡县制，统一文字、货币、度量衡，修筑驰道等，对社会发展具有进步作用。秦朝的统治者还高度重视造型艺术，使其为宣扬统一功业、显示王权威严的政治目的服务，在建筑、雕塑、绘画等方面，都取得了极其辉煌的成就。由于秦代刑政苛暴，赋役繁重，阶级矛盾迅速激化，秦传至二世，即被陈胜、吴广领导的农民大起义推翻，代之而起的是西汉王朝的建立。","教学分析":"秦始皇陵兵马俑以**数量、规模、逼真度**的极端化构建对皇权的视觉臣服——数千陶俑面孔各异，却统一朝向主人，这种个性化中的秩序化本身就是**权力的视觉语法**。艺术在此**完全服务于政治权威的神话建构**：让观者在进入墓道前已被视觉震慑所压制。教师可引导学生讨论：这种服务于单一权力意志的\"艺术\"，与服务于公共审美的\"艺术\"，边界在哪里？","批注":"","标签":["3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国内","年代":"约公元前221—207年（秦代）","排序年":-221,"作品/事件名称":"秦兵马俑：功能震慑与超现实的制作规模","作者/设计师":"（秦代官作工匠）","来源书目":"《中国美术简史》","简介":"秦兵马俑的功能是为死者提供来世的军事保护（宗教-巫术功能），但其数量规模与个体精细度远超实际功能所需。这是\"形式过剩\"的案例：当形式…","原文引用":"——《中国美术简史》/ 第二编·概况\n秦、西汉（含新莽）、东汉三个朝代，是中国统一的多民族封建国家建立与巩固时期，也是我国民族艺术风格确立与发展的极为重要的时期。　公元前221年，秦始皇嬴政统一中国，定都咸阳，建立了我国历史上第一个中央集权制的封建大帝国，在政治、经济、文化等领域，进行一系列改革，如推行郡县制，统一文字、货币、度量衡，修筑驰道等，对社会发展具有进步作用。秦朝的统治者还高度重视造型艺术，使其为宣扬统一功业、显示王权威严的政治目的服务，在建筑、雕塑、绘画等方面，都取得了极其辉煌的成就。由于秦代刑政苛暴，赋役繁重，阶级矛盾迅速激化，秦传至二世，即被陈胜、吴广领导的农民大起义推翻，代之而起的是西汉王朝的建立。","教学分析":"秦兵马俑的功能是**为死者提供来世的军事保护**（宗教-巫术功能），但其**数量规模与个体精细度**远超实际功能所需。这是\"**形式过剩**\"的案例：**当形式的规模超越功能需求，超出部分便承载了纯粹的权力炫示功能**——以形式的极端化来彰显权力的无限性。这揭示了形式与功能之间的**非线性关系**：有时，形式的\"浪费\"本身就是一种特殊的功能。","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国内","年代":"汉代（公元前206年—公元220年）","排序年":-206,"作品/事件名称":"汉代长信宫灯：物质设计与非物质概念的统一","作者/设计师":"（汉代工匠）","来源书目":"《中国工艺美术史新编》","简介":"长信宫灯\"融美观与适用于一身，构思之巧、制作之精令人惊叹，其设计原则至今仍可视为典范\"。宫灯以仕女跪姿为造型，袖管导烟除尘、灯盘调节光向——每一物质…","原文引用":"——《中国工艺美术史新编》/ 前言·二、适用的原则\n术之美就受到了限制，其创作有如带着镣铐的舞蹈。适用束缚了庸手，也玉成了巧匠，他们的姓名虽多已不传，但无数作品都是其智慧和才华的丰碑。最著名的是汉代的钉灯和唐代的香囊，它们融美观与适用于一身，构思之巧、制作之精令人惊叹，其设计原则至今仍可视为典范。","教学分析":"长信宫灯\"**融美观与适用于一身，构思之巧、制作之精令人惊叹，其设计原则至今仍可视为典范**\"。宫灯以仕女跪姿为造型，袖管导烟除尘、灯盘调节光向——每一**物质细节都承载着非物质的功能概念与美学意图**。这是工艺美术中物质与非物质**最完美整合**的案例：形式、功能、象征在一件器物中达到三位一体。","批注":"","标签":["1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国内","年代":"汉代（公元前206年—公元220年）","排序年":-206,"作品/事件名称":"汉代宫廷漆器与民间漆器的等级分化","作者/设计师":"（汉代官作、民间工匠）","来源书目":"《中国工艺美术史新编》","简介":"秦汉时期民间工艺美术\"兴旺发达\"，但精品漆器集中于宫廷。这一格局体现了精英与大众在物质生活层面的等级分化：相同的器物门类因材质、工艺和使用者不同…","原文引用":"——《中国工艺美术史新编》/ 第四章·第一节\n秦汉民间工艺美术兴旺发达。农村制作主要是纺织，在城市，作坊众多，产品齐全，高档产品还大量进入帝王家。一些高官显贵的私人作坊规模很大，如为西汉张安世、东汉郭况制作的家童都各有数百（《汉书•张安世传》、《太平广记》卷236引《拾遗录》）。","教学分析":"秦汉时期民间工艺美术\"**兴旺发达**\"，但精品漆器集中于宫廷。这一格局体现了**精英与大众在物质生活层面的等级分化**：相同的器物门类因材质、工艺和使用者不同而产生截然不同的社会意义。教师可引导学生分析：**同一类型的器物（如漆器、丝绸）在精英语境与平民语境中如何承载不同的身份信息**？这对理解当代品牌设计中的\"**奢侈品逻辑**\"有何参照意义？","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国内","年代":"汉代（公元前206年—公元220年）","排序年":-206,"作品/事件名称":"汉代灯具设计：形式与功能的完美整合","作者/设计师":"（汉代宫廷工匠）","来源书目":"《中国工艺美术史新编》","简介":"长信宫灯\"融美观与适用于一身，构思之巧、制作之精令人惊叹，其设计原则至今仍可视为典范\"——仕女造型承担了导烟管道、灯盘调节等功能，每一形式要素都有其…","原文引用":"——《中国工艺美术史新编》/ 前言·二、适用的原则\n术之美就受到了限制，其创作有如带着镣铐的舞蹈。适用束缚了庸手，也玉成了巧匠，他们的姓名虽多已不传，但无数作品都是其智慧和才华的丰碑。最著名的是汉代的钉灯和唐代的香囊，它们融美观与适用于一身，构思之巧、制作之精令人惊叹，其设计原则至今仍可视为典范。","教学分析":"长信宫灯\"**融美观与适用于一身，构思之巧、制作之精令人惊叹，其设计原则至今仍可视为典范**\"——仕女造型承担了导烟管道、灯盘调节等功能，**每一形式要素都有其功能对应**。这是中国工艺美术史上\"**形式与功能统一**\"的最高典范，也是现代设计学\"**形式追随功能**\"原则的中国先例。教师可引导学生分析：灯的仕女造型是装饰性的**形式附加**，还是功能性的**结构组成**？","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国内","年代":"两汉（公元前206—公元220年）","排序年":-206,"作品/事件名称":"汉代画像石与画像砖","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"（《史记•平准书》）。因此，在汉代诗文和画像石、墓室壁画里，出现了不少表现丝织、蚕桑的作品。西汉丝绸主要出土于长沙马王堆汉墓及江陵凤凰山168号汉墓，东汉织物主要出土于新疆及甘肃，此外，在蒙古、俄罗斯的西伯利亚、叙利亚、朝鲜也有发现。若论出土量，则在马王堆1号墓中的收获最多。此墓应稍晚于公元前168年，主人当是长沙国丞…","原文引用":"（《史记•平准书》）。因此，在汉代诗文和画像石、墓室壁画里，出现了不少表现丝织、蚕桑的作品。西汉丝绸主要出土于长沙马王堆汉墓及江陵凤凰山168号汉墓，东汉织物主要出土于新疆及甘肃，此外，在蒙古、俄罗斯的西伯利亚、叙利亚、朝鲜也有发现。若论出土量，则在马王堆1号墓中的收获最多。此墓应稍晚于公元前168年，主人当是长沙国丞相、软侯利仓的夫人辛追。墓中保存完好或基本完好的丝绸衣物58件，装饰方法有织纹、刺绣和印染，同时，还有漆器184件以及312枚记录随葬品的“遣策”竹简。“遣策”为出土物的定名起了关键作用。","教学分析":"","批注":"","标签":["1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国内","年代":"两汉（公元前206—公元220年）","排序年":-206,"作品/事件名称":"汉代铜镜","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"不仅种种传统的青铜礼器变换了形象，转向适用，更有铜镜、带钩、灯具、器座等日用器逐渐发达。尽管漆器日趋繁荣，但青铜容器在上层生活中的地位仍难以动摇，大型墓葬出土物的精美和众多便是反复的证明。至于铜镜、带钩等却是其他材质无法或难以替代的。这样，虽然地位下降，但青铜器仍旧是时代艺术的屮心，其变化依然展示着时代风貌的演进…","原文引用":"不仅种种传统的青铜礼器变换了形象，转向适用，更有铜镜、带钩、灯具、器座等日用器逐渐发达。尽管漆器日趋繁荣，但青铜容器在上层生活中的地位仍难以动摇，大型墓葬出土物的精美和众多便是反复的证明。至于铜镜、带钩等却是其他材质无法或难以替代的。这样，虽然地位下降，但青铜器仍旧是时代艺术的屮心，其变化依然展示着时代风貌的演进。","教学分析":"","批注":"","标签":["4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"西汉（公元前117年）","排序年":-117,"作品/事件名称":"霍去病墓石雕","作者/设计师":"","来源书目":"《中国美术简史》","简介":"霍去病墓石刻　 　这是西汉纪念碑性质的一组大型石刻，现存陕西兴平道常村西北，系汉武帝元狩六年（公元前117年）少府属官“左司空”署内的优秀石刻匠师所雕造。据《史记·卫将军骠骑列传》记载，霍去病自幼善骑射，从元朔六年18岁任骠姚校尉开始，到元狩四年为止，五年之内六次率军反击匈奴侵扰，为解除匈奴对西汉王朝的威胁，为打开通往…","原文引用":"霍去病墓石刻　 　这是西汉纪念碑性质的一组大型石刻，现存陕西兴平道常村西北，系汉武帝元狩六年（公元前117年）少府属官“左司空”署内的优秀石刻匠师所雕造。据《史记·卫将军骠骑列传》记载，霍去病自幼善骑射，从元朔六年18岁任骠姚校尉开始，到元狩四年为止，五年之内六次率军反击匈奴侵扰，为解除匈奴对西汉王朝的威胁，为打开通往西域的道路，建立了不朽功勋，深受汉武帝器重，初封冠军侯，晋封骠骑将军。这位青年将军，不幸于元狩六年病逝，年仅24岁。噩耗传来，朝野震悼。汉武帝特地在茂陵东面不远处，选定霍去病的墓址，“为冢像祁连山”，以纪念元狩二年霍去病在河西战役中取得的关键性胜利。","教学分析":"","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国内","年代":"公元前21世纪—前5世纪（夏商西周至春秋）","排序年":-21,"作品/事件名称":"青铜器时代：技术、礼制与艺术的联动发展","作者/设计师":"（集体）","来源书目":"《中国工艺美术史新编》","简介":"青铜器作为\"中国文化艺术乃至科学技术的光辉代表\"，其发展是冶金技术、礼制需求与美学语言三者联动的结果：技术突破（合金配比）使大型复杂造型成为可能…","原文引用":"——《中国工艺美术史新编》/ 第二章·第一节\n一、时代与工艺美术一般认为，中国的奴隶社会从夏延续到春秋战国之交。据此，本章叙述的便是奴隶社会的工艺美术。人类有过一个以使用青铜器为标志的阶段，即青铜时代。中国的青铜时代大体从公元前21世纪开始,延续到公元前5世纪，约略相当于夏、商、西周三个王朝和春秋时期。此时，甚至晚到战国，青铜器是中国文化艺术乃至科学技术的光辉代表。","教学分析":"青铜器作为\"**中国文化艺术乃至科学技术的光辉代表**\"，其发展是**冶金技术、礼制需求与美学语言三者联动**的结果：技术突破（合金配比）使大型复杂造型成为可能，礼制需求（列鼎制度）规定了器型种类，美学选择（饕餮纹的抽象化）形成风格。教师可引导学生分析：**哪个因素是主导力量**？这一\"**多因素联动**\"的方法论同样适用于分析任何时代的视觉文化变迁。","批注":"","标签":[],"image":"","link":"","importance":0},{"类别":"国内","年代":"商代晚期（约公元前13—前11世纪）","排序年":-13,"作品/事件名称":"后母戊鼎（司母戊鼎）","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"后母戊鼎应该就是当地的产品，它重达832.84千克，铸造需要数百人同时操作。不难想象，这样官府作坊规模一定很大，内部组织一定很严密…","原文引用":"后母戊鼎应该就是当地的产品，它重达832.84千克，铸造需要数百人同时操作。不难想象，这样官府作坊规模一定很大，内部组织一定很严密。","教学分析":"","批注":"","标签":["1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国内","年代":"旧石器晚期（约4万—1万年前）","排序年":-4,"作品/事件名称":"旧石器晚期装饰品与刻画艺术","作者/设计师":"","来源书目":"《中国美术简史》","简介":"第二节 旧石器时代晚期的装饰品和刻画艺术品　第三节 新石器时代的文化序列　第四节 新石器时代的工艺美术　第五节 新石器时代的绘画艺术　第六节 刻画符号与原始文字　第七节 新石器时代的雕塑艺术　第八节 新石器时代的建筑艺术　第二章 先秦美术　第一节 青铜器艺术　第二节 雕塑艺术　第三节 绘画艺术　第四节 书法篆刻艺术　第…","原文引用":"第二节 旧石器时代晚期的装饰品和刻画艺术品　第三节 新石器时代的文化序列　第四节 新石器时代的工艺美术　第五节 新石器时代的绘画艺术　第六节 刻画符号与原始文字　第七节 新石器时代的雕塑艺术　第八节 新石器时代的建筑艺术　第二章 先秦美术　第一节 青铜器艺术　第二节 雕塑艺术　第三节 绘画艺术　第四节 书法篆刻艺术　第五节 工艺美术　第六节 建筑艺术　第二编 秦汉美术　概况　第一章 绘","教学分析":"","批注":"","标签":["1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国内","年代":"战国（约公元前4世纪）","排序年":-4,"作品/事件名称":"战国帛画——人物龙凤帛画","作者/设计 隐逸有关。东晋顾恺之《画云台山记》、刘宋时期宗炳《画山水序》、王微《叙画》，记录了他们对表现自然山水的看法，这些文字是探讨山水画起源的重要依据。然而目前还见不到独立的山水画作品，若干有参考价值的绘画，山水多作人物的背景和环境的衬托，较为古拙。唐张彦远《历代名画记》称：“其画山水，则群峰之势，若钿饰犀栉，或水不容泛，或人大于山，率皆附以树石，映带其地，列植之状，则若伸臂布指。杨（契丹）、展（子虔）精意宫观，渐变所附，尚尤状石则务于雕透，如冰澌斧刃，绘树则刷脉镂叶，多栖梧苑柳。”以现存画迹来看是符合实际的，后段的文字也适于理解为南北朝后期向隋代过渡时的状况，山水画的真正出现当在隋、唐之时。","教学分析":"宗炳在《画山水序》中提出\"**竖划三寸，当千仞之高；横墨数尺，体百里之迥**\"，这是中国最早的**系统性透视比例论述**，与西方同期的视学科学相比具有**高度的理性自觉**。但中国透视理论走向了\"**移远就近**\"的散点透视，而非西方的定点焦点透视，揭示出**不同文化在处理视觉-空间问题时的不同科学选择**。","批注":"","标签":["4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国内","年代":"北魏（5世纪，云冈）","排序年":450,"作品/事件名称":"云冈石窟——北魏皇家佛教艺术","作者/设计师":"","来源书目":"《中国美术简史》","简介":"的中心，开启中原北方兴建寺塔、开窟造像的风气。首都平城计有新旧寺院上百所，四方州郡寺院多达6478所，平城在文成帝和平初年（460年）开凿了皇家第一所石窟寺——云冈石窟。孝文帝迁都洛阳后，又仿平城故事开凿龙门石窟，由此带动民间开窟造像的风气。北魏分裂和继起的各代沿袭北魏奉佛传统，中原地区的河北、河南、山东、山西、陕西等…","原文引用":"的中心，开启中原北方兴建寺塔、开窟造像的风气。首都平城计有新旧寺院上百所，四方州郡寺院多达6478所，平城在文成帝和平初年（460年）开凿了皇家第一所石窟寺——云冈石窟。孝文帝迁都洛阳后，又仿平城故事开凿龙门石窟，由此带动民间开窟造像的风气。北魏分裂和继起的各代沿袭北魏奉佛传统，中原地区的河北、河南、山东、山西、陕西等地都有皇室和民间开窟造像活动，风气转承相沿，入隋唐而不衰。","教学分析":"","批注":"","标签":["5.1 本土与异域","3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国内","年代":"东晋—南朝梁（4—6世纪）","排序年":550,"作品/事件名称":"顾恺之\"密体\"与张僧繇\"疏体\"的风格二元","作者/设计师":"顾恺之 / 张僧繇","来源书目":"《中国美术简史》","简介":"顾恺之笔法\"紧劲连绵\"（密体），张僧繇\"笔才一二、象已应焉\"（疏体），两种风格代表中国线性绘画史上精描细绘与意象简括的持续张力。这组二元…","原文引用":"——《中国美术简史》/ 第一编·第二章\n随着文学艺术创作的发展，理论的探讨得以迅速地展开。人物品题的风气以及文艺理论的研讨和开拓则促进了绘画理论的探讨。顾恺之的《论画》、谢赫的《画品》奠定了古代画史、画论的发展道路。　佛教传入后，在南北朝时期经统治者提倡和利用，发展十分迅速，佛教的传播也为中国古代文化的形成带来某些新的因素。求法僧人的西行和佛教的东渐促进了中西文化的交流，尤其是大量寺院的兴建和造像的盛行，极大地丰富了建筑艺术和绘画、雕塑创作。一批优秀的艺术家在寺院中竞展才华，创造出适合中国民族审美风范的佛教新样式。至今保存下来的一些建筑遗址和大量泥塑、铜、石造像，特别是遍布北方的佛教石窟寺院，集中展示了古代雕塑、绘画创作中的大量艺术珍品。","教学分析":"顾恺之笔法\"**紧劲连绵**\"（密体），张僧繇\"**笔才一二、象已应焉**\"（疏体），两种风格代表中国线性绘画史上**精描细绘与意象简括**的持续张力。这组二元对立不是非此即彼的对抗，而是**共同构成人物画表现谱系的两极**。教师可引导学生思考：每种风格背后的**认知论差异**——密体偏重形的精确，疏体偏重神的传达，二者的对立最终通向\"**形神关系**\"这一中国美学的核心命题。","批注":"","标签":["1.2 二元与多元"],"image":"","link":"","importance":0},{"类别":"国内","年代":"北齐（550—577年）","排序年":550,"作品/事件名称":"曹仲达\"曹家样\"：媒介身份与画风的跨文化编码","作者/设计师":"曹仲达","来源书目":"《中国美术简史》","简介":"\"曹衣出水\"——曹仲达的薄衣贴体画法来自犍陀罗艺术（希腊-佛教融合风格），通过丝绸之路传入中原。画家本人即是媒介：曹仲达身为中亚移民，其身体承载…","原文引用":"——《中国美术简史》/ 第一编·第三章\n曹仲达是来自中亚曹国的北齐画家，他以画梵像著称，被誉为“曹家样”。后世评述他的风格说：“曹之笔，其体稠叠而衣服紧窄”，即所谓“曹衣出水”。“曹家样”概括了佛教艺术在最初传入的几个世纪里中外交融的艺术风格。","教学分析":"\"**曹衣出水**\"——曹仲达的薄衣贴体画法来自犍陀罗艺术（希腊-佛教融合风格），通过丝绸之路传入中原。**画家本人即是媒介**：曹仲达身为中亚移民，其身体承载并传递着跨文化的视觉知识。\"曹家样\"概括了一种**媒介身份（外来画家）与视觉内容（印度贴体画法）高度一致**的文化现象，揭示出**人作为文化传播媒介的独特性**。","批注":"","标签":["4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"南北朝后期（约6世纪）","排序年":550,"作品/事件名称":"联珠纹锦：织物媒介与异域图像内容的融合","作者/设计师":"（中亚、中国织工）","来源书目":"《中国工艺美术史新编》","简介":"联珠纹通过丝绸媒介在东西方之间流动：丝织物的物质特性（经纬结构、重复单元）天然适合联珠纹的圆形重复图案，这说明某些纹样与某种媒介之间存在深层的形式亲…","原文引用":"——《中国工艺美术史新编》/ 第五章·第二节\n丝绸以至工艺美术装饰重要的变化是联珠纹岀现、植物题材的增多和纹样的写实，这集中表现在公元6世纪以来的南北朝后期。联珠纹由一个个小圆珠组成，圆珠或排成条带等形状，或围成圆，以包围主题纹样，成为联珠圈。联珠圈是联珠纹的典型，从公元6世纪中叶到公元7世纪80年代，是中国最重要的装饰题　138中国工艺美术史新编用来遮盖墓主脸部，出土在公元558年的墓葬中，是今存最早的中国联珠纹锦。","教学分析":"联珠纹通过丝绸媒介在东西方之间流动：**丝织物的物质特性（经纬结构、重复单元）天然适合联珠纹的圆形重复图案**，这说明某些纹样与某种媒介之间存在深层的**形式亲缘性**。纹样在流动中被**不同媒介（锦、金银器、石刻）**以各自的物质逻辑改造，呈现出不同的视觉面貌，说明**同一内容在不同媒介中必然经历形式的变异**。","批注":"","标签":["4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"北齐（550—577年）","排序年":550,"作品/事件名称":"曹仲达\"曹家样\"：外来画家与本土佛教图像的融合","作者/设计师":"曹仲达","来源书目":"《中国美术简史》","简介":"\"曹家样\"概括了外来画家（中亚人曹仲达）将印度-希腊风格（薄衣贴体）融入中国佛教图像的典型模式。这不是单纯的\"输入\"，而是在中国制度语境（宫廷供…","原文引用":"——《中国美术简史》/ 第一编·第三章\n曹仲达是来自中亚曹国的北齐画家，他以画梵像著称，被誉为“曹家样”。后世评述他的风格说：“曹之笔，其体稠叠而衣服紧窄”，即所谓“曹衣出水”。“曹家样”概括了佛教艺术在最初传入的几个世纪里中外交融的艺术风格。","教学分析":"\"**曹家样**\"概括了**外来画家（中亚人曹仲达）将印度-希腊风格（薄衣贴体）融入中国佛教图像**的典型模式。这不是单纯的\"输入\"，而是在中国制度语境（宫廷供奉画家）中进行的**跨文化艺术生产**。教师可对比\"曹家样\"与本土\"吴家样\"，分析**本土传统如何在与异域接触中被重新定义和强化**，即\"他者\"的存在如何促使本土文化产生自我意识。","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国内","年代":"约4—6世纪（十六国—南北朝）","排序年":550,"作品/事件名称":"佛教东渐与南北朝石窟艺术","作者/设计师":"（印度、中亚、北魏工匠）","来源书目":"《中国美术简史》","简介":"\"求法僧人的西行和佛教的东渐促进了中西文化的交流，尤其是大量寺院的兴建和造像的盛行，极大地丰富了建筑艺术和绘画、雕塑创作\"——佛教不仅带来宗教内容，更带…","原文引用":"——《中国美术简史》/ 第一编·第二章\n佛教传入后，在南北朝时期经统治者提倡和利用，发展十分迅速，佛教的传播也为中国古代文化的形成带来某些新的因素。求法僧人的西行和佛教的东渐促进了中西文化的交流，尤其是大量寺院的兴建和造像的盛行，极大地丰富了建筑艺术和绘画、雕塑创作。一批优秀的艺术家在寺院中竞展才华，创造出适合中国民族审美风范的佛教新样式。至今保存下来的一些建筑遗址和大量泥塑、铜、石造像，特别是遍布北方的佛教石窟寺院，集中展示了古代雕塑、绘画创作中的大量艺术珍品。","教学分析":"\"**求法僧人的西行和佛教的东渐促进了中西文化的交流，尤其是大量寺院的兴建和造像的盛行，极大地丰富了建筑艺术和绘画、雕塑创作**\"——佛教不仅带来宗教内容，更带来了**雕塑造型方法（印度犍陀罗风格）、空间组织方式（石窟建筑）、绘画技法（凹凸晕染）**。这是中国艺术史上**最大规模、最深层次的外来文化影响**，改变了中国本土艺术的基本语汇。","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国内","年代":"东汉—南朝（2—6世纪）","排序年":550,"作品/事件名称":"越窑青瓷——六朝原始青瓷","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"唐后期越窑产品，器表莹润，密布开片。这种壶时称“注子”，当年十分流行。图0・16缠枝花纹绿地金彩碗口径11.5厘米明人说：\"金色瓮盘，又或十余金，当中家之产\"，所指大约就是这类器物…","原文引用":"唐后期越窑产品，器表莹润，密布开片。这种壶时称“注子”，当年十分流行。图0・16缠枝花纹绿地金彩碗口径11.5厘米明人说：\"金色瓮盘，又或十余金，当中家之产\"，所指大约就是这类器物。","教学分析":"","批注":"","标签":["4.3 媒介、材料与内容","2.2 继承与创新"],"image":"","link":"","importance":0},{"类别":"国内","年代":"唐代（618—907年）","排序年":618,"作品/事件名称":"唐三彩：低温铅釉与多彩内容的媒介共生","作者/设计师":"（唐代陶工）","来源书目":"《中国工艺美术史新编》","简介":"唐三彩以\"低温铅釉\"为媒介，正是这种化学媒介的特性（低温时铅釉流动性强、易于多色混熔）决定了其流釉混色的视觉内容风格——斑斓的色彩不是设计的结果…","原文引用":"——《中国工艺美术史新编》/ 第六章·第三节\n唐三彩是种低温的铅釉陶器，胎料多系白色瓷土，釆用两次烧成，先以1150K烧胎，施釉　中国工艺美术史新编双峰驼是中亚种，背负的五人三胡两汉。是卓越的雕塑，也是文化大交流的实证。","教学分析":"唐三彩以\"**低温铅釉**\"为媒介，正是这种化学媒介的特性（低温时铅釉流动性强、易于多色混熔）决定了其**流釉混色的视觉内容风格**——斑斓的色彩不是设计的结果，而是**媒介的物理行为的直接呈现**。这说明：**内容（多彩视觉效果）有时不是创作意图的产物，而是媒介材料自身行为的显现**，创作者的角色是引导而非完全控制媒介。","批注":"","标签":["4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"唐代（618—907年）","排序年":618,"作品/事件名称":"唐三彩骆驼载乐俑：丝路文化交汇的物质证据","作者/设计师":"（唐代陶工）","来源书目":"《中国工艺美术史新编》","简介":"三彩骆驼载乐俑中\"双峰驼是中亚种，背负的五人三胡两汉\"——一件器物将中亚动物、胡汉混合乐手、中国陶瓷技术、唐代丝路贸易浓缩于一身，是\"卓越的…","原文引用":"——《中国工艺美术史新编》/ 第六章·第三节\n唐三彩是种低温的铅釉陶器，胎料多系白色瓷土，釆用两次烧成，先以1150K烧胎，施釉　中国工艺美术史新编双峰驼是中亚种，背负的五人三胡两汉。是卓越的雕塑，也是文化大交流的实证。","教学分析":"三彩骆驼载乐俑中\"**双峰驼是中亚种，背负的五人三胡两汉**\"——一件器物将**中亚动物、胡汉混合乐手、中国陶瓷技术、唐代丝路贸易**浓缩于一身，是\"**卓越的雕塑，也是文化大交流的实证**\"。这件作品提示我们：**器物不只是审美对象，也是历史文献**；读懂一件器物，就是读懂一段文明交融的历史。","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国内","年代":"唐代贞观年间（7世纪）","排序年":650,"作品/事件名称":"阎立本《步辇图》——政治题材绘画","作者/设计师":"阎立本","来源书目":"《中国美术简史》","简介":"《步辇图》（宋摹本）（图3-13）描绘了贞观十五年（641年）唐太宗下嫁文成公主与吐蕃王松赞干布的联姻事件。画幅右面是坐在步辇上的唐太宗，被九名肩抬步辇和掌扇的宫女簇拥着，画幅左面是身着小团花衣、拱手致意的禄东赞，他被典礼官引见给太宗皇帝。禄东赞及其随从的举止、相貌特征有着强烈的高原民族特色，容貌神情恰当地刻画出禄东赞…","原文引用":"《步辇图》（宋摹本）（图3-13）描绘了贞观十五年（641年）唐太宗下嫁文成公主与吐蕃王松赞干布的联姻事件。画幅右面是坐在步辇上的唐太宗，被九名肩抬步辇和掌扇的宫女簇拥着，画幅左面是身着小团花衣、拱手致意的禄东赞，他被典礼官引见给太宗皇帝。禄东赞及其随从的举止、相貌特征有着强烈的高原民族特色，容貌神情恰当地刻画出禄东赞睿智聪颖而又谦和的性格特征。唐太宗的形象表现则更为成功，在深沉谦和的外表中流露出雄才大略的非凡气度。这幅作品忠实地表现了唐代中央政权与边远民族的友好交往，至今仍然有着重要的历史价值；同时人物形象和性格特征的成功塑造也表达出肖像画创作的成就。从这件作品可以了解阎立本的技巧特征，健劲的线描加以深沉的设色，人物动态较为拘谨而重面部特征的刻画，都反映了对传统的继承和发展。这博采众家之长的雄沉朴实的气质也突出地表现在李贤墓壁画《客使图》（彩-15）上。","教学分析":"","批注":"","标签":["3.2 服务于谁","1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国内","年代":"南北朝后期—唐代（约6—8世纪）","排序年":750,"作品/事件名称":"联珠纹：萨珊波斯纹样在中国的演化","作者/设计师":"（中亚工匠、中国织工）","来源书目":"《中国工艺美术史新编》","简介":"联珠纹从萨珊波斯传入，在中国先成为\"中国最重要的装饰题材\"，后逐渐与本土纹样融合、消退。这是纹样\"联系与发展\"最生动的案例：外来元素进入本土…","原文引用":"——《中国工艺美术史新编》/ 第五章·第二节\n丝绸以至工艺美术装饰重要的变化是联珠纹岀现、植物题材的增多和纹样的写实，这集中表现在公元6世纪以来的南北朝后期。联珠纹由一个个小圆珠组成，圆珠或排成条带等形状，或围成圆，以包围主题纹样，成为联珠圈。联珠圈是联珠纹的典型，从公元6世纪中叶到公元7世纪80年代，是中国最重要的装饰题　138中国工艺美术史新编用来遮盖墓主脸部，出土在公元558年的墓葬中，是今存最早的中国联珠纹锦。","教学分析":"联珠纹从萨珊波斯传入，在中国先成为\"**中国最重要的装饰题材**\"，后逐渐与本土纹样融合、消退。这是纹样\"**联系与发展**\"最生动的案例：外来元素**进入本土系统后经历接受—融合—转化—淡出**的完整周期。教师可对比同一纹样在波斯、粟特、中国织物中的形态差异，揭示**文化交流的单向输入与双向改造**之间的辩证关系。","批注":"","标签":["1.3 联系与发展"],"image":"","link":"","importance":0},{"类别":"国内","年代":"盛唐（约8世纪）","排序年":750,"作品/事件名称":"吴道子：继承与突破的\"画圣\"","作者/设计师":"吴道子","来源书目":"《中国美术简史》","简介":"吴道子\"富于变革精神而又影响深远\"——他在继承前代壁画传统（顾恺之细线、张僧繇疏体）的基础上，发展出\"莼菜条\"（粗细变化的线条）和\"吴带当风…","原文引用":"——《中国美术简史》/ 第二编·第二章\n李贤、李重润墓以及李仙蕙墓是唐高宗乾陵的陪葬墓，壁画作品规模恢宏。李贤墓出行图画面宏大，在较为单一的动态中，成功地组成流畅奔放的构图；李重润墓仪仗图则突出着庄严气氛，这表明唐代画家表现南北朝常见的平行构图的能力又大有提高。盛唐是唐代美术最辉煌的时期，在道释画方面出现了像吴道子这样富于变革精神而又影响深远的画家。表现上层社会生活的贵族美术受到普遍重视，突出地反映在以贵族人物、宫苑纨素为题材的仕女画上，张萱、周昉是其中具有代表性的画家。不少画家是为宫廷的需要而创作的，描绘宫廷生活成为流行一时的绘画题材，如以明皇、杨贵妃、虢国夫人等的游乐生活为题材而画了不少独幅画。","教学分析":"吴道子\"**富于变革精神而又影响深远**\"——他在继承前代壁画传统（顾恺之细线、张僧繇疏体）的基础上，发展出\"**莼菜条**\"（粗细变化的线条）和\"**吴带当风**\"（衣纹飘逸感），实现了**技法层面的创新突破**。其创新不是对传统的否定，而是将继承的技法**推向更高的表现极限**。教师可引导学生分析：创新的前提是什么？吴道子的案例说明**深厚的技法积累是突破的基础**，而非阻碍。","批注":"","标签":["2.2 继承与创新"],"image":"","link":"","importance":0},{"类别":"国内","年代":"唐代（7—8世纪）","排序年":750,"作品/事件名称":"唐代仕女画：美的标准服务于宫廷凝视","作者/设计师":"张萱 / 周昉","来源书目":"《中国美术简史》","简介":"唐代仕女画以\"表现上层社会生活\"为主题，张萱、周昉笔下的丰腴仕女是贵族趣味与男性凝视的双重产物。这些画作服务于宫廷精英的视觉享乐——而非…","原文引用":"——《中国美术简史》/ 第二编·第二章\n李贤、李重润墓以及李仙蕙墓是唐高宗乾陵的陪葬墓，壁画作品规模恢宏。李贤墓出行图画面宏大，在较为单一的动态中，成功地组成流畅奔放的构图；李重润墓仪仗图则突出着庄严气氛，这表明唐代画家表现南北朝常见的平行构图的能力又大有提高。盛唐是唐代美术最辉煌的时期，在道释画方面出现了像吴道子这样富于变革精神而又影响深远的画家。表现上层社会生活的贵族美术受到普遍重视，突出地反映在以贵族人物、宫苑纨素为题材的仕女画上，张萱、周昉是其中具有代表性的画家。不少画家是为宫廷的需要而创作的，描绘宫廷生活成为流行一时的绘画题材，如以明皇、杨贵妃、虢国夫人等的游乐生活为题材而画了不少独幅画。","教学分析":"唐代仕女画以\"**表现上层社会生活**\"为主题，张萱、周昉笔下的丰腴仕女是**贵族趣味与男性凝视**的双重产物。这些画作服务于**宫廷精英的视觉享乐**——而非女性自身的表达。教师可引导学生运用**女性主义艺术史方法**追问：谁在绘画？谁被绘画？谁在观看？**绘画主体的缺席本身即是权力关系的显影**。","批注":"","标签":["3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国内","年代":"唐代（7—8世纪）","排序年":750,"作品/事件名称":"尉迟乙僧与晕染法：西域科学的视觉移植","作者/设计师":"尉迟乙僧","来源书目":"《中国美术简史》","简介":"尉迟乙僧来自西域于阗，以\"凹凸晕染\"技法表现立体感，\"令人耳目一新\"，对唐代吸取西域画风有很大影响。\"凹凸法\"本质上是一种利用明暗模拟三维体…","原文引用":"——《中国美术简史》/ 第二编·第二章\n唐代是中国绘画走向成熟的时期，尤其是人物画获得了重大的发展。继承传统又有进一步成就的首先是初唐阎立本。与此同时，活跃于画坛的尚有少数民族画家尉迟乙僧与康萨陀，他们以画外族人物、佛像及奇禽异兽而负盛名，这种新风格的出现表明绘画艺术不断向新的方面作出探索。初唐画坛呈现着南北传统画风与外来风格争相辉映的局面。","教学分析":"尉迟乙僧来自西域于阗，以\"**凹凸晕染**\"技法表现立体感，\"令人**耳目一新**\"，对唐代吸取西域画风有很大影响。\"凹凸法\"本质上是一种**利用明暗模拟三维体积的视觉科学方法**，与中国传统线描的**平面性**形成鲜明对照。教师可追问：为何这种模拟立体感的科学方法在中国画中未被主流采纳？这揭示了**艺术传统对科学方法的选择性吸收**的深层文化逻辑。","批注":"","标签":["4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国内","年代":"南北朝后期—唐（约6—8世纪）","排序年":750,"作品/事件名称":"联珠纹：萨珊波斯纹样的东传与本土化","作者/设计师":"（中亚、中国织工）","来源书目":"《中国工艺美术史新编》","简介":"联珠纹从萨珊波斯（今伊朗）传入，先在6世纪中叶成为\"中国最重要的装饰题材\"，后逐渐被本土纹样消化吸收。这是\"本土与异域\"互动的完整周期：引入…","原文引用":"——《中国工艺美术史新编》/ 第五章·第二节\n联珠纹由一个个小圆珠组成，圆珠或排成条带等形状，或围成圆，以包围主题纹样，成为联珠圈。联珠圈是联珠纹的典型，从公元6世纪中叶到公元7世纪80年代，是中国最重要的装饰题　138中国工艺美术史新编用来遮盖墓主脸部，出土在公元558年的墓葬中，是今存最早的中国联珠纹锦。","教学分析":"联珠纹从萨珊波斯（今伊朗）传入，先在6世纪中叶成为\"**中国最重要的装饰题材**\"，后逐渐被本土纹样消化吸收。这是\"**本土与异域**\"互动的完整周期：**引入→盛行→融合→消退**，每个阶段都有特定的社会-文化条件驱动。联珠纹的东传不是单一的\"影响\"，而是**中亚粟特商人、佛教传播、皇室趣味**等多重力量共同作用的结果。","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国内","年代":"约4—8世纪（十六国—唐代）","排序年":750,"作品/事件名称":"克孜尔石窟：中西亚佛教图像与本土审美的融合","作者/设计师":"（龟兹工匠）","来源书目":"《中国美术简史》","简介":"克孜尔石窟（位于今新疆拜城）的壁画融合了印度风格（凹凸晕染）、西亚纹样与本土汉族图像语言，是多文明在丝绸之路节点上交汇的视觉档案。尉迟乙僧将于阗画风带入…","原文引用":"——《中国美术简史》/ 第一编·第三章\n同时，以擅画佛像和外国人物著称。与其父尉迟跋质那同是由西域入居长安的外族画家。他画“外国鬼神，奇形异貌，中华罕继”。技法也不同于中原传统，记载称他“画外国菩萨，小则用笔紧劲，如曲铁盘丝，大则洒落有气概”，“用色沉着，（如）堆起绢素而不隐指”。因而有“身若出壁”、“逼之标标然”的评价。这种铁线描、设色侧重晕染的方法，使人们耳目一新，对唐代吸取西域于阗画风有很大影响。他曾在慈恩寺画凹凸花、千手千眼菩萨和千钵文殊。现存慈恩寺大雁塔门楣石刻画或许与乙僧起样有关。石刻画中菩萨的端丽用圆曲紧劲的线描表现得很充分，在不大的空间中，动态剽悍的明王像则咄咄逼人，并不觉其促迫。尉迟乙僧所代表的西域画风还可以从新疆和田地区的寺庙及库车克孜尔石窟壁画中加以体会。","教学分析":"克孜尔石窟（位于今新疆拜城）的壁画融合了印度风格（凹凸晕染）、西亚纹样与本土汉族图像语言，是**多文明在丝绸之路节点上交汇的视觉档案**。尉迟乙僧将于阗画风带入长安，令唐代画家\"**耳目一新**\"——这说明**长安对西域视觉经验的接受是主动选择**，而非被动接受。教师可追问：哪些西域元素被唐代主流接受？哪些被排斥？接受与拒绝背后的**本土文化逻辑**是什么？","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国内","年代":"盛唐（约8世纪）","排序年":750,"作品/事件名称":"吴道子——\"吴带当风\"的线条革命","作者/设计师":"吴道子","来源书目":"《中国美术简史》","简介":"功地组成流畅奔放的构图；李重润墓仪仗图则突出着庄严气氛，这表明唐代画家表现南北朝常见的平行构图的能力又大有提高。盛唐是唐代美术最辉煌的时期，在道释画方面出现了像吴道子这样富于变革精神而又影响深远的画家。表现上层社会生活的贵族美术受到普遍重视，突出地反映在以贵族人物、宫苑纨素为题材的仕女画上，张萱、周昉是其中具有代表性的…","原文引用":"功地组成流畅奔放的构图；李重润墓仪仗图则突出着庄严气氛，这表明唐代画家表现南北朝常见的平行构图的能力又大有提高。盛唐是唐代美术最辉煌的时期，在道释画方面出现了像吴道子这样富于变革精神而又影响深远的画家。表现上层社会生活的贵族美术受到普遍重视，突出地反映在以贵族人物、宫苑纨素为题材的仕女画上，张萱、周昉是其中具有代表性的画家。不少画家是为宫廷的需要而创作的，描绘宫廷生活成为流行一时的绘画题材，如以明皇、杨贵妃、虢国夫人等的游乐生活为题材而画了不少独幅画。","教学分析":"","批注":"","标签":["2.2 继承与创新","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"盛唐—中唐（约8世纪）","排序年":750,"作品/事件名称":"张萱与周昉——唐代仕女画","作者/设计师":"张萱；周昉","来源书目":"《中国美术简史》","简介":"唐　张萱　52×148cm　绢本设色（宋摹本）　辽宁省博物馆　彩-13　　历代帝王图（局部）　唐　全图51.3×531cm　绢本设色（宋以前摹本）　美国波士顿艺术博物馆　彩-14　　佛立像　北齐　高97cm　石质　山东青州龙兴寺遗址出土　彩-15　　客使图　唐　184.5×252.45cm　壁画　陕西乾县章怀太子李贤墓…","原文引用":"唐　张萱　52×148cm　绢本设色（宋摹本）　辽宁省博物馆　彩-13　　历代帝王图（局部）　唐　全图51.3×531cm　绢本设色（宋以前摹本）　美国波士顿艺术博物馆　彩-14　　佛立像　北齐　高97cm　石质　山东青州龙兴寺遗址出土　彩-15　　客使图　唐　184.5×252.45cm　壁画　陕西乾县章怀太子李贤墓出土　彩-16　　毗楞竭梨王本生　十六国　80×74cm　壁画　甘肃敦煌莫高窟275窟　彩-17　　维摩诘像　唐　75×74cm　壁画　甘肃敦煌莫高窟103窟","教学分析":"","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0 "类别":"国内","年代":"五代南唐（约10世纪）","排序年":950,"作品/事件名称":"李廷珪墨与澄心堂纸：材料科学推动书画革新","作者/设计师":"李廷珪（制墨）/ 澄心堂（制纸）","来源书目":"《中国美术简史》","简介":"李廷珪墨与澄心堂纸的出现，为五代—北宋书画的水墨表现力提供了物质科学基础：新墨料使墨色层次更丰富，新纸料使水墨晕染更可控。这是材料科学进步直接推动艺…","原文引用":"——《中国美术简史》/ 第三编·第三章\n南唐时的李廷珪墨、澄心堂纸非常有名。著名的墨匠李超在安徽歙州制墨，得到南唐皇帝李煜的赏识，他的儿子李廷珪担任墨务官。歙州是黄山、罗山、黟山等松木良材的产地，为制墨提供了充分的条件。李廷珪改进了原先制墨捣松、调胶等方法，因此他制的墨“丰肌腻理，光泽如漆”，此后歙州成为墨的著名产地。同时，南唐皇帝李煜又设置了砚务官，从此歙州砚也开始闻名于世。澄心堂纸是李煜命宫中纸匠以桑皮为材料制造的优质宣纸。唐宋两代的宣州毛笔也很有名，唐律将“宣笔”定为贡品。唐宋两代的制笔名家有诸葛氏、宣州陈氏、吕道人、吕大渊、汪伯立等。后来宋代制作的《淳化阁帖》用的就是李廷珪墨和澄心堂纸。","教学分析":"李廷珪墨与澄心堂纸的出现，为五代—北宋书画的**水墨表现力提供了物质科学基础**：新墨料使墨色层次更丰富，新纸料使水墨晕染更可控。这是**材料科学进步直接推动艺术风格演变**的典型案例——没有这两种材料的改良，宋代大写意水墨的审美可能性就无从实现。教师可引导学生思考：**艺术风格史在多大程度上也是材料技术史**？","批注":"","标签":["4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国内","年代":"五代南唐（约10世纪）","排序年":950,"作品/事件名称":"李廷珪墨：媒介材料的质量升级与内容可能性扩展","作者/设计师":"李廷珪","来源书目":"《中国美术简史》","简介":"李廷珪墨被视为历史上最佳制墨品，其材料特性（细腻、浓黑、层次丰富）直接扩展了水墨绘画的内容表现可能性：更细的墨粒使晕染更柔和，更高的碳含量使墨色…","原文引用":"——《中国美术简史》/ 第三编·第三章\n南唐时的李廷珪墨、澄心堂纸非常有名。著名的墨匠李超在安徽歙州制墨，得到南唐皇帝李煜的赏识，他的儿子李廷珪担任墨务官。歙州是黄山、罗山、黟山等松木良材的产地，为制墨提供了充分的条件。李廷珪改进了原先制墨捣松、调胶等方法，因此他制的墨“丰肌腻理，光泽如漆”，此后歙州成为墨的著名产地。同时，南唐皇帝李煜又设置了砚务官，从此歙州砚也开始闻名于世。澄心堂纸是李煜命宫中纸匠以桑皮为材料制造的优质宣纸。唐宋两代的宣州毛笔也很有名，唐律将“宣笔”定为贡品。唐宋两代的制笔名家有诸葛氏、宣州陈氏、吕道人、吕大渊、汪伯立等。后来宋代制作的《淳化阁帖》用的就是李廷珪墨和澄心堂纸。","教学分析":"李廷珪墨被视为历史上最佳制墨品，其材料特性（**细腻、浓黑、层次丰富**）直接扩展了水墨绘画的**内容表现可能性**：更细的墨粒使晕染更柔和，更高的碳含量使墨色更沉稳。这是**媒介材料的物理性质决定内容表现范围**的典型案例：好的媒介不只是传达内容的透明通道，而是**主动地开辟或限制内容的可能性**。","批注":"","标签":["4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"唐代（7—10世纪）","排序年":950,"作品/事件名称":"唐代丝绸与联珠团窠纹","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"唐代丝绸广泛吸收西域联珠纹与团窠纹样，并将其与中国传统纹样融合，成为丝路文化交汇的物质载体。","原文引用":"","教学分析":"","批注":"","标签":["5.1 本土与异域","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"五代南唐（约10世纪）","排序年":950,"作品/事件名称":"顾闳中《韩熙载夜宴图》","作者/设计师":"顾闳中","来源书目":"《中国美术简史》","简介":"韩熙载夜宴图（局部）　五代　顾闳中　全图28.7×337.5cm　绢本设色（宋摹本）　北京故宫博物院　彩-19　　谿山行旅图　宋　范宽　206.3×103.3cm　绢本水墨　台北故宫博物院　彩-20　　腊梅山禽图　宋　赵佶　83.3×53.3cm　绢本设色　台北故宫博物院　彩-21　　朝元图（局部）　元　高240cm　…","原文引用":"韩熙载夜宴 用束缚了庸手，也玉成了巧匠，他们的姓名虽多已不传，但无数作品都是其智慧和才华的丰碑。最著名的是汉代的钉灯和唐代的香囊，它们融美观与适用于一身，构思之巧、制作之精令人惊叹，其设计原则至今仍可视为典范。","教学分析":"南宋官窑以瓷仿玉，制作琮式瓶，\"**宋人倾慕古代典范**\"。这种\"**仿古**\"不是简单复制，而是用**当代材质和技术**对传统形制进行重新诠释——青瓷的釉色美感与玉琮的神圣造型叠合，生成了新的审美意义。这是\"**传统与当代**\"互动最典型的模式：**以当代媒介承载传统精神，并在过程中形成新的文化产物**。","批注":"","标签":["2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国内","年代":"北宋（960—1127年）","排序年":960,"作品/事件名称":"宋代画院制度：精英选拔与国家规训","作者/设计师":"（宋徽宗 / 宋代画院画家）","来源书目":"《中国美术简史》","简介":"宋代画院通过诗意题目考试（\"乱山藏古寺\"）选拔\"笔韵高简\"的精英画家，但被选中者\"创作受统治者的需求和爱好所制约\"。这是精英筛选机制…","原文引用":"——《中国美术简史》/ 第三编·第一章\n画学和画院通过考试录用或升迁人才，考试标准是“以不仿前人，而物之情态形色俱若自然，笔韵高简为工”，既要求状物绘形的严格写实技巧，又强调立意构思，多摘取诗句为题目。如“乱山藏古寺”，中选者画荒山中露出佛寺的幡竿而不画出佛寺，以表现藏于深山的意境；“竹锁桥边卖酒家”，也是画桥头竹林中挑出的酒旗，而不露酒馆；“嫩绿丛中红一点”更别出心裁地画绿树掩映的高楼窗口有一红衣女子倚栏眺望，一些名列前茅者都是构思巧妙而不落俗套的。画院画家来自社会，参加画院后仍与社会有一定联系，因而不断为宫廷绘画输入新的血液。但画家创作受统治者的需求和爱好所制约，也限制着画家的创造力。","教学分析":"宋代画院通过诗意题目考试（\"**乱山藏古寺**\"）选拔\"**笔韵高简**\"的精英画家，但被选中者\"**创作受统治者的需求和爱好所制约**\"。这是**精英筛选机制与国家权力规训之间的内在矛盾**：画院以\"才华\"的名义招募精英，却以\"皇权服务\"的逻辑限制精英的创造力。这是理解**任何体制内艺术生产**都无法回避的结构性张力。","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国内","年代":"北宋末期（约1086—1125年）","排序年":960,"作品/事件名称":"汝窑——宋代五大名窑之首","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"色，这同唐五代其他窑场区别明显，而和宋代汝窑有部分近似。胎体则普遍趋薄，造型由唐代的丰满转向秀丽。五代的耀州窑很有名气。陶穀（903—970年）描述过耀州的一种平底深碗，说它“状简古，号小海鸥”；还记录过名为“雍都”的瓷酒海，它是“耀州青橄（《清异录》卷下）。自后晋起，陶穀官居高品，他反复记录耀州窑器，应说明耀州窑地位…","原文引用":"色，这同唐五代其他窑场区别明显，而和宋代汝窑有部分近似。胎体则普遍趋薄，造型由唐代的丰满转向秀丽。五代的耀州窑很有名气。陶穀（903—970年）描述过耀州的一种平底深碗，说它“状简古，号小海鸥”；还记录过名为“雍都”的瓷酒海，它是“耀州青橄（《清异录》卷下）。自后晋起，陶穀官居高品，他反复记录耀州窑器，应说明耀州窑地位特殊。五代耀州窑还烧“官”款青瓷，相信同贡奉有关。有专家相信，陶瓷史上声名赫赫的柴窑就在黄堡，但此说尚难证实。","教学分析":"","批注":"","标签":["3.1 精英与大众","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"五代—北宋（约10—11世纪）","排序年":1050,"作品/事件名称":"五代至宋：山水画的成熟与技法演变","作者/设计师":"荆浩 / 关仝 / 李成 / 范宽","来源书目":"《中国美术简史》","简介":"五代荆浩、关仝在战乱中坚持山水画创作，将唐代青绿山水推向水墨写实新阶段；北宋院体则在稳定政治环境中完成了山水画的技法体系化。战乱中的坚守与盛…","原文引用":"——《中国美术简史》/ 第三编·第一章\n五代时期，中原大部分陷于战乱，唐以来中原绘画的隆盛局面遭到严重破坏，然而某些画家在绘画领域（如荆浩、关全的山水画和张图、朱繇等人的宗教壁画）仍有所贡献。　地处江南的南唐和四川的西蜀政权较少受到战争的破坏，这里自然条件优越，物产丰富，经济繁荣。安史之乱和唐末战乱中有些中原画家逃奔蜀地，南唐也聚集了不少绘画人才，两地的统治者又酷爱书画，出于玩赏和装点生活的需要，网罗画家，开创了宫廷画院，绘画上呈现出繁荣活跃的局面。其中西蜀更多地继承了唐代中原绘画传统，在宗教画和花鸟画方面颇有建树，成都的大圣慈寺等有名家创作的宏伟壁画，不仅有经变佛像，而且有贵族的真堂。山水、花鸟画家也在寺观中留下笔踪。蜀中宗教画家颇多，常重胤、蒲师训是其中杰出者，贯休和尚更以画“胡貌梵相”的罗汉像著称；花鸟画则以黄筌父子为代表。南唐帝王都有较高的文艺修养，后主李煜更是诗词书画兼能。南唐画院里人才济济，如宗教画家曹仲玄，人物肖像画家周文矩、顾闳中，山水画家董源、赵幹、卫贤，花鸟画家唐希雅、徐崇嗣等人；活跃在画院外的士大夫画家徐熙的花鸟画独树一帜。南唐绘画发展全面，特别在山水、花鸟画领域颇有创新。","教学分析":"五代荆浩、关仝在战乱中坚持山水画创作，将唐代青绿山水推向水墨写实新阶段；北宋院体则在稳定政治环境中完成了山水画的**技法体系化**。**战乱中的坚守**与**盛世中的规范**，揭示出艺术发展的**非线性逻辑**：历史危机有时反而是风格突破的催化剂。","批注":"","标签":[],"image":"","link":"","importance":0},{"类别":"国内","年代":"北宋（约10—11世纪）","排序年":1050,"作品/事件名称":"范宽《溪山行旅图》","作者/设计师":"范宽","来源书目":"《中国美术简史》","简介":"宋　范宽　206.3×103.3cm　绢本水墨　台北故宫博物院　彩-20　　腊梅山禽图　宋　赵佶　83.3×53.3cm　绢本设色　台北故宫博物院　彩-21　　朝元图（局部）　元　高240cm　壁画　山西芮城永乐宫　彩-22　　钧窑花盆　宋　高18.3cm　北京故宫博物院　彩-23　　芙蓉游鹅图　明　孙隆　159.3×…","原文引用":"宋　范宽　206.3×103.3cm　绢本水墨　台北故宫博物院　彩-20　　腊梅山禽图　宋　赵佶　83.3×53.3cm　绢本设色　台北故宫博物院　彩-21　　朝元图（局部）　元　高240cm　壁画　山西芮城永乐宫　彩-22　　钧窑花盆　宋　高18.3cm　北京故宫博物院　彩-23　　芙蓉游鹅图　明　孙隆　159.3×84.2cm　绢本设色　北京故宫博物院　彩-24　　千里江山图　宋　王希孟　全图51.3×1188cm绢本设色　北京故宫博物院　彩-25","教学分析":"","批注":"","标签":["1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国内","年代":"北宋（11世纪）","排序年":1050,"作品/事件名称":"苏轼的文人画理论","作者/设计师":"苏轼","来源书目":"《中国美术简史》","简介":"王维（701—761年），字摩诘，著名诗人，同时又是影响深远的山水画家。一生居官慕隐，常往返于陕西蓝田辋川别墅，以琴、诗、绘画自娱。苏轼评价他的作品为“味摩诘之诗，诗中有画；观摩诘之画，画中有诗”。王维以诗入画，创造出简淡抒情的意境。特别是他首先采用“破墨”山水的技法，大大发展了山水画的笔墨意境，对山水画的变革作出了重…","原文引用":"王维（701—761年），字摩诘，著名诗人，同时又是影响深远的山水画家。一生居官慕隐，常往返于陕西蓝田辋川别墅，以琴、诗、绘画自娱。苏轼评价他的作品为“味摩诘之诗，诗中有画；观摩诘之画，画中有诗”。王维以诗入画，创造出简淡抒情的意境。特别是他首先采用“破墨”山水的技法，大大发展了山水画的笔墨意境，对山水画的变革作出了重大贡献。他以辋川为题材创作了不少作品，但流传下来的绘画尚无可靠的真迹。","教学分析":"","批注":"","标签":["1.1 本体与客体","3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国内","年代":"辽代（10—12世纪）","排序年":1150,"作品/事件名称":"辽代皮囊壶：游牧功能与造型生成","作者/设计师":"（辽代工匠）","来源书目":"《中国工艺美术史新编》","简介":"皮囊壶因游牧民族马背生活的需求而生，从扁平便携到趋圆适于陈放，造型的演变直接追踪着使用者生活形态的改变。这是\"客体（社会功能与生活方式）决定艺术…","原文引用":"——《中国工艺美术史新编》/ 前言·二、适用的原则\n演进又令器形不断变化，辽代的皮囊壶就是明证［较细微的变化表现在体量的差异。一样是注子，茶汤是热的，故茶注不配注碗，酒液是凉的，故酒注会配注碗以加温；一样是酒具,硕大的往往反映所贮酒的温和，小巧的则每与酒的浓烈相联。装饰与功能的联系不及造型密切，但日用容器的装饰有从立体向平面发展的明显趋势，如元以来的陶瓷装饰已大体是彩绘的一统天下，这同平面装饰的器物更易清洗有关。","教学分析":"皮囊壶因游牧民族**马背生活**的需求而生，从扁平便携到趋圆适于陈放，造型的演变直接**追踪着使用者生活形态的改变**。这是\"客体（社会功能与生活方式）决定艺术本体（造型语言）\"最直接的案例：**功能需求是造型变革的根本动力**，与依赖主观审美自律的纯艺术截然不同。","批注":"","标签":["1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国内","年代":"辽代（10—12世纪）","排序年":1150,"作品/事件名称":"辽代皮囊壶：功能驱动的形式演化","作者/设计师":"（辽代工匠）","来源书目":"《中国工艺美术史新编》","简介":"皮囊壶从\"扁平利于贴体\"到\"趋圆宜于陈放\"的造型演变，完全由使用方式的改变（游牧→定居）所驱动：功能需求是形式的唯一设计者。这是…","原文引用":"——《中国工艺美术史新编》/ 前言·二、适用的原则\n除少数纯玩赏之作外，工艺美术最关心适用，造型和装饰往往体现着功能的需要。古代中国长期以农耕民族为主体，与其定居生活相适应，器物造型大多安定稳重，便于陈放。而在游牧民族入主的时代，便携器物为数众多，这体现的是统治民族马背上的生活，他们生活形态的演进又令器形不断变化，辽代的皮囊壶就是明证［图0・3、图0・4】。","教学分析":"皮囊壶从\"**扁平利于贴体**\"到\"**趋圆宜于陈放**\"的造型演变，完全由**使用方式的改变**（游牧→定居）所驱动：**功能需求是形式的唯一设计者**。这是\"功能先于形式\"最极端的案例——没有任何审美自主性介入，形式完全服从于功能逻辑。教师可对比现代产品设计中\"形式\"与\"功能\"谁优先的辩论（如苹果vs谷歌的设计哲学），发现这一张力的当代延伸。","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国内","年代":"北宋—南宋（11—13世纪）","排序年":1250,"作品/事件名称":"宋代院体与文人画的二元分野","作者/设计师":"（苏轼等文人 / 李唐等院画家）","来源书目":"《中国美术简史》","简介":"宋代形成两种绘画价值体系：院体追求\"状物绘形的严格写实技巧\"，文人画强调\"寄兴抒情、平淡素雅\"。两者代表了客观再现与主观表现的根…","原文引用":"——《中国美术简史》/ 第三编·第一章\n宋代文人士大夫把绘画进一步视为文化修养和风雅生活的重要部分，出现了很多收藏家、鉴赏家和画家。司马光、欧阳修、沈括、黄庭坚等人都是绘画爱好者，在他们的著述中也有对绘画的精辟见解。11世纪后半叶，汴梁城中的一些文人名士的诗文书画活动非常活跃，其代表人物为李公麟、苏轼、文同、王诜、米芾等人。他们都有精深的文化修养和书法造诣，绘画多为寄兴抒情之作，题材偏重墨竹、墨梅、山水树石及花卉，追求主观情趣的表现，反对过分拘泥于形似的描摹，艺术上力求洗去铅华而趋于平淡素雅，力倡天真清新的风格。南宋时期又有米友仁、扬补之、赵孟坚等名家。宋代文人士大夫绘画潮流影响到金代绘画，在实践上和理论上都为元明清文人画发展奠定了基础。","教学分析":"宋代形成两种绘画价值体系：院体追求\"**状物绘形的严格写实技巧**\"，文人画强调\"**寄兴抒情、平淡素雅**\"。两者代表了**客观再现**与**主观表现**的根本分歧，这一裂缝延续至今——当代艺术界关于\"**写实主义**\"与\"**表现主义**\"的争论，可视为这对矛盾在现代语境中的回响。教师可追问：两种标准是否都合法？谁有权评判？","批注":"","标签":["1.2 二元与多元"],"image":"","link":"","importance":0},{"类别":"国内","年代":"宋末（13世纪）","排序年":1250,"作品/事件名称":"法常水墨写意花鸟：从形似到笔墨意趣","作者/设计师":"法常（牧溪）","来源书目":"《中国美术简史》","简介":"法常\"随笔点墨而成，意思简当不费妆饰\"，被批评者指为\"粗恶无古法\"，却在明清之际被大量继承发展。这一案例揭示：水墨写意的\"简\"不是能力欠缺，…","原文引用":"——《中国美术简史》/ 第三编·第三章\n法常，号牧溪，生活于宋末。据文献记载，他曾因有斥责奸相贾似道的言论而遭追捕。他擅画水墨写意花鸟，“喜画龙、虎、猿、鹤、芦雁、山水、树石、人物，皆随笔点墨而成，意思简当不费妆饰”。他的不少画流入日本，如《观音》、《猿》、《老松八哥》（图4-32）等。国内有保存于故宫博物院的《写生蔬果图卷》等。他的画用笔恣肆而形神兼备，在宋代精工富丽的院体花鸟及清雅的士大夫梅竹外别具一格，是一种新兴起的画风。所以有的赏鉴家认为“枯淡山野，诚非雅玩”，“粗恶无古法”。到明清之际这种水墨写意却为不少画家继承发展，产生了重大的影响。","教学分析":"法常\"**随笔点墨而成，意思简当不费妆饰**\"，被批评者指为\"**粗恶无古法**\"，却在明清之际被大量继承发展。这一案例揭示：**水墨写意的\"简\"不是能力欠缺，而是主动的美学减法**——通过削减具象细节，将视觉重心转移至笔墨本身的**书写性与抽象张力**。形似让位于意趣，这正是中国绘画**从具象叙事向抽象表现转型**的关键节点。","批注":"","标签":["1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国内","年代":"宋末（13世纪）","排序年":1250,"作品/事件名称":"法常水墨花鸟：精英批评与大众接受的悖论","作者/设计师":"法常","来源书目":"《中国美术简史》","简介":"法常的写意花鸟在中国精英圈子被批为\"粗恶无古法\"，却在日本获得极高的顶级收藏地位——这个案例揭示了精英品位的地域性与历史性：艺术价值的判断受制于…","原文引用":"——《中国美术简史》/ 第三编·第三章\n法常，号牧溪，生活于宋末。据文献记载，他曾因有斥责奸相贾似道的言论而遭追捕。他擅画水墨写意花鸟，“喜画龙、虎、猿、鹤、芦雁、山水、树石、人物，皆随笔点墨而成，意思简当不费妆饰”。他的不少画流入日本，如《观音》、《猿》、《老松八哥》（图4-32）等。国内有保存于故宫博物院的《写生蔬果图卷》等。他的画用笔恣肆而形神兼备，在宋代精工富丽的院体花鸟及清雅的士大夫梅竹外别具一格，是一种新兴起的画风。所以有的赏鉴家认为“枯淡山野，诚非雅玩”，“粗恶无古法”。到明清之际这种水墨写意却为不少画家继承发展，产生了重大的影响。","教学分析":"法常的写意花鸟在中国精英圈子被批为\"**粗恶无古法**\"，却在日本获得极高的顶级收藏地位——这个案例揭示了**精英品位的地域性与历史性**：艺术价值的判断受制于特定**评价共同体**的标准，并非客观普遍。同一件作品在不同精英群体（中国文人vs日本禅僧）之间获得截然相反的评价，说明**\"精英\"本身并不是同质的评价权威**。","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国内","年代":"宋代（10—13世纪）","排序年":1250,"作品/事件名称":"建窑兔毫盏——宋代斗茶文化","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"10.建窑窑址在福建建阳，以烧造黑釉茶盏驰名，青白瓷也有较高的水平。黑瓷的源头可追寻到东汉，唐以来，各地窑场往往兼烧黑瓷，但产品多较粗朴。建窑不同，大批烧造精美的黑釉茶盏，这与当时风靡的斗茶联系密切，因为黑色的釉面最宜斗茶。徽宗时，君臣即痴迷斗茶。建窑也曾为宫廷烧造，故窑址标本屡屡岀现“供御”等刻铭。建盏釉厚，近底处大…","原文引用":"10.建窑窑址在福建建阳，以烧造黑釉茶盏驰名，青白瓷也有较高的水平。黑瓷的源头可追寻到东汉，唐以来，各地窑场往往兼烧黑瓷，但产品多较粗朴。建窑不同，大批烧造精美的黑釉茶盏，这与当时风靡的斗茶联系密切，因为黑色的釉面最宜斗茶。徽宗时，君臣即痴迷斗茶。建窑也曾为宫廷烧造，故窑址标本屡屡岀现“供御”等刻铭。建盏釉厚，近底处大面积露胎。釉地漆黑，其上多布满细长的银色结晶斑纹，称“兔毫”【图7 • 23 ],兔毫也屡见于其他瓷窑，但以建盏水平最高。建盏上，还有其他形状的结晶斑，小圆点形的，称“油滴”，若为较大的彩色圆形，日本人则称“曜变”【图7・24】，前者并非建窑独有，后者最美妙、最　第七章辽宋夏金211图7・23 图7・24图7・25图7・26图7・23建窑黑瓷兔毫盏 口径12.4厘米北宋，兔毫盏享盛名，宋徽宗说：\"盏色贵青黑，玉毫条达者为上。'’指的就是兔毫盏。","教学分析":"","批注":"","标签":["3.1 精英与大众","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"南宋（12—13世纪）","排序年":1250,"作品/事件名称":"马远与夏圭——\"残山剩水\"的南宋院体","作者/设计师":"马远；夏圭","来源书目":"《中国美术简史》","简介":"人才济济，如马贲、王希孟、张择端、李唐、朱锐、苏汉臣、刘益、富燮等。南宋初期则任用宣和画院旧人并补充当地画手重建画院，一时名家都集中于宫廷，至光宗、宁宗时出现了马远、夏圭、李嵩、梁楷、李迪等巨匠，又一次掀起宫廷绘画高潮。　宫廷绘画对中国古代美术发展具有重要影响…","原文引用":"人才济济，如马贲、王希孟、张择端、李唐、朱锐、苏汉臣、刘益、富燮等。南宋初期则任用宣和画院旧人并补充当地画手重建画院，一时名家都集中于宫廷，至光宗、宁宗时出现了马远、夏圭、李嵩、梁楷、李迪等巨匠，又一次掀起宫廷绘画高潮。　宫廷绘画对中国古代美术发展具有重要影响。","教学分析":"","批注":"","标签":["3.1 精英与大众","1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国内","年代":"南宋（约13世纪）","排序年":1250,"作品/事件名称":"梁楷《泼墨仙人图》——减笔写意","作者/设计师":"梁楷","来源书目":"《中国美术简史》","简介":"王希孟、张择端、李唐、朱锐、苏汉臣、刘益、富燮等。南宋初期则任用宣和画院旧人并补充当地画手重建画院，一时名家都集中于宫廷，至光宗、宁宗时出现了马远、夏圭、李嵩、梁楷、李迪等巨匠，又一次掀起宫廷绘画高潮。　宫廷绘画对中国古代美术发展具有重要影响…","原文引用":"王希孟、张择端、李唐、朱锐、苏汉臣、刘益、富燮等。南宋初期则任用宣和画院旧人并补充当地画手重建画院，一时名家都集中于宫廷，至光宗、宁宗时出现了马远、夏圭、李嵩、梁楷、李迪等巨匠，又一次掀起宫廷绘画高潮。　宫廷绘画对中国古代美术发展具有重要影响。","教学分析":"","批注":"","标签":["4.3 媒介、材料与内容","1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国内","年代":"元代（1244年始建）","排序年":1271,"作品/事件名称":"永乐宫壁画《朝元图》：宗教服务与艺术巅峰","作者/设计师":"朱好古弟子群","来源书目":"《中国美术简史》","简介":"永乐宫壁画以超过1000平方米的规模、数百神仙人物的线描巨制，服务于全真道的宗教功能。但在宗教委托的框架内，画家实现了线描技法的历史性高峰。这揭…","原文引用":"——《中国美术简史》/ 第二编·第五章\n第，后遇钟离权点化成道，元代封为纯阳演政警化孚佑帝君。壁画以连环画形式描绘吕洞宾从降生到得道及度化世人的事迹，共52幅。其中山水界画皆工致严谨，各故事画以树石间隔又构成整体。殿中扇面墙后绘有大幅壁画，表现钟离权度吕洞宾的情节，钟离权精神充沛滔滔不绝地对吕洞宾进行启发，吕洞宾拱手笼袖恭听，对人物内心作了细致入微的刻画，背景作水墨山水，亦极见功力。纯阳殿壁画完成于至正十八年（1358年），由晋南名画师朱好古的弟子张遵礼等人完成。　山西洪洞广胜寺原分上寺、下寺二部，下寺右侧山麓有水神庙，内有明应王殿，建于元仁宗延祐六年（1319年）。下寺原有至大二年（1309年）时所绘壁画，惜早年被盗卖出国，明应王殿壁画幸存至今。该殿四壁均布满壁画，两壁画水神受诸神朝贺，并配以当地霍山景色。其他壁面还绘有侍女烹茶侍奉等情景，富有生活气息。面对神像的殿门旁壁上绘有戏曲表演场面，前排列有演员五人，作生、末、净等角色，装扮各有特点，后排有乐师伴奏，上端横额有“大行散乐忠都秀在此作场”字样。宋元时晋南一带是戏曲活跃地区，这幅壁画为研究戏曲史及演出状况提供了生动而形象的资料。横额上有“泰定元年”字样，可知壁画当绘于此时。","教学分析":"永乐宫壁画以超过1000平方米的规模、数百神仙人物的线描巨制，**服务于全真道的宗教功能**。但在宗教委托的框架内，画家实现了**线描技法的历史性高峰**。这揭示出一个悖论：**艺术巅峰有时恰恰产生于强烈的外部功能约束之中**——服务于明确目的的委托制作，反而可能激发出最强大的创造能量。","批注":"","标签":["3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国内","年代":"元代（1350年）","排序年":1271,"作品/事件名称":"黄公望《富春山居图》","作者/设计师":"黄公望","来源书目":"《中国美术简史》","简介":"所师法。晚年艺术愈益精进，70岁左右绘成之《溪山雨意图》、73岁时创作之《天地石壁图》、81岁时画成的《九峰雪霁图》，特别是79岁时开始创作约于82岁时画成之《富春山居图》等皆为传世之名作。《富春山居图》（图4-46）为横卷，长达两丈，以苍润精练的笔墨和优美动人的意境描绘浙江富阳、桐庐一带的山容水貌，及富春江上的旖旎风…","原文引用":"所师法。晚年艺术愈益精进，70岁左右绘成之《溪山雨意图》、73岁时创作之《天地石壁图》、81岁时画成的《九峰雪霁图》，特别是79岁时开始创作约于82岁时画成之《富春山居图》等皆为传世之名作。《富春山居图》（图4-46）为横卷，长达两丈，以苍润精练的笔墨和优美动人的意境描绘浙江富阳、桐庐一带的山容水貌，及富春江上的旖旎风光。此卷系应友人郑无用之请而绘，每兴之所至即点染挥毫，前后断续酝酿数年始完成，没有过多地拘泥于物象表面的细微描画，而是着重把握住山水的整体风貌，以活脱潇洒的笔墨抒发作者的主观意趣。卷中江水平静，峰峦起伏，点缀丛林亭舍，疏密相间，吸收董、巨画法而更加简括，显示出较深的笔墨功力，为黄氏经意之作。黄公望还著有《写山水诀》一篇，言简意赅地论述山水画法，文中谈及：“山水中用笔法，谓之筋骨相连，有笔有墨之分：用描处糊突其笔，谓之有墨；水笔不动描法，谓之有笔。此画家紧要处，山石树木皆用此。”“画石之妙，用藤黄水侵人墨笔，自然润色，不可多用，多则滞笔。间用螺青人墨亦妙。”“画一窠一石，当逸笔撇脱，有士人家风。”又谓：“作画只是个理字最紧要。”提出：“皮袋中置描笔在内，或于好景处见树有怪异","教学分析":"","批注":"","标签":["2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国内","年代":"北宋中期—元代（11—14世纪）","排序年":1350,"作品/事件名称":"宋代文人画的精英话语建构","作者/设计师":"苏轼 / 李公麟 / 米芾等","来源书目":"《中国美术简史》","简介":"宋代文人士大夫\"绘画多为寄兴抒情之作，追求主观情趣的表现，反对过分拘泥于形似\"——通过建立不可学、不可量化的\"气韵\"与\"文人气\"标准，文人画群体…","原文引用":"——《中国美术简史》/ 第三编·第一章\n宋代文人士大夫把绘画进一步视为文化修养和风雅生活的重要部分，出现了很多收藏家、鉴赏家和画家。司马光、欧阳修、沈括、黄庭坚等人都是绘画爱好者，在他们的著述中也有对绘画的精辟见解。11世纪后半叶，汴梁城中的一些文人名士的诗文书画活动非常活跃，其代表人物为李公麟、苏轼、文同、王诜、米芾等人。他们都有精深的文化修养和书法造诣，绘画多为寄兴抒情之作，题材偏重墨竹、墨梅、山水树石及花卉，追求主观情趣的表现，反对过分拘泥于形似的描摹，艺术上力求洗去铅华而趋于平淡素雅，力倡天真清新的风格。南宋时期又有米友仁、扬补之、赵孟坚等名家。宋代文人士大夫绘画潮流影响到金代绘画，在实践上和理论上都为元明清文人画发展奠定了基础。","教学分析":"宋代文人士大夫\"**绘画多为寄兴抒情之作**，追求主观情趣的表现，反对过分拘泥于形似\"——通过建立**不可学、不可量化**的\"气韵\"与\"文人气\"标准，文人画群体构建了**排斥职业画工的精英鉴赏壁垒**。这是**精英阶层利用文化话语权进行社会区隔**的典型案例。教师可引导学生批判性地追问：文人画的\"高雅\"标准是审美事实，还是**阶级品位的意识形态产物**？","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国内","年代":"宋金元（10—14世纪）","排序年":1350,"作品/事件名称":"磁州窑——宋元民间彩绘陶瓷","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"时代，磁州窑的白地黑花瓷繁荣昌盛，这却应有唐人的陶瓷彩绘的技术泽被。更有意义的是如冰类玉的秘色瓷，它对以后的中国陶瓷发展影响巨大…","原文引用":"时代，磁州窑的白地黑花瓷繁荣昌盛，这却应有唐人的陶瓷彩绘的技术泽被。更有意义的是如冰类玉的秘色瓷，它对以后的中国陶瓷发展影响巨大。","教学分析":"","批注":"","标签":["3.1 精英与大众","1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国内","年代":"元代（14世纪）","排序年":1350,"作品/事件名称":"元代青花瓷","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"南宋，但图案的定型却因文宗的御衣图案。元青花中，满池娇就是最常见的一种装饰主题，体现了丝绸装饰的重大影响。1.色彩那时，白、蓝、红、褐、绿是常见的织物用色，其常见都有审美以外的缘由…","原文引用":"南宋，但图案的定型却因文宗的御衣图案。元青花中，满池娇就是最常见的一种装饰主题，体现了丝绸装饰的重大影响。1.色彩那时，白、蓝、红、褐、绿是常见的织物用色，其常见都有审美以外的缘由。","教学分析":"","批注":"","标签":["5.1 本土与异域","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"元代（13—14世纪）","排序年":1350,"作品/事件名称":"赵孟頫——元代复古与书画同源","作者/设计师":"赵孟頫","来源书目":"《中国美术简史》","简介":"赵孟頫提倡\"书画同源\"，以书法用笔入画，同时倡导复古晋唐，在宋代写意之后重建工整传统，是复古主义与创新之间的核心张力。","原文引用":"","教学分析":"","批注":"","标签":["2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国内","年代":"明万历廿八年（1600年）起","排序年":1368,"作品/事件名称":"西方铜版画引入：版画技术与视觉科学的移植","作者/设计师":"利玛窦 / 康熙年间宫廷画师","来源书目":"《中国美术简史》","简介":"铜版画以其精密的线刻技术与版画印刷的可复制性，将西方的透视科学、明暗造型体系一并引入中国。这不仅是一种技术转移，更是整套视觉认知体系的移植*…","原文引用":"——《中国美术简史》/ 第六编·第二章\n西方的铜版画作品在明万历年间已由传教士利玛窦带入中国，西方铜版印刷技术的应用最早则是在康熙年间。早期的铜版画是康熙时印制的《御制耕织图诗》与《避暑山庄图诗》。　乾隆时期，清廷为了炫耀武功成就，在皇帝的授意下，绘制了一系列铜版画作品，如《乾隆平定准部回部战图》、《廓尔喀得胜图》、《平定两金川战图》、《平定苗疆战图》、《平定台湾战图》及《圆明园东长春园图》等。其中最著名的是由郎世宁、王致诚、艾启蒙和安德义等外籍宫廷画家在乾隆二十九年（1764年）创稿的铜版画《乾隆平定准部回部战图》册，共16幅，描绘了乾隆二十至二十六年（1755—1761年）平定蒙古族准噶尔部达瓦齐及维吾尔族贵族大小和卓木叛乱的战争。乾隆皇帝亲自下令绘制，并专门送往法国制版。版画采用了全景式的构图以及西洋画风，表现了规模宏大而复杂的战争场面，制作精美，堪称铜版画的典范之作。","教学分析":"铜版画以其**精密的线刻技术与版画印刷的可复制性**，将西方的**透视科学、明暗造型体系**一并引入中国。这不仅是一种技术转移，更是**整套视觉认知体系的移植**——铜版画的精确性背后是欧洲**光学科学与解剖学知识**。教师可对比木刻版画与铜版画的视觉效果，分析两种技术路径背后**不同的科学世界观**。","批注":"","标签":["4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国内","年代":"明万历廿八年（1600年）起","排序年":1368,"作品/事件名称":"利玛窦带入铜版画：西方透视科学的本土回响","作者/设计师":"利玛窦 / 郎世宁等","来源书目":"《中国美术简史》","简介":"利玛窦带入的铜版画以焦点透视与明暗造型（西方视觉科学）挑战了中国的散点透视与线描传统（本土视觉体系）。中国宫廷画家郎世宁等人发展出\"中西合璧…","原文引用":"——《中国美术简史》/ 第六编·第二章\n西方的铜版画作品在明万历年间已由传教士利玛窦带入中国，西方铜版印刷技术的应用最早则是在康熙年间。早期的铜版画是康熙时印制的《御制耕织图诗》与《避暑山庄图诗》。　乾隆时期，清廷为了炫耀武功成就，在皇帝的授意下，绘制了一系列铜版画作品，如《乾隆平定准部回部战图》、《廓尔喀得胜图》、《平定两金川战图》、《平定苗疆战图》、《平定台湾战图》及《圆明园东长春园图》等。其中最著名的是由郎世宁、王致诚、艾启蒙和安德义等外籍宫廷画家在乾隆二十九年（1764年）创稿的铜版画《乾隆平定准部回部战图》册，共16幅，描绘了乾隆二十至二十六年（1755—1761年）平定蒙古族准噶尔部达瓦齐及维吾尔族贵族大小和卓木叛乱的战争。乾隆皇帝亲自下令绘制，并专门送往法国制版。版画采用了全景式的构图以及西洋画风，表现了规模宏大而复杂的战争场面，制作精美，堪称铜版画的典范之作。","教学分析":"利玛窦带入的铜版画以**焦点透视与明暗造型**（西方视觉科学）挑战了中国的**散点透视与线描传统**（本土视觉体系）。中国宫廷画家郎世宁等人发展出**\"中西合璧\"**的混合风格——这种混合不是彻底替代，而是在**本土需求的框架内有选择地吸纳异域技法**。教师可引导学生分析：这种混合风格是真正的融合，还是**表面嫁接**？两种透视体系背后是否存在**不可调和的认识论矛盾**？","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国内","年代":"明代（15世纪）","排序年":1450,"作品/事件名称":"明代掐丝珐琅（景泰蓝）","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"景泰蓝是阿拉伯珐琅工艺传入中国后与本土铜胎工艺结合的产物，明代在宫廷器物制作中被本土化为\"中国风格\"。","原文引用":"","教学分析":"","批注":"","标签":["5.1 本土与异域","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国内","年代":"明代嘉靖—万历年间（16世纪）","排序年":1550,"作品/事件名称":"苏州\"斋头清玩\"与文人器物的非物质品位建构","作者/设计师":"（苏州文人工匠）","来源书目":"《中国工艺美术史新编》","简介":"\"斋头清玩，尚古朴不尚雕镂\"——文人器物的价值不在材料的贵重或技艺的繁复，而在于通过简素的物质形态传递的非物质品位：一种追摹\"商周秦汉之式\"的*…","原文引用":"——《中国工艺美术史新编》/ 第九章·第一节\n的面貌出现。比嘉定竹刻、宜兴紫砂更典型的是苏州家具，其“斋头清玩、几案床榻，近皆以紫檀、花梨为尚，尚古朴不尚雕镂，即物有雕镂，亦皆尚商周秦汉之式，海内僻远皆效尤之，此亦嘉（靖）隆（庆）万（历）三朝为盛”（《广志绎》卷2）。","教学分析":"\"**斋头清玩，尚古朴不尚雕镂**\"——文人器物的价值不在材料的贵重或技艺的繁复，而在于通过**简素的物质形态传递的非物质品位**：一种追摹\"商周秦汉之式\"的**历史意识与文化身份认同**。这是**品位作为非物质资产**的典型案例：拥有\"正确\"的器物意味着拥有正确的文化阶层归属。","批注":"","标签":["1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国内","年代":"明代中期（约15—16世纪）","排序年":1550,"作品/事件名称":"明吴门画派：继承元代文人画的江南新阶段","作者/设计师":"沈周 / 文征明 / 唐寅 / 仇英","来源书目":"《中国美术简史》","简介":"吴门画派\"远承元代文人画传统\"，但将这一传统移植到苏州的商业繁荣与收藏鉴赏文化之中，形成了\"以复古为更新\"的独特路径。这一模式揭示：…","原文引用":"——《中国美术简史》/ 第四编·第一章\n明代绘画的发展，大致可以分为早期、中期和晚期三个阶段。明初，虽然仍有少数画家承袭元代山水与墨竹的文人画风，但前期画坛主要以崇尚宋代院体画风的宫廷绘画和浙派为主流，名手遍于宫廷与民间。中期以后，苏州成为江南一带经济与文化的中心，其浓郁的以复古为更新的文化空气，以及日益勃兴的收藏鉴赏法书、名画的风尚，促成了远承元代文人画传统的地方画派——吴门画派崛起，影响极为深远。明代后期，花鸟、山水、人物画领域都取得了长足的发展，先后出现了多种流派与画风，诸如注重独抒性灵的写意花鸟画风；追求拙丑趣味的变形人物画风，精到传神的肖像画派；力倡文人画尤讲求笔墨的松江山水画派；其影响所及，直至清代。","教学分析":"吴门画派\"**远承元代文人画传统**\"，但将这一传统移植到苏州的**商业繁荣与收藏鉴赏文化**之中，形成了\"**以复古为更新**\"的独特路径。这一模式揭示：**继承不是照搬，而是在新的社会经济条件下对传统进行选择性激活与再生产**。教师可追问：吴门画派与元代文人画在\"继承\"什么、\"创新\"什么？这种分析训练学生的**风格谱系意识**。","批注":"","标签":["2.2 继承与创新"],"image":"","link":"","importance":0},{"类别":"国内","年代":"明代嘉靖—万历年间（16世纪）","排序年":1550,"作品/事件名称":"宜兴紫砂与文人品位的在地化生产","作者/设计师":"时大彬等紫砂工匠","来源书目":"《中国工艺美术史新编》","简介":"宜兴紫砂壶以高度在地性的材料（紫砂土）和工艺，生产出满足全国文人市场需求的\"雅器\"。它在苏州文人圈确立的品位标准，随后扩散到\"海内僻远皆效尤…","原文引用":"——《中国工艺美术史新编》/ 第九章·第一节\n的面貌出现。比嘉定竹刻、宜兴紫砂更典型的是苏州家具，其“斋头清玩、几案床榻，近皆以紫檀、花梨为尚，尚古朴不尚雕镂，即物有雕镂，亦皆尚商周秦汉之式，海内僻远皆效尤之，此亦嘉（靖）隆（庆）万（历）三朝为盛”（《广志绎》卷2）。","教学分析":"宜兴紫砂壶以**高度在地性的材料（紫砂土）和工艺**，生产出满足**全国文人市场**需求的\"雅器\"。它在苏州文人圈确立的品位标准，随后扩散到\"**海内僻远皆效尤之**\"——一种在地性的审美趣味通过**名士推广与商业流通**实现了跨区域的标准化传播，成为明代文人文化的**全国性符号**。这是**在地特产如何通过文化赋权成为全国性品味符号**的历史案例。","批注":"","标签":["5.2 全球化与在地性"],"image":"","link":"","importance":0},{"类别":"国内","年代":"明代嘉靖—万历年间（16世纪）","排序年":1550,"作品/事件名称":"苏州\"斋头清玩\"与文人器物的非物质品位建构","作者/设计师":"（苏州文人工匠）","来源书目":"《中国工艺美术史新编》","简介":"苏州文人的\"斋头清玩\"以品味的精微与稀缺性建构了一套精英话语体系：器物的好坏不由功能或价格决定，而由文人圈内的共识与品鉴能力决定。这种品味的阶层化*…","原文引用":"——《中国工艺美术史新编》/ 第九章·第一节\n的面貌出现。比嘉定竹刻、宜兴紫砂更典型的是苏州家具，其“斋头清玩、几案床榻，近皆以紫檀、花梨为尚，尚古朴不尚雕镂，即物有雕镂，亦皆尚商周秦汉之式，海内僻远皆效尤之，此亦嘉（靖）隆（庆）万（历）三朝为盛”（《广志绎》卷2）。","教学分析":"苏州文人的\"斋头清玩\"以**品味的精微与稀缺性**建构了一套精英话语体系：器物的好坏不由功能或价格决定，而由文人圈内的共识与品鉴能力决定。这种**品味的阶层化**恰是**精英与大众**分野的核心机制之一。\"清玩\"之所以\"清\"，正在于它对大众趣味的主动疏离。教师可引导：今天哪些文化消费领域存在类似的**品味精英主义**（如黑胶唱片、特定咖啡文化）？这种精英品味是否有其积极价值，还是纯粹的阶级区隔？","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国内","年代":"清代康熙—乾隆年间（1662—1795年）","排序年":1644,"作品/事件名称":"康熙至乾隆：官作与民窑的多元生态","作者/设计师":"（景德镇官窑 / 民窑）","来源书目":"《中国工艺美术史新编》","简介":"清三代瓷器呈现宫廷官窑与民间民窑并行的多元格局：官窑以技艺极致体现皇权威仪，民窑则以市场活力和地域风格形成多样生态。\"顶峰过后，便是下坡\"的判断…","原文引用":"——《中国工艺美术史新编》/ 第十章·第一节\n康熙(1662—1722年)、雍正( 1723—1735年)、乾隆(1736—1795年)三朝是清王朝的鼎盛期，工艺美术也逐渐登上顶峰，但顶峰过后，便是下坡。转折发生在乾隆晚期。大体上，先前，技艺并重，以后，则对技术更加迷恋，艺术水平渐渐降低。","教学分析":"清三代瓷器呈现**宫廷官窑与民间民窑**并行的多元格局：官窑以技艺极致体现皇权威仪，民窑则以市场活力和地域风格形成多样生态。\"**顶峰过后，便是下坡**\"的判断揭示：当制作者只追求**技术极致而忽视艺术精神**时，艺术性反而衰退——这是**技艺与创造力之间二元张力**的历史警示。","批注":"","标签":["1.2 二元与多元"],"image":"","link":"","importance":0},{"类别":"国内","年代":"清末民初（1874—1921年）","排序年":1644,"作品/事件名称":"近代留学潮与西方美术体系的引入","作者/设计师":"（留日留欧学生群体）","来源书目":"《中国美术简史》","简介":"\"五四\"前后，中国通过兴办新式美术学校、选派留学生等方式系统引入西方美术教育体系，这是中国美术史上最激烈的传统断裂与当代建构。改良派以\"西方当代…","原文引用":"——《中国美术简史》/ 第六编·概况\n从太平天国到辛亥革命，这些伟大的斗争，都促进了美术的发展。太平天国的壁画创作是清末最集中、最活跃的美术创作活动。在“五四”以前的中国资产阶级民主革命过程中，以中学为体、西学为用的改良派思想和旧民主主义的文化思想都曾对美术事业产生过较大的影响，主要表现为：以西方模式兴办新的美术学校并选派留学生出国学习，推动了西方美术在中国流行；一些思想家、理论家发表的改革中国美术的文章，冲击着几千年来的旧的观念，呼唤着中国美术的复兴。蔡元培提倡的“以美育代宗教”是突出的代表。美育成为当时新美术运动的中心议题，意图通过提倡美育确定美术的社会价值和美术家的社会地位，但在半封建半殖民地社会背景条件下，实施美育困难重重。","教学分析":"\"五四\"前后，中国通过**兴办新式美术学校、选派留学生**等方式系统引入西方美术教育体系，这是中国美术史上最激烈的**传统断裂与当代建构**。改良派以\"西方当代\"冲击\"中国传统\"，但蔡元培等人的实践表明：**真正的现代化不是对传统的全面否定，而是在新的认识论框架中重新定位传统的价值**。","批注":"","标签":["2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国内","年代":"清同治三年（1864年）起","排序年":1644,"作品/事件名称":"土山湾画馆：传教目的下的西洋画教育","作者/设计师":"范廷佐（比利时修士）/ 刘德斋","来源书目":"《中国美术简史》","简介":"土山湾画馆由天主教传教士创办，\"所画作品多以宗教为题材，用以传播教义\"——西洋画技法在此被明确服务于宗教传播目的。但它同时培育了徐悲鸿等人尊称的…","原文引用":"——《中国美术简史》/ 第六编·第二章\n清同治初，上海天主教会创办了土山湾孤儿院附属的美术工场，其中图画间习称“土山湾画馆”。最初主持者为擅长绘画和雕塑的天主堂辅理修士范廷佐，他曾将技艺传授给中国修士陆伯都。在他们之后，中国修士刘德斋和法国修士潘相公相继主持画馆，主要传授西洋画法，所画作品多以宗教为题材，用以传播教义。“土山湾画馆”自同治三年（1864年）至20世纪40年代末，历时八十余载。徐悲鸿称其对“中西文化之沟通……曾有极珍贵之贡献”，“盖中国西洋画之摇篮也”。","教学分析":"土山湾画馆由天主教传教士创办，\"**所画作品多以宗教为题材，用以传播教义**\"——西洋画技法在此被**明确服务于宗教传播目的**。但它同时培育了徐悲鸿等人尊称的\"**中国西洋画之摇篮**\"，产生了远超传教初衷的文化影响。这是\"**服务于谁**\"命题的复杂案例：**同一种艺术实践可以同时服务于多重目的**，且历史后果可能与原始意图大相径庭。","批注":"","标签":["3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国内","年代":"清同治三年（1864年）起","排序年":1644,"作品/事件名称":"土山湾画馆：天主教艺术在上海的在地化","作者/设计师":"范廷佐 / 刘德斋 / 潘相公","来源书目":"《中国美术简史》","简介":"土山湾画馆由欧洲传教士创办、培养中国学徒，以西洋画法绘制宗教题材，同时影响了徐悲鸿等人所称道的\"中国西洋画之摇篮\"。这是异域艺术机构在本土扎…","原文引用":"——《中国美术简史》/ 第六编·第二章\n清同治初，上海天主教会创办了土山湾孤儿院附属的美术工场，其中图画间习称“土山湾画馆”。最初主持者为擅长绘画和雕塑的天主堂辅理修士范廷佐，他曾将技艺传授给中国修士陆伯都。在他们之后，中国修士刘德斋和法国修士潘相公相继主持画馆，主要传授西洋画法，所画作品多以宗教为题材，用以传播教义。“土山湾画馆”自同治三年（1864年）至20世纪40年代末，历时八十余载。徐悲鸿称其对“中西文化之沟通……曾有极珍贵之贡献”，“盖中国西洋画之摇篮也”。","教学分析":"土山湾画馆由**欧洲传教士创办、培养中国学徒**，以西洋画法绘制宗教题材，同时影响了徐悲鸿等人所称道的\"**中国西洋画之摇篮**\"。这是**异域艺术机构在本土扎根并意外孕育本土现代美术**的案例：原本服务于传教目的的机构，成为中西视觉文化交汇的意外孵化器，揭示出**文化影响的不可预期性**。","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国内","年代":"清代康熙年间以来","排序年":1644,"作品/事件名称":"康熙铜版画：清廷在地权力与西方印刷技术的结合","作者/设计师":"（清廷 / 欧洲传教士画师）","来源书目":"《中国美术简史》","简介":"清康熙年间引入西方铜版印刷技术，用于制作宫廷纪实版画（如《平定准噶尔回部得胜图》）——全球性的技术（铜版印刷）被纳入在地的政治叙事（帝国战功宣传）*…","原文引用":"——《中国美术简史》/ 第六编·第二章\n西方的铜版画作品在明万历年间已由传教士利玛窦带入中国，西方铜版印刷技术的应用最早则是在康熙年间。早期的铜版画是康熙时印制的《御制耕织图诗》与《避暑山庄图诗》。　乾隆时期，清廷为了炫耀武功成就，在皇帝的授意下，绘制了一系列铜版画作品，如《乾隆平定准部回部战图》、《廓尔喀得胜图》、《平定两金川战图》、《平定苗疆战图》、《平定台湾战图》及《圆明园东长春园图》等。其中最著名的是由郎世宁、王致诚、艾启蒙和安德义等外籍宫廷画家在乾隆二十九年（1764年）创稿的铜版画《乾隆平定准部回部战图》册，共16幅，描绘了乾隆二十至二十六年（1755—1761年）平定蒙古族准噶尔部达瓦齐及维吾尔族贵族大小和卓木叛乱的战争。乾隆皇帝亲自下令绘制，并专门送往法国制版。版画采用了全景式的构图以及西洋画风，表现了规模宏大而复杂的战争场面，制作精美，堪称铜版画的典范之作。","教学分析":"清康熙年间引入西方铜版印刷技术，用于制作**宫廷纪实版画**（如《平定准噶尔回部得胜图》）——**全球性的技术（铜版印刷）被纳入在地的政治叙事（帝国战功宣传）**。这揭示了全球化技术流动的规律：**技术本身是中性的，但在地权力总是将其改造为服务本土政治目的的工具**。教师可对比这些图像与欧洲原版铜版画的内容与风格，讨论**技术移植中的在地改造**。","批注":"","标签":["5.2 全球化与在地性"],"image":"","link":"","importance":0},{"类别":"国内","年代":"清末民初（约1887—1920年代）","排序年":1644,"作品/事件名称":"近代留学潮与全球美术教育体系的在地移植","作者/设计师":"（留日、留法中国学生群体）","来源书目":"《中国美术简史》","简介":"中国近代美术学校（国立杭州艺专、上海美专等）以全球性的西方美术教育体制（学院制、素描造型训练）为蓝本，在中国在地化建构。这一过程不是简单的\"引进\"，而是…","原文引用":"——《中国美术简史》/ 第六编·概况\n从太平天国到辛亥革命，这些伟大的斗争，都促进了美术的发展。太平天国的壁画创作是清末最集中、最活跃的美术创作活动。在“五四”以前的中国资产阶级民主革命过程中，以中学为体、西学为用的改良派思想和旧民主主义的文化思想都曾对美术事业产生过较大的影响，主要表现为：以西方模式兴办新的美术学校并选派留学生出国学习，推动了西方美术在中国流行；一些思想家、理论家发表的改革中国美术的文章，冲击着几千年来的旧的观念，呼唤着中国美术的复兴。蔡元培提倡的“以美育代宗教”是突出的代表。美育成为当时新美术运动的中心议题，意图通过提倡美育确定美术的社会价值和美术家的社会地位，但在半封建半殖民地社会背景条件下，实施美育困难重重。","教学分析":"中国近代美术学校（国立杭州艺专、上海美专等）以**全球性的西方美术教育体制**（学院制、素描造型训练）为蓝本，在中国在地化建构。这一过程不是简单的\"引进\"，而是在**在地文化政治脉络**（民族救亡、五四启蒙）中对全球模式的**选择性吸纳与改造**。教师可引导学生反思：当代中国美术教育体系中，哪些是在地传统，哪些是全球化体制的遗产？**这种历史遗产对当代美术教育意味着什么**？","批注":"","标签":["5.2 全球化与在地性"],"image":"","link":"","importance":0},{"类别":"国内","年代":"明代中晚期（约16—17世纪）","排序年":1650,"作品/事件名称":"徐渭水墨大写意：意象的极度解放","作者/设计师":"徐渭","来源书目":"《中国美术简史》","简介":"徐渭（\"青藤\"）以泼墨大写意将具象花鸟推向近乎抽象的视觉边界，笔墨的\"飞白\"与\"泼洒\"使对象的形态仅作骨架而非目的。他与陈淳并称\"白阳青藤*…","原文引用":"——《中国美术简史》/ 第四编·第三章\n明代中后期，无论花鸟画还是人物画都有很大的发展与变异。在明代文人画潮流中，写意花鸟画的勃兴是个很值得注意的现象。如果说文征明的兰竹更多地延续了元人传统的话，那么沈周、唐寅则已初步开拓了花鸟画、特别是写意花鸟画领域，他们运用水墨技法描绘花鸟虫鱼，笔简意足。其题材比元人宽广了，画法比元人洗练了。在此基础上，明代中叶的陈淳和其后的徐渭把写意花鸟画的发展推向了新的阶段，在画史上并称“白阳青藤”，他们的绘画对明清写意花鸟画产生了极大的影响。此外，周之冕的“勾花点叶体”花鸟画也颇有建树。","教学分析":"徐渭（\"**青藤**\"）以泼墨大写意将**具象花鸟推向近乎抽象的视觉边界**，笔墨的\"飞白\"与\"泼洒\"使对象的形态仅作骨架而非目的。他与陈淳并称\"**白阳青藤**\"，代表了明代文人画对**具象束缚的最彻底解放**。教师可对比徐渭与宋代院体工笔花鸟，追问：当形象越来越不重要时，绘画依靠什么维持其意义？——答案指向**笔墨自身作为表意媒介的独立性**。","批注":"","标签":["1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国内","年代":"明代中晚期（16—17世纪）","排序年":1650,"作品/事件名称":"版画的下沉：从书籍精英文化到大众传播","作者/设计师":"（明代刻工）","来源书目":"《中国美术简史》","简介":"明代版画随书籍刻印的繁荣而大规模发展，从宫廷礼仪图册扩展至通俗小说插图，实现了从精英专属的书籍文化向大众娱乐消费的下沉。这是视觉媒介大众化*…","原文引用":"——《中国美术简史》/ 第四编·第三章\n第二节 明代版画　第三节 清代版画　第四节 明清年画　第四章 建筑与雕塑艺术　第一节 都城与皇家建筑　第二节 民居与私家园林　第三节 汉藏回宗教建筑　第四节 宗教造像与建筑雕刻　第五节 工艺雕刻与小品雕塑　第五章 工艺美术　第一节 陶瓷工艺　第二节 织绣印染　第三节 漆器、玉器与金属工艺　第四节 家具与其他　第二章 书法篆刻艺术　第一节 明代初中期书法　第二节 晚明书法与明代篆刻　第三节 清代初期的书法　第四节 清代中后期的书法　第五节 清代的篆刻　第六节 明清书法篆刻论著　第六编 近现代美术　概况　第一章 中国画艺术　第一节 太平天国美术　第二节 上海画派　第三节 中国画的革新思潮　第四节 岭南画派　第五节 北京画家群、社团及其他　第六节 江浙画家群、社团及其他　第七节 农村写生与对传统的发掘　第二章 书法艺术　第一节 近现代书法流变简说","教学分析":"明代版画随书籍刻印的繁荣而大规模发展，从宫廷礼仪图册扩展至通俗小说插图，实现了从**精英专属的书籍文化**向**大众娱乐消费**的下沉。这是**视觉媒介大众化**的重要历史节点：技术（雕版印刷）的成熟降低了图像的复制成本，推动了图像的**民主化传播**。教师可对比明代版画与当代网络图像的大众化逻辑，发现**技术驱动的传播革命**的历史规律。","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国内","年代":"明代（15—17世纪）","排序年":1650,"作品/事件名称":"明代硬木家具","作者/设计师":"","来源书目":"《中国工艺美术史新编》","简介":"硬木家具为代表的优质家具。本书与其他艺术史一样，使用狭义。明式家具材料精良，品类繁多，做工考究，装饰古雅，造型洗练，尺度合宜，风格典雅，是古典家具的光辉代表。重要产地有北京、扬　272中国工艺美术史新编州、徽州、广州等，而最重要的是苏州…","原文引用":"硬木家具为代表的优质家具。本书与其他艺术史一样，使用狭义。明式家具材料精良，品类繁多，做工考究，装饰古雅，造型洗练，尺度合宜，风格典雅，是古典家具的光辉代表。重要产地有北京、扬　272中国工艺美术史新编州、徽州、广州等，而最重要的是苏州。","教学分析":"","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国内","年代":"清初（17世纪末—18世纪初）","排序年":1650,"作品/事件名称":"石涛——\"搜尽奇峰打草稿\"","作者/设计师":"石涛","来源书目":"《中国美术简史》","简介":"清（1687）　石涛　102.6×42.5cm　纸本水墨　上海博物馆　彩-29　　绿荫清话图　明　文征明　131.8×32cm　纸本水墨　北京故宫博物院　彩-30　　溪山红树图　清（1660）　王翚　112.4×39.5cm　纸本设色　台北故宫博物院　彩-31　　苍翠凌天图　清（1660）　髡残　85×40.1cm　纸…","原文引用":"清（1687）　石涛　102.6×42.5cm　纸本水墨　上海博物馆　彩-29　　绿荫清话图　明　文征明　131.8×32cm　纸本水墨　北京故宫博物院　彩-30　　溪山红树图　清（1660）　王翚　112.4×39.5cm　纸本设色　台北故宫博物院　彩-31　　苍翠凌天图　清（1660）　髡残　85×40.1cm　纸本设色　南京博物院　彩-32　　天山积雪图　清　华嵒　159.1×52.8cm　纸本设色　北京故宫博物院　彩-33　　酸寒尉像　1888　任伯年　164.2×77.6cm　纸本","教学分析":"","批注":"","标签":["1.3 联系与发展","2.2 继承与创新"],"image":"","link":"","importance":0},{"类别":"国内","年代":"元代—清代（约14—18世纪）","排序年":1750,"作品/事件名称":"青花发色与钴料化学成分的对应关系","作者/设计师":"（历代景德镇工匠）","来源书目":"《中国工艺美术史新编》","简介":" “一、气韵生动；二、骨法用笔；三、应物象形；四、随类赋彩；五、经营位置；六、传移模写。”“气韵生动”是把生动地反映人物精神状态和性格作为艺术表现的最高准则。“骨法用笔”是指通过对人物外表的描绘而反映人物特征的笔法要求。“应物象形”、“随类赋彩”、“经营位置”是指绘画艺术的造型基础：形、色及构图。而“传移模写”则是指绘画的临摹和复制。“六法”的提出是古代长期绘画实践和理论探讨的具有总结意义的完整认识，在绘画发展史上有重要意义。","教学分析":"谢赫在《画品》中将\"**明劝诫，著升沉**\"列为绘画第一功能，确立了中国古代美术的**政教本位**逻辑：绘画不是自律的审美活动，而是**道德教化的视觉载体**。这一观念与西方\"为艺术而艺术\"形成鲜明对照，教学中可引导学生讨论：艺术应服务于社会伦理还是独立于功利目的之外——即本体（艺术自身）与客体（社会功能）之间的根本张力。","批注":"","标签":["1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国内","年代":"跨朝代（中国传统工艺美术通论）","排序年":5000,"作品/事件名称":"工艺美术\"适用\"原则与器物本体论","作者/设计师":"（集体）","来源书目":"《中国工艺美术史新编》","简介":"工艺美术以\"适用\"为核心本体特征，造型与装饰均从属于功能需要。这与纯艺术以自我表达为本体形成根本差异。教师可引导学生思考：日用器物是否具有艺术自主性…","原文引用":"——《中国工艺美术史新编》/ 前言·二、适用的原则\n除少数纯玩赏之作外，工艺美术最关心适用，造型和装饰往往体现着功能的需要。古代中国长期以农耕民族为主体，与其定居生活相适应，器物造型大多安定稳重，便于陈放。而在游牧民族入主的时代，便携器物为数众多，这体现的是统治民族马背上的生活，他们生活形态的演进又令器形不断变化，辽代的皮囊壶就是明证［图0・3、图0・4】。","教学分析":"工艺美术以\"**适用**\"为核心本体特征，造型与装饰均从属于功能需要。这与纯艺术以自我表达为本体形成根本差异。教师可引导学生思考：**日用器物是否具有艺术自主性**？当\"用\"与\"美\"发生矛盾时谁优先？书中用\"带着镣铐的舞蹈\"比喻工艺美术创作，揭示出**功能对形式的规定性**——工艺的本体是物质功能与审美意志的**双重约束下的产物**。","批注":"","标签":["1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国内","年代":"1919年（五四时期）","排序年":5000,"作品/事件名称":"蔡元培\"以美育代宗教\"","作者/设计师":"蔡元培","来源书目":"《中国美术简史》","简介":"\"以美育代宗教\"是蔡元培对艺术本体地位的根本性重估：将美术从附属于宗教、道德的工具位置提升为独立的精神救赎途径。这是中国现代美术史上本体意识…","原文引用":"——《中国美术简史》/ 第六编·概况\n从太平天国到辛亥革命，这些伟大的斗争，都促进了美术的发展。太平天国的壁画创作是清末最集中、最活跃的美术创作活动。在“五四”以前的中国资产阶级民主革命过程中，以中学为体、西学为用的改良派思想和旧民主主义的文化思想都曾对美术事业产生过较大的影响，主要表现为：以西方模式兴办新的美术学校并选派留学生出国学习，推动了西方美术在中国流行；一些思想家、理论家发表的改革中国美术的文章，冲击着几千年来的旧的观念，呼唤着中国美术的复兴。蔡元培提倡的“以美育代宗教”是突出的代表。美育成为当时新美术运动的中心议题，意图通过提倡美育确定美术的社会价值和美术家的社会地位，但在半封建半殖民地社会背景条件下，实施美育困难重重。","教学分析":"\"**以美育代宗教**\"是蔡元培对艺术本体地位的根本性重估：将美术从附属于宗教、道德的工具位置**提升为独立的精神救赎途径**。这是中国现代美术史上**本体意识的觉醒**——艺术不再只是\"成教化助人伦\"的客体工具，而是**具有独立本体价值的人文力量**。教师可对比儒家礼教传统与五四现代主义的艺术本体观，揭示近代美术转型的思想根源。","批注":"","标签":["1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国内","年代":"跨朝代（中国工艺美术通论）","排序年":5000,"作品/事件名称":"日用与欣赏的二元共存","作者/设计师":"（集体）","来源书目":"《中国工艺美术史新编》","简介":"书中指出工艺美术\"主体是日用品，其次才是欣赏品\"，而两者从来没有\"断然的界线\"。这种二元流动性是工艺美术区别于纯艺术的关键特质——一把紫砂壶既是…","原文引用":"——《中国工艺美术史新编》/ 前言·一、名词、起源与主体\n工艺美术就是制作采用手工业方式的造型艺术。这个语词是20世纪初从日本舶来的，语词虽晚，但它涵盖的若干门类却是最早的艺术创造。在中国，即令不把更早的饰品包罗在内，也能上溯到8000年前。由此开始的4000年是中国的新石器时代，那时的玉石器和陶器已展现了先民卓越的艺术才华。可以确信，在中国的原始社会，工艺美术比美术更成熟、更辉煌，当年的绘画【图。• 1】和雕塑【图。・2】也往往附丽于工艺美术品。","教学分析":"书中指出工艺美术\"**主体是日用品，其次才是欣赏品**\"，而两者从来没有\"断然的界线\"。这种**二元流动性**是工艺美术区别于纯艺术的关键特质——一把紫砂壶既是茶具又是艺术品，同一件器物根据语境在两个属性间滑动。教学中可引导学生讨论：**功能性是否削弱艺术性**？这一中国传统的器用哲学与现代设计理论中的\"**形式追随功能**\"有何异同？","批注":"","标签":["1.2 二元与多元"],"image":"","link":"","importance":0},{"类别":"国内","年代":"跨朝代（中国陶瓷史通论）","排序年":5000,"作品/事件名称":"材料对器型的制约：陶瓷造型的圆形法则","作者/设计师":"（历代陶瓷工匠）","来源书目":"《中国工艺美术史新编》","简介":"陶瓷造型\"基本是圆的变化\"，根本原因在于泥料可塑性与焙烧收缩的物理限制——材料的物质属性直接规定了形式的边界。这是\"物质决定非物质（审美意志…","原文引用":"——《中国工艺美术史新编》/ 前言·三、材料与技术的制约\n作品都是以材料制成的，材料的不同必定带来作品的差异。中国古代的容器以陶瓷、金属、漆木为主要材料，后两类可方可圆，能大能小，而陶瓷造型却基本是圆的变化，尺度也适中，这就是材料造成的。陶瓷制坯时，过大过小已然不易。焙烧中，坯体还要收缩变化，坯体越高大，变形越显著。人的视觉难以感受不很周正的曲线，却对稍有变化的直线极其敏感，扭曲的造型不美观，也不适用。因此，古代陶瓷造型几乎都同尺度适中的圆有关，过大过小和方直【图。・7】的造型仅属不惜成本的高档制作。","教学分析":"陶瓷造型\"**基本是圆的变化**\"，根本原因在于**泥料可塑性与焙烧收缩**的物理限制——材料的物质属性直接规定了形式的边界。这是\"**物质决定非物质（审美意志）**\"最直接的案例：在陶瓷领域，审美理想必须在材料的制约内寻找可能。教学中可进一步追问：当技术突破材料限制后（如3D打印陶瓷），审美语言如何随之演化？**物质边界的松动是否一定带来艺术自由的扩展**？","批注":"","标签":["1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国内","年代":"1919年（五四时期）","排序年":5000,"作品/事件名称":"五四后美术教育体系与传统笔墨的张力","作者/设计师":"（蔡元培、徐悲鸿等）","来源书目":"《中国美术简史》","简介":"\"废科举兴学堂、黜文言倡白话\"的激进现代化浪潮中，书法赖以存身的\"文化语境、物质前提被支解破碎\"。这段描述揭示了一个关键规律：传统艺术的生命…","原文引用":"——《中国美术简史》/ 第六编·第二章\n近代以来，随着西方的全面入侵以及辛亥革命、五四运动的相继爆发，构成中国传统文化核心的儒学思想在急切图强的革命声讨中逐步失落，废科举兴学堂、黜文言倡白话、弃毛笔用钢笔以及汉字拼音拉丁化的激进呼喊，使构成古典文化氛围的形式载体被近代化的革命步伐毫不留情地排挤乃至打倒，书法赖以存身的文化语境、物质前提被支解破碎，古典环境的破坏，使原先实用与审美呈互动共生关系的书法因实用性的丧失而刺激了对艺术性的高扬，对形式因素的提炼远胜于对书写内容的考虑，写什么（实用）和怎么写（审美）在总体上渐趋分离。","教学分析":"\"**废科举兴学堂、黜文言倡白话**\"的激进现代化浪潮中，书法赖以存身的\"**文化语境、物质前提被支解破碎**\"。这段描述揭示了一个关键规律：**传统艺术的生命力依赖于特定的物质-文化语境**；当语境消失（毛笔被钢笔替代、文言文被废除），传统形式便面临根本性危机。这是研究\"**传统如何在当代存活**\"的绝佳案例。","批注":"","标签":["2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国内","年代":"1930年代","排序年":5000,"作品/事件名称":"鲁迅倡
