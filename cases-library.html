教堂的精神功能，十字架、牧羊人、羔羊等图像系统将非物质的信仰…","原文引用":"——《外国美术简史》/ 第二章 欧洲中世纪美术·第一节 早期基督教美术\n端加上祭坛，并饰以宗教题材绘画，这种形式 为以后的西方基督教堂的样式定了基调。320年 前后开始兴建的圣彼得教堂是规模最大的“巴瓶画，四周的图案暗示出基督教最重要的象征 十字架。此外，壁画中的圣经主题经常表现出用红线勾出的圆形中，画着象征基督的牧羊人 和象征被拯救灵魂的羔羊，这是早期基督教艺 术最常见的题材，在造型手法上还继承着古典（图2-1）、《约拿与巨鱼》等。","教学分析":"早期基督教教堂以**建筑空间与宗教壁画**共同建构一套视觉神学体系：祭坛画以宗教题材定义教堂的**精神功能**，十字架、牧羊人、羔羊等图像系统将**非物质的信仰**转化为可视的**物质符号**。这是**物质媒介承载非物质意义**的经典模式。教师可引导学生思考：这些图像对于文盲占多数的中世纪信众意味着什么？与当代视觉传播有何相似之处？**图像的宗教性**与**审美性**是否可以分离？","批注":"","标签":["1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国外","年代":"7世纪至15世纪","排序年":650,"作品/事件名称":"伊斯兰工艺美术的宗教禁忌与世俗情调","作者/设计师":"伊斯兰工匠（集体）","来源书目":"《外国工艺美术史》","简介":"伊斯兰工艺美术展示了典型的二元共存结构：宗教律法禁止偶像崇拜，将具象写实的艺术形象排除在外；但强烈的世俗审美需求又催生了丰富的抽象几何纹样*…","原文引用":"——《外国工艺美术史》/ 第九章 伊斯兰工艺美术·概述\n教禁止偶像崇拜，因此，具象而写实的艺术形象难以得到发展，工艺美术创作的主要精力倾注在抽象性装饰纹样中。三、伊斯兰工艺美术表现了浓重的世俗性。从其艺术的基调上来看，更多地表现了能给人们带来欢愉、喜悦和轻松的情调，很少有压抑、神秘的宗教气息。","教学分析":"伊斯兰工艺美术展示了典型的**二元共存**结构：宗教律法**禁止偶像崇拜**，将具象写实的艺术形象排除在外；但强烈的世俗审美需求又催生了丰富的**抽象几何纹样**，形成高度发达的装饰艺术传统。书中进一步指出，伊斯兰工艺并非满溢宗教肃穆，反而充满**世俗的欢愉情调**，与宗教禁忌并行不悖。这种**禁忌与创造力的张力**反而推动了伊斯兰装饰艺术达到极高成就。引导学生思考：**外部限制**是否有时能激发而非压制艺术创造？","批注":"","标签":["1.2 二元与多元"],"image":"","link":"","importance":0},{"类别":"国外","年代":"7世纪至15世纪","排序年":650,"作品/事件名称":"伊斯兰几何装饰纹样（阿拉伯式花纹）","作者/设计师":"伊斯兰工匠（集体）","来源书目":"《外国工艺美术史》","简介":"伊斯兰禁止偶像崇拜，迫使工艺创作完全放弃具象路径，将全部精力投入抽象性装饰纹样。这并非艺术能力的缺失，而是形成了独特的抽象装饰体系——「阿拉伯式…","原文引用":"——《外国工艺美术史》/ 第九章 伊斯兰工艺美术·概述\n精力倾注在抽象性装饰纹样中。三、伊斯兰工艺美术表现了浓重的世俗性。从其艺术的基调上来看，更多地表现了能给人们带来欢愉、喜悦和轻松的情调，很少有压抑、神秘的宗教气息。四、伊斯兰工艺美术中的装饰纹样，丰富并发展了人类的装饰艺术，它把以植物纹样为主的装饰艺术的水平提高到了一个崭新的阶段，从而形成了独特的阿拉伯纹样。","教学分析":"伊斯兰禁止偶像崇拜，迫使工艺创作完全放弃**具象**路径，将全部精力投入**抽象性装饰纹样**。这并非艺术能力的缺失，而是形成了独特的抽象装饰体系——「阿拉伯式花纹」（Arabesque）将植物、几何和文字编织为纯粹抽象的视觉系统。与中国、希腊等文明中**具象与抽象并存**的传统相比，伊斯兰艺术是**单一路径极致化**的案例。引导学生比较：不同文明中，**具象与抽象**的取舍背后各有怎样的文化、宗教驱动力？","批注":"","标签":["1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国外","年代":"萨珊王朝至唐代（3—8世纪）","排序年":750,"作品/事件名称":"联珠天马纹锦：波斯纹样与唐代织锦的交汇","作者/设计师":"波斯、中国工匠（集体）","来源书目":"《外国工艺美术史》","简介":"波斯萨珊王朝的联珠纹沿丝绸之路传入中国，在北魏、隋、唐的器物与织锦中广泛出现。书中对「巧合还是传播」的判断本身值得课堂讨论——这种不确定性正体现了艺…","原文引用":"——《外国工艺美术史》/ 第七章 古代波斯工艺美术·第四节 染织工艺\n在以后的北魏石砚上和鎏金铜杯上，也都有联珠纹。之后的隋代织锦上的联珠纹和敦煌石窟藻井上的联珠纹，已经较为普遍。所以，中国唐代联珠纹的发展，只能说和当时波斯的风格是一种巧合。在联珠天马纹锦（图7-30）中，我们可以很清楚地看到波斯织锦与唐代织锦装饰在形式上的异曲同工之妙，同时也体现了各民族文化之间的交流与融通。","教学分析":"波斯萨珊王朝的**联珠纹**沿丝绸之路传入中国，在北魏、隋、唐的器物与织锦中广泛出现。书中对「巧合还是传播」的判断本身值得课堂讨论——这种不确定性正体现了**艺术史研究**的复杂性。联珠天马纹锦体现了两种文明**各有本体**，却在接触中发生了形式上的**惊人相似**，催生出无法归属于单一文化的新形式。可引导学生思考：**文明联系**与**平行发展**这两种史学解释框架，各有怎样的局限？","批注":"","标签":["1.3 联系与发展"],"image":"","link":"","importance":0},{"类别":"国外","年代":"日本（8世纪至今）","排序年":750,"作品/事件名称":"日本漆器——莳绘工艺","作者/设计师":"","来源书目":"《外国工艺美术史》","简介":"日本漆器莳绘（金粉在漆面上的技法）在唐代中国漆器基础上发展出独特的日本美学，是传统技法在本土化过程中的精细演变。","原文引用":"","教学分析":"","批注":"","标签":["2.1 传统与当代","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国外","年代":"14世纪初（约1305年，帕多瓦）","排序年":1350,"作品/事件名称":"乔托——从中世纪到文艺复兴的转折点","作者/设计师":"乔托","来源书目":"《外国美术简史》","简介":"乔托1305　1562-1564彩插-8 死神的胜利 老彼得•勃曾盖尔彩插• 9 自画像丢勒1498　彩插・1。 圣莫里斯的殉教格列柯1581~1584　彩插-11 圣德列萨祭坛贝尼尼1645~16473、　彩插-12 圣乔治射击手连军官的宴会哈尔斯1616彩插-13 夜巡 伦勃朗1642　彩插-14 宫娥 委拉斯贵支…","原文引用":"乔托1305　1562-1564彩插-8 死神的胜利 老彼得•勃曾盖尔彩插• 9 自画像丢勒1498　彩插・1。 圣莫里斯的殉教格列柯1581~1584　彩插-11 圣德列萨祭坛贝尼尼1645~16473、　彩插-12 圣乔治射击手连军官的宴会哈尔斯1616彩插-13 夜巡 伦勃朗1642　彩插-14 宫娥 委拉斯贵支1656　彩插-15 舟发西苔岛华托1717彩插・16 荷加斯兄弟的宣誓大卫1784~1785　彩插-17 萨达纳巴尔之死德拉克洛瓦1826彩插-18 画室库尔贝1855　彩插・19 草地上的午餐马奈1863彩插-20 阿尔让特伊的游船莫奈1875　彩插-21 大碗岛星期天的下午修拉1884-1886彩插-22 星夜凡高1889　彩插・2","教学分析":"","批注":"","标签":["1.3 联系与发展","4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国外","年代":"15世纪","排序年":1450,"作品/事件名称":"佛罗伦萨文艺复兴——解剖学与透视法促成科学与艺术的结合","作者/设计师":"马萨乔、多纳泰罗、乔托等佛罗伦萨艺术家","来源书目":"《外国美术简史》","简介":"为正确表现人体，文艺复兴艺术家主动拥抱解剖学；为解决空间再现，他们引入透视法。佛罗伦萨于是成为【科学和艺术结合】的发源地，艺术家开始抛弃…","原文引用":"——《外国美术简史》/ 第三章 欧洲文艺复兴时期美术·第一节 意大利文艺复兴美术\n任的艺术家为了正确表现人体，对解剖学产生了 兴趣，同时正确的空间表现则需要有严格的透 视画法，于是在佛罗伦萨首先出现了科学和艺术 的结合。杰出的佛罗伦萨艺术家们开始抛弃中世 纪艺术传统，进行大胆的艺术改革，使新的现实 主义得以进一步成长。这时的佛罗伦萨已经成 为一个积极入世的宇宙观的策源地，在这里产还显得比较幼稚、生硬，但却在欧洲美术史上具 有极其重要的意义，其代表作还有《哀悼基督》(彩插一6)等。他在创作实践中所提出的问题正 是以后几代艺术家所面临的问题，如戏剧性情 节的构图，人物的表情神态，人与环境背景的关 系，画面的空间层次,物体的体积感、质感和明暗 关系等，这些都是现实主义艺术在技法和理论上 的重要课题，乔托所创立的现实主义原则超越了 一-般技法的范畴，而作为一种全新的艺术观念 对文艺复兴艺术的发展产生了巨大的影响。","教学分析":"为正确表现人体，文艺复兴艺术家主动拥抱**解剖学**；为解决空间再现，他们引入**透视法**。佛罗伦萨于是成为【**科学和艺术结合**】的发源地，艺术家开始抛弃中世纪平面化的象征传统，以科学知识驱动视觉革命。这是人类历史上**艺术与科学协同创新**最具标志性的案例之一。教师可引导：当时的【科学服务于艺术】与今天【技术服务于设计】（如AI、3D打印）有何结构性相似？","批注":"","标签":["4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国外","年代":"15世纪","排序年":1450,"作品/事件名称":"尼德兰发明油画——新媒介引发跨国艺术传播","作者/设计师":"尼德兰画家（凡·艾克兄弟等）","来源书目":"《外国美术简史》","简介":"尼德兰画家发明油画技法，使颜料层次更丰富、光感更精妙，这一媒介革新迅速传入意大利，进而影响德国、西班牙，彻底改变了欧洲绘画的视觉可能性。新媒介不…","原文引用":"——《外国美术简史》/ 第三章 欧洲文艺复兴时期美术·概况\n艺术传统中发展而来的。尼德兰的艺术家首先发明了油画技法，后传 入意大利。因为政治、经济上的联系，尼德兰的艺术还对德国和西班 牙产生了影响。在15世纪和16世纪，由于与意大利在政治、经济和文化 上的密切联系，更主要的是由于城市工商业的发展，以及宗教改革运 动和农民战争，德国的文艺复兴取得了辉煌成果。在16世纪，西班牙 因哥伦布发现美洲大陆和在欧洲的领土扩张而突然变得强盛，尼德兰 和意大利的南部都成为西班牙的属地。西班牙的文艺复兴也因此获得 了推动力量。法国文艺复兴时期的美术主要是受意大利和尼德兰的影 响，法国长期占有意大利北部的米兰等地区，有许多意大利艺术家到法 国工作，促进了法国文艺复兴的发展。","教学分析":"尼德兰画家发明**油画技法**，使颜料层次更丰富、光感更精妙，这一**媒介革新**迅速传入意大利，进而影响德国、西班牙，彻底改变了欧洲绘画的视觉可能性。新媒介不只是工具，它携带着新的**表现逻辑**：油彩的透明叠色使肌肤质感、光影深度成为可能，从而推动了**写实主义内容**的深化。麦克卢汉的【**媒介即信息**】在此得到了历史印证。教师可问：哪一种新媒介（如数字绘图工具）正在类似地改变当代图像的可能性？","批注":"","标签":["4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国外","年代":"15世纪","排序年":1450,"作品/事件名称":"佛罗伦萨文艺复兴——解剖学与透视法促成科学与艺术的结合","作者/设计师":"马萨乔、多纳泰罗、乔托等佛罗伦萨艺术家","来源书目":"《外国美术简史》","简介":"文艺复兴佛罗伦萨艺术家将古代解剖学知识与透视几何学引入绘画，是一次典型的联系与发展：他们联系了古典科学传统（希腊医学与数学），并在此基础上发…","原文引用":"——《外国美术简史》/ 第三章 欧洲文艺复兴时期美术·第一节 意大利文艺复兴美术\n任的艺术家为了正确表现人体，对解剖学产生了 兴趣，同时正确的空间表现则需要有严格的透 视画法，于是在佛罗伦萨首先出现了科学和艺术 的结合。杰出的佛罗伦萨艺术家们开始抛弃中世 纪艺术传统，进行大胆的艺术改革，使新的现实 主义得以进一步成长。这时的佛罗伦萨已经成 为一个积极入世的宇宙观的策源地，在这里产还显得比较幼稚、生硬，但却在欧洲美术史上具 有极其重要的意义，其代表作还有《哀悼基督》(彩插一6)等。他在创作实践中所提出的问题正 是以后几代艺术家所面临的问题，如戏剧性情 节的构图，人物的表情神态，人与环境背景的关 系，画面的空间层次,物体的体积感、质感和明暗 关系等，这些都是现实主义艺术在技法和理论上 的重要课题，乔托所创立的现实主义原则超越了 一-般技法的范畴，而作为一种全新的艺术观念 对文艺复兴艺术的发展产生了巨大的影响。","教学分析":"文艺复兴佛罗伦萨艺术家将**古代解剖学知识与透视几何学**引入绘画，是一次典型的**联系与发展**：他们联系了古典科学传统（希腊医学与数学），并在此基础上**发展出全新的现实主义视觉语言**。这说明艺术史中的\"创新\"往往不是凭空涌现，而是在重新激活沉睡的知识传统后向前跃进。教师可让学生追溯：透视法的发明如何**联系**了光学科学→建筑理论→绘画实践，形成一个跨学科的**发展链条**？","批注":"","标签":["1.3 联系与发展"],"image":"","link":"","importance":0},{"类别":"国外","年代":"拜占庭帝国（4—15世纪）","排序年":1450,"作品/事件名称":"拜占庭珐琅与金银器","作者/设计师":"","来源书目":"《外国工艺美术史》","简介":"播到了拜占庭。拜占庭的丝绸中一些最精美的，是由一些原先从叙利亚和伊朗征募来的织工生产出来供宫廷作坊作进一步加工用的。这种宫廷作坊中有许多不同的手艺人—染匠、各种织工，甚至还有制作成衣的裁缝。华丽的丝绸服装常被作为官方的礼物以及区别政府官员等级的重要标志（图9-17）。对于政府官员，朝廷有定期的御赐。拜占庭的皇帝还经常用…","原文引用":"播到了拜占庭。拜占庭的丝绸中一些最精美的，是由一些原先从叙利亚和伊朗征募来的织工生产出来供宫廷作坊作进一步加工用的。这种宫廷作坊中有许多不同的手艺人—染匠、各种织工，甚至还有制作成衣的裁缝。华丽的丝绸服装常被作为官方的礼物以及区别政府官员等级的重要标志（图9-17）。对于政府官员，朝廷有定期的御赐。拜占庭的皇帝还经常用宫廷作坊的产品作为外交上的辅佐物，用它作为礼物馈赠来访的使节和其他显赫的客人。而另一部分产品则用来出售。在君士坦丁堡曾有一个永久性的展览建筑，被称为“不夜宫”（The House of Lamps）,因为每到晚上便灯火通明。但是在那里外国人只准许购买那些质量较差的、窄幅的、没有大型图案的织物，而那种有大型图案（即在一件服装上最多只有2、3个单位的重复）的织物被认为是最精美的。","教学分析":"","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国外","年代":"中世纪（12—15世纪）","排序年":1450,"作品/事件名称":"哥特式彩色玻璃","作者/设计师":"","来源书目":"《外国工艺美术史》","简介":"外，还出现了彩色玻璃、彩纹陶等新的工艺美术制品。古埃及的“后期王国时期”（公元前1085—前525年）包括第21王朝至26王朝的统治。期间前5个王朝是由僧侣贵族利比亚人（Libyans）和努比亚人建立的，始终未能统一。其中，亚述人（Assyrians）曾入侵统治埃及达20年之久。后来，三角洲塞伊斯城的统治者领导埃及驱逐…","原文引用":"外，还出现了彩色玻璃、彩纹陶等新的工艺美术制品。古埃及的“后期王国时期”（公元前1085—前525年）包括第21王朝至26王朝的统治。期间前5个王朝是由僧侣贵族利比亚人（Libyans）和努比亚人建立的，始终未能统一。其中，亚述人（Assyrians）曾入侵统治埃及达20年之久。后来，三角洲塞伊斯城的统治者领导埃及驱逐了亚述人，建立了第26王朝，重新统一了埃及。此期，埃及的社会经济在继续发展，其文化亦保持着自己民族过去的成就，他们已掌握了冶铁技术，广泛使用铁器。在第26王朝法老尼科二世（公元前609—前594年）统治时期，埃及人挖通了尼罗河与红海之间的运河，促进了农业与商业的大力发展。","教学分析":"","批注":"","标签":["4.3 媒介、材料与内容","3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国外","年代":"拜占庭（4—15世纪）","排序年":1450,"作品/事件名称":"拜占庭镶嵌画——圣索菲亚大教堂","作者/设计师":"","来源书目":"《外国美术简史》","简介":"镶嵌画圣维他尔教堂拜占庭548彩插-4 密祭庞贝城古罗马约公元前60　彩插・7 创世纪米开朗基罗1508~1512彩插・6 哀悼基督乔托1305　1562-1564彩插-8 死神的胜利 老彼得•勃曾盖尔彩插• 9 自画像丢勒1498　彩插・1。 圣莫里斯的殉教格列柯1581~1584　彩插-11 圣德列萨祭坛贝尼尼16…","原文引用":"镶嵌画圣维他尔教堂拜占庭548彩插-4 密祭庞贝城古罗马约公元前60　彩插・7 创世纪米开朗基罗1508~1512彩插・6 哀悼基督乔托1305　1562-1564彩插-8 死神的胜利 老彼得•勃曾盖尔彩插• 9 自画像丢勒1498　彩插・1。 圣莫里斯的殉教格列柯1581~1584　彩插-11 圣德列萨祭坛贝尼尼1645~16473、　彩插-12 圣乔治射击手连军官的宴会哈尔斯1616彩插-13 夜巡 伦勃朗1642　彩插-14 宫娥 委拉斯贵支1656　彩插-15 舟发西苔岛华托1717彩插・16 荷加斯兄弟的宣誓大卫1784~1785　彩插-17 萨达纳巴尔之死德拉克洛瓦1826彩插-18 画室库尔贝1855　彩插・19 草地上的午餐马奈1863彩插-20 阿","教学分析":"","批注":"","标签":["3.2 服务于谁","1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国外","年代":"15—16世纪，威尼斯","排序年":1550,"作品/事件名称":"文艺复兴时期威尼斯穆拉诺岛玻璃工艺","作者/设计师":"穆拉诺岛玻璃工匠（集体）","来源书目":"《外国工艺美术史》","简介":"威尼斯玻璃工艺是媒介与内容高度统一的典范：涂金、上釉、嵌线、嵌网、冰纹……每一种技法都是材料特性与工艺可能性深度对话的产物。「嵌线玻璃」…","原文引用":"——《外国工艺美术史》/ 第十七章 文艺复兴时期工艺美术·第三节 玻璃工艺\n装饰的奢华是与材料相适应的制作工艺紧密联系在一起的。威尼斯玻璃制品常常以涂金、上釉等方法装饰。透明的玻璃中可以嵌入不透明的白色线条以形成一种“嵌线玻璃”（Vetr。a fill）或者另一种更为精致的“嵌网玻璃”（Vetr。a reticeUo ）①（图17-12）另外，尚有一种起皱的“冰纹玻璃”和“罗马式玻璃”，具有新奇而独特的艺术效果。当时的一种在厚层玻璃中夹入金制叶片的玻璃器皿和带有奇异而精致的 高脚杯的“威尼斯式玻璃器皿\"（Facon de Venise ）十分引人注目。","教学分析":"威尼斯玻璃工艺是**媒介与内容高度统一**的典范：涂金、上釉、嵌线、嵌网、冰纹……每一种技法都是**材料特性**与**工艺可能性**深度对话的产物。「嵌线玻璃」「嵌网玻璃」的精妙，直接由玻璃的**透明性与可塑性**所决定——内容（装饰美感）完全从媒介（材料）中生长出来。引导学生思考：当我们说某种材料「有自己的语言」，究竟指的是什么？**媒介决定内容**的命题在当代数字设计（屏幕像素、AR界面）中是否依然成立？","批注":"","标签":["4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国外","年代":"文艺复兴（15—16世纪）","排序年":1550,"作品/事件名称":"文艺复兴意大利马约利卡陶瓷","作者/设计师":"","来源书目":"《外国工艺美术史》","简介":"意大利马约利卡彩釉陶瓷（Maiolica）受伊斯兰锡釉陶技术影响，结合文艺复兴绘画题材，是地中海工艺跨文化传播的典型案例。","原文引用":"","教学分析":"","批注":"","标签":["5.1 本土与异域","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国外","年代":"文艺复兴（15—16世纪，意大利）","排序年":1550,"作品/事件名称":"列奥纳多·达芬奇——科学与艺术的完美结合","作者/设计师":"列奥纳多·达芬奇","来源书目":"《外国美术简史》","简介":"达芬奇同时是画家、解剖学家、工程师和科学家，他的解剖研究直接改善了人体绘画的精准度，是艺术与科学不可分割的最有力证明。","原文引用":"","教学分析":"","批注":"","标签":["4.2 艺术与科学","1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国外","年代":"文艺复兴（16世纪，意大利）","排序年":1550,"作品/事件名称":"米开朗基罗——《大卫》与西斯廷天顶","作者/设计师":"米开朗基罗","来源书目":"《外国美术简史》","简介":"彩插・7 创世纪米开朗基罗1508~1512彩插・6 哀悼基督乔托1305　1562-1564彩插-8 死神的胜利 老彼得•勃曾盖尔彩插• 9 自画像丢勒1498　彩插・1。 圣莫里斯的殉教格列柯1581~1584　彩插-11 圣德列萨祭坛贝尼尼1645~16473、　彩插-12 圣乔治射击手连军官的宴会哈尔斯1616…","原文引用":"彩插・7 创世纪米开朗基罗1508~1512彩插・6 哀悼基督乔托1305　1562-1564彩插-8 死神的胜利 老彼得•勃曾盖尔彩插• 9 自画像丢勒1498　彩插・1。 圣莫里斯的殉教格列柯1581~1584　彩插-11 圣德列萨祭坛贝尼尼1645~16473、　彩插-12 圣乔治射击手连军官的宴会哈尔斯1616彩插-13 夜巡 伦勃朗1642　彩插-14 宫娥 委拉斯贵支1656　彩插-15 舟发西苔岛华托1717彩插・16 荷加斯兄弟的宣誓大卫1784~1785　彩插-17 萨达纳巴尔之死德拉克洛瓦1826彩插-18 画室库尔贝1855　彩插・19 草地上的午餐马奈1863彩插-20 阿尔让特伊的游船莫奈1875　彩插- 克艺术 最辉煌的成就。17、18世纪自始至终涌动着一股与上述各流派并存而影响广泛的 现实主义潮流，称为卡拉瓦乔主义。卡拉瓦乔的影响极其深远。这一 时期的现实主义画家还有西班牙的委拉斯贵支、里贝拉等人；荷兰的 伦勃朗、哈尔斯、维米尔等人；在法国则活跃着以路易•勒南…","原文引用":"术大师贝尼尼和佛兰德斯画家鲁本斯的作品反映了 17世纪巴洛克艺术 最辉煌的成就。17、18世纪自始至终涌动着一股与上述各流派并存而影响广泛的 现实主义潮流，称为卡拉瓦乔主义。卡拉瓦乔的影响极其深远。这一 时期的现实主义画家还有西班牙的委拉斯贵支、里贝拉等人；荷兰的 伦勃朗、哈尔斯、维米尔等人；在法国则活跃着以路易•勒南、拉图尔 为代表的一些画家。","教学分析":"","批注":"","标签":["3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国外","年代":"18世纪末—19世纪","排序年":1750,"作品/事件名称":"工业革命：工艺美术的大众化转型","作者/设计师":"集体现象（工业革命）","来源书目":"《外国工艺美术史》","简介":"工业革命之前，工艺美术制品是精英阶层的专属品——宫廷定制，数量有限，品质卓越。机械批量生产使产品数量空前增长，消费群体从贵族扩展至普通民众，工艺…","原文引用":"——《外国工艺美术史》/ 第二十一章 近代工艺美术·概述\n机械化生产属于批量化生产，工艺产品的数量获得了空前的增长，于是产品的销售对象已不再局限于以往的宫廷或贵族阶层，而与普通民众的日常生活产生了紧密联系。这也意味着工艺美术产品开始大规模地向广大民众进行普及。由于机械化生产的批量化特点，在生产上便要求作品的设计要求要规范化和定型化，这又导致了在作品的造型、装饰等艺术形式和风格上，与过去的手工操作形成了截然不同的特点。当然，原有的工艺美术的种类并非一步跨入了机械化生产的阶段，有的甚至因为制作工艺的特殊性和其他原因一直保持着手工制作的方式。","教学分析":"工业革命之前，工艺美术制品是**精英阶层**的专属品——宫廷定制，数量有限，品质卓越。机械批量生产使产品数量空前增长，消费群体从贵族扩展至**普通民众**，工艺美术完成了历史上最重要的阶层跨越。但这种**大众化**同时带来新矛盾：标准化压缩个人创造，品质与个性双双下降，从而引发了莫里斯运动的批判。引导学生讨论：**精英品质**与**大众普及**之间是否存在根本矛盾？当代设计如何在两者间寻求平衡？","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国外","年代":"18世纪，欧洲","排序年":1750,"作品/事件名称":"洛可可工艺中的「中国装饰」风尚（Chinoiserie）","作者/设计师":"欧洲洛可可工匠（集体）","来源书目":"《外国工艺美术史》","简介":"洛可可风格之所以常被称为「中国装饰」（Chinoiserie），是因为东方情调已渗透进欧洲宫廷工艺的各个门类——陶瓷、染织、木工、金属器无不如此。然而这…","原文引用":"——《外国工艺美术史》/ 第十九章 罗可可时期工艺美术·概述\n中洋溢着东方情调，特别是中国情调，陶瓷工艺、染织工艺、木工艺及金属工艺等无不如此。因此，在欧洲，罗可可风格有时又被称作“中国装饰”。罗可可艺术最重要的特点之一就是注重装饰性的表现，工艺美术无疑得天独厚。","教学分析":"洛可可风格之所以常被称为「**中国装饰**」（Chinoiserie），是因为东方情调已渗透进欧洲宫廷工艺的各个门类——陶瓷、染织、木工、金属器无不如此。然而这一「中国风」并非真实的中国，而是**欧洲人想象与投射的东方**——一个以中国为镜像、折射自身对异托邦向往的幻象。这揭示了**跨文化传播**中一个重要规律：**异域形象往往是本土欲望的产物**。引导学生思考：当代国际市场上的「中国风」设计，在多大程度上是真实的中国文化，又在多大程度上是他者的想象？","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国外","年代":"18世纪末—19世纪","排序年":1750,"作品/事件名称":"19世纪德国艺术赞助体制转型","作者/设计师":"（集体现象）","来源书目":"《外国美术简史》","简介":"19世纪德国艺术家从服务教会与贵族的依附状态，逐步转向自主选题创作。艺术协会、公立博物馆与展览会的兴起，标志着艺术赞助者从宗教权威和宫廷…","原文引用":"——《外国美术简史》/ 第六节 19世纪德国美术\n化，艺术家由主要服务于教会和贵族逐渐转为 自选题材进行创作。自18世纪末至1840年，28个 德国城市成立了艺术协会。通过协会的活动与 举办展览，为艺术品开拓了销路,也扩大了观众 的范围。这时期，随着社会的进步，经济文化的 发展，德国建立了一批新型艺术博物馆，各邦国 君主的艺术收藏也逐渐对公众开放，较为广泛 的观众有了接触艺术品的机会，由此提高了艺术 鉴赏力。总之，资产阶级的艺术协会、艺术博物 馆与展览会以及艺术评论都起到了传播与介绍 艺术的作用。大变革时代的种种冲击、一系列改 革与经济的发展以及科学技术的进步都使得德 国19世纪艺术家的思想十分活跃。各种风格流派 彼此共存、相互竞争，继而迅速更新。","教学分析":"19世纪德国艺术家从**服务教会与贵族**的依附状态，逐步转向**自主选题创作**。艺术协会、公立博物馆与展览会的兴起，标志着艺术**赞助者**从宗教权威和宫廷转向市民社会与资产阶级。这一转型是理解**艺术本体独立性**的重要历史节点：当艺术不再是神学或君权的附庸，它与社会的关系如何重新定义？教师可引导学生思考：**艺术家的自主性**是否真正实现，抑或不过换了一个主人——市场？","批注":"","标签":[],"image":"","link":"","importance":0},{"类别":"国外","年代":"日本江户时代（17—18世纪）","排序年":1750,"作品/事件名称":"日本伊万里瓷器——江户时代外销瓷","作者/设计师":"","来源书目":"《外国工艺美术史》","简介":"烧制的瓷器一一“有田烧”（图10-13）和“伊万里烧”（图10-14 ）o长次郎乐烧茶碗，陶，室町时代图1 0丄2铁釉莲瓣纹香炉，陶，镰仓时代这种绘瓷的技法不久在柿右卫门（1596-1666年）烧制成功赤绘后更进了一步…","原文引用":"烧制的瓷器一一“有田烧”（图10-13）和“伊万里烧”（图10-14 ）o长次郎乐烧茶碗，陶，室町时代图1 0丄2铁釉莲瓣纹香炉，陶，镰仓时代这种绘瓷的技法不久在柿右卫门（1596-1666年）烧制成功赤绘后更进了一步。","教学分析":"","批注":"","标签":["5.2 全球化与在地性","3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国外","年代":"浪漫主义（18世纪末—19世纪初，西班牙）","排序年":1750,"作品/事件名称":"戈雅——黑色绘画与社会批判","作者/设计师":"弗朗西斯科·戈雅","来源书目":"《外国美术简史》","简介":"西班牙艺术重放异彩的是戈雅。戈雅的出现有 着划时代的意义，不仅使西班牙的美术从18世纪 末又走上了一条富有创造性的艺术道路,也对欧 洲的艺术产生了重要的影响…","原文引用":"西班牙艺术重放异彩的是戈雅。戈雅的出现有 着划时代的意义，不仅使西班牙的美术从18世纪 末又走上了一条富有创造性的艺术道路,也对欧 洲的艺术产生了重要的影响。","教学分析":"","批注":"","标签":["1.1 本体与客体","3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国外","年代":"新古典主义（18世纪末—19世纪初，法国）","排序年":1750,"作品/事件名称":"大卫——新古典主义与法国大革命","作者/设计师":"雅克-路易·大卫","来源书目":"《外国美术简史》","简介":"彩插・16 荷加斯兄弟的宣誓大卫1784~1785　彩插-17 萨达纳巴尔之死德拉克洛瓦1826彩插-18 画室库尔贝1855　彩插・19 草地上的午餐马奈1863彩插-20 阿尔让特伊的游船莫奈1875　彩插-21 大碗岛星期天的下午修拉1884-1886彩插-22 星夜凡高1889　彩插・23 欧拉纳的玛利亚高更1…","原文引用":"彩插・16 荷加斯兄弟的宣誓大卫1784~1785　彩插-17 萨达纳巴尔之死德拉克洛瓦1826彩插-18 画室库尔贝1855　彩插・19 草地上的午餐马奈1863彩插-20 阿尔让特伊的游船莫奈1875　彩插-21 大碗岛星期天的下午修拉1884-1886彩插-22 星夜凡高1889　彩插・23 欧拉纳的玛利亚高更1891　彩插-24 伏尔加河上的纤夫列宾1873彩插・25 红色和谐马蒂斯1908　彩插-26 亚威农少女毕加索1907卷　彩插-27 呐喊蒙克1893 （上左）彩插-29 女人三阶段克利姆特1905彩插・28 准备简单早餐的天使克利192。（上右）*||　彩插-30 百老汇爵士乐 蒙德里安1942~1943■ ■ ■:：彩插・31 干杯双人像夏加尔1917-19","教学分析":"","批注":"","标签":["3.2 服务于谁","2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国外","年代":"17—18世纪","排序年":1750,"作品/事件名称":"工业革命前的手工艺传统","作者/设计师":"","来源书目":"《世界现代设计史》","简介":"第二章　工业革命前的设计　一、工业革命前欧洲的设计情况　二、新古典设计运动　三、工业革命之前的西方民间产品设计　四、“维多利亚”和“第二帝国”风格　第三章　现代设计的前奏：“工艺美术”与“新艺术”运动　一、现代设计萌发的时代背景和促进因素　二、英国的设计改革和“工艺美术”运动　三、“新艺术”运动　第四章　带装饰的现代设…","原文引用":"第二章　工业革命前的设计　一、工业革命前欧洲的设计情况　二、新古典设计运动　三、工业革命之前的西方民间产品设计　四、“维多利亚”和“第二帝国”风格　第三章　现代设计的前奏：“工艺美术”与“新艺术”运动　一、现代设计萌发的时代背景和促进因素　二、英国的设计改革和“工艺美术”运动　三、“新艺术”运动　第四章　带装饰的现代设计：“装饰艺术”运动　一、“装饰艺术”运动的概况　二、影响“装饰艺术”运动风格的重要因素　三、“装饰艺术”运动的设计特点　四、“装饰艺术”风格在平面设计上的发展　五、“装饰艺术”风格的产品设计和著名的","教学分析":"","批注":"","标签":["2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1847—1851年","排序年":1847,"作品/事件名称":"亨利·科尔与1851年万国博览会：工业与艺术的分离","作者/设计师":"亨利·科尔（Sir Henry Cole）","来源书目":"《外国工艺美术史》","简介":"亨利·科尔的判断是：工艺衰落根源在于工业与艺术分离，而非机械生产本身。他代表了一种与当代和解的立场——不拒绝机械，而是倡导艺术家重新参与工业设计…","原文引用":"——《外国工艺美术史》/ 第二十一章 近代工艺美术·艺术与工艺运动\n本原因是由于工业与艺术的分离状况所造成的，而机械生产是不容怀疑的，艺术家们应该积极参与工艺品的设计与制作，并建立起工艺美术的审美标准。但是，科尔等人的新思想在当时毕竟只能为少数人所接受。19世纪中期，在英国反传统的运动尽管　亨利•科尔威廉•莫里斯①19世纪中叶英国画家米莱斯(Millais, 1829—1896年)、亨特(Hunt, 1827—1910年)、洛瑟蒂(Rosstti, 1828—1882 年)等人组成的画派。该派对文艺复兴初期，即拉斐尔以前的作品兴趣浓厚,画风朴实而清新，具有一定的象征主义和唯美主义的内涵。","教学分析":"亨利·科尔的判断是：工艺衰落根源在于**工业与艺术分离**，而非机械生产本身。他代表了一种**与当代和解**的立场——不拒绝机械，而是倡导艺术家重新参与工业设计，建立审美标准。这与莫里斯**拒绝当代、回归传统**的姿态形成鲜明对比，两者的分歧是整个近代设计史争论的起点。引导学生思考：面对技术浪潮，**改良传统**与**拥抱当代**——哪种策略更有持续生命力？","批注":"","标签":["2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国外","年代":"19世纪工业革命后","排序年":1850,"作品/事件名称":"近代工艺美术从宫廷走向大众","作者/设计师":"集体现象","来源书目":"《外国工艺美术史》","简介":"工业革命前，工艺美术的本体功能长期依附于宫廷权力，服务对象极为狭窄。工业革命引发的机械化批量生产彻底改变了工艺美术的社会属性，使其首次真正面向普…","原文引用":"——《外国工艺美术史》/ 第二十一章·结语\n变。工艺美术结束了数千年来一直处在主要为宫廷服务的局面，开始真正面向广大民众。由于机械化、批量化生产的特征和商品化的流通形式，工艺美术制品空前普及，工艺美术也因此得以大力发展。二、由于新兴材质和新兴工艺技术的岀现，工艺美术在种类、造型、装饰、色彩以及实用功能等方面也发生了新的变化。同时对工艺美术产品的设计制作也提出了新的要求，个体作坊式的生产逐步转向了集体工厂化的流水作业和机械化生产。工艺美术制品的制作工艺和加工过程要求作品趋于造型和装饰上的简洁。","教学分析":"工业革命前，工艺美术的**本体功能**长期依附于宫廷权力，服务对象极为狭窄。工业革命引发的**机械化批量生产**彻底改变了工艺美术的社会属性，使其首次真正面向普通民众。这是工艺美术**客体（服务对象）**的根本转换——从贵族身份符号变为日常生活用品。可引导学生讨论：工艺美术的本体价值（美学、文化）与客体关系（谁在使用）之间存在怎样的张力？","批注":"","标签":["1.1 本体与客体"],"image":"","link":"","importance":0},{"类别":"国外","年代":"19世纪","排序年":1850,"作品/事件名称":"工业革命时代的新兴材质与工艺技术","作者/设计师":"集体现象","来源书目":"《外国工艺美术史》","简介":"工业革命带来了双重变革：科学技术（机械化、化学新工艺）改变了工艺美术的生产方式；新兴材质（钢管、新型玻璃、合成染料等）为艺术形式的革新提供了物质…","原文引用":"——《外国工艺美术史》/ 第二十一章 近代工艺美术·结语\n二、由于新兴材质和新兴工艺技术的岀现，工艺美术在种类、造型、装饰、色彩以及实用功能等方面也发生了新的变化。同时对工艺美术产品的设计制作也提出了新的要求，个体作坊式的生产逐步转向了集体工厂化的流水作业和机械化生产。工艺美术制品的制作工艺和加工过程要求作品趋于造型和装饰上的简洁。","教学分析":"工业革命带来了双重变革：**科学技术**（机械化、化学新工艺）改变了工艺美术的生产方式；**新兴材质**（钢管、新型玻璃、合成染料等）为艺术形式的革新提供了物质基础。艺术与科学在这一时期形成了前所未有的紧密联系：**技术进步不再只是工艺的辅助，而直接决定了艺术语言的可能性边界**。钢管家具、铸铁建筑装饰、化学彩釉陶瓷皆为典型体现。引导学生思考：在当代，数字技术、AI、新型材料又在以怎样的方式**重新定义**设计的可能性边界？","批注":"","标签":["4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国外","年代":"19世纪上半叶（1814—1824）","排序年":1850,"作品/事件名称":"安格尔《大宫女》与德拉克洛瓦《希阿岛屠杀》——古典与浪漫之争","作者/设计师":"安格尔 / 德拉克洛瓦","来源书目":"《外国美术简史》","简介":"安格尔追求线条的纯粹性与古典理性美，将形视为永恒；德拉克洛瓦则以色彩的激情和现实事件的悲壮感震撼观众。两人代表了西方美术史上理性与感…","原文引用":"——《外国美术简史》/ 第五章 19世纪欧洲美术·第一节 法国新古典主义 / 第二节 法国浪漫主义\n并不妨碍他进行夸张。《大宫女》(图5-4)通过 拉长人体、加强线条流动感和近似平涂的笔法， 创造出接近东方美的新趣味。《泉》、《土耳其浴 室》那富有音乐感的无数圆的配合使我们体会到 他的格言：“在一切形中，最美的是圆形。”安格 尔自始至终地追求着理想化的美，使用具有生命 的线，留下了卓越千古的素描《斯特马蒂一家》，《小提琴家帕格尼尼》。他的油画肖像也是略施 明暗，主要靠高超的亮部造型，突出人物的个性。","教学分析":"安格尔追求**线条的纯粹性**与**古典理性美**，将形视为永恒；德拉克洛瓦则以**色彩的激情**和现实事件的悲壮感震撼观众。两人代表了西方美术史上**理性与感性、古典与浪漫**的二元对立。这一论争不只是风格之争，更是关于**艺术语言何者更具本质性**的哲学分歧。教师可让学生对比两幅画的构图与用色，讨论：**线条主导**与**色彩主导**各如何影响观者的感受与判断？","批注":"","标签":["1.2 二元与多元"],"image":"","link":"","importance":0},{"类别":"国外","年代":"19世纪末—20世纪初","排序年":1850,"作品/事件名称":"后印象主义——从具象写实到结构抽象的转折","作者/设计师":"塞尚、凡高、高更 → 毕加索、马蒂斯","来源书目":"《外国美术简史》","简介":"后印象主义从本质上是对印象主义对光色客观再现的否定，转而强调主观结构、色彩情感与装饰节奏。塞尚的画面结构启发了立体主义，凡高和高更的色彩…","原文引用":"——《外国美术简史》/ 第五章 19世纪欧洲美术·第四节 后印象主义\n注重线的作用。后印象主义画家们的艺术探索 和追求从本质上说是对印象主义的否定，所以 林风眠曾经将它译成“反印象主义” o后印象主 义直接影响了 20世纪初法国画坛几乎同时出现 的两大新思潮：注重画面结构的立体主义（受塞 尚的启发）和注重色彩、线条动力与节奏的野兽 主义（受凡高和高更的影响）。","教学分析":"后印象主义从本质上是对印象主义**对光色客观再现**的否定，转而强调**主观结构、色彩情感与装饰节奏**。塞尚的画面结构启发了**立体主义**，凡高和高更的色彩动力孕育了**野兽主义**——两者都走向了对**具象写实**的解构。这条线索说明：**抽象**并非凭空涌现，而是在具象传统内部矛盾积累到极点后的**历史性突破**。教师可让学生比较塞尚的苹果与荷兰静物画的异同，讨论：何时形式本身成为**内容**？","批注":"","标签":["1.4 具象与抽象"],"image":"","link":"","importance":0},{"类别":"国外","年代":"19世纪下半叶","排序年":1850,"作品/事件名称":"日本浮世绘与英国风景画影响法国印象主义的兴起","作者/设计师":"莫奈、马奈等（受日本浮世绘影响的法国画家）","来源书目":"《外国美术简史》","简介":"印象主义的诞生并非单一法国内部的演化，而是日本浮世绘版画（平面轮廓、非线性透视、色块对比）与英国风景画（光色探索）共同汇入法国画坛的产物。这是*…","原文引用":"——《外国美术简史》/ 第五章 19世纪欧洲美术·概况\n本浮世绘版画的表现手法，以及英国风景画在光和色彩方面的探索成 果，推动了法国画风的变革，促进了印象主义的产生。在19世纪，美国 的美术开始向欧洲的潮流靠拢，而俄国的批判现实主义美术和文学、 音乐一样在世界艺坛上独树一帜，大放异彩。19世纪西方美术的大趋 势是从反映社会生活、推动社会变革到反映市民的世俗趣味，从崇高 走向平凡，从严肃走向轻4公。艺术家们更关注艺术语言的表现力，更关 注形式美感，反叛学院和古典的思潮逐渐兴起。到19世纪最后30年， 美术领域中更重视语言的表现性、象征性和抽象性，关注夸张、变形 美和装饰性效果。","教学分析":"印象主义的诞生并非单一法国内部的演化，而是**日本浮世绘版画**（平面轮廓、非线性透视、色块对比）与**英国风景画**（光色探索）共同汇入法国画坛的产物。这是**异域视觉经验激活本土艺术革命**的典范。教师可问：欧洲画家在学习日本版画时，是否理解了它的文化语境？**去语境化的借鉴**与**文化理解基础上的交融**是否不同？这一案例对今天的**跨文化设计借鉴**有何启示？","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国外","年代":"19世纪","排序年":1850,"作品/事件名称":"19世纪东欧民族画派——在地性叙事对抗文化同质化","作者/设计师":"（东欧各国民族主义画家群体）","来源书目":"《外国美术简史》","简介":"19世纪东欧各国在法国学院派主导的欧洲艺术体系下，却以民族独立历史、下层民众生活、地方自然景观为核心主题，有意识地构建本土视觉叙事。历史画歌颂民…","原文引用":"——《外国美术简史》/ 第五章 19世纪欧洲美术·第十一节 19世纪东欧美术\n生命。正是由于这些原因，东欧各国的历史画、 肖像画、风俗画、风景画特别发达。在历史画中 主要是歌颂民族独立的历史，以此激发民众的 自豪感和爱国主义精神。在肖像画中主要是表现 一些具有先进思想的知识分子和其他优秀人物， 很少画帝王将相、达官贵人。在风俗画中主要是 展示下层民众特别是农民的生活状况，这些作 品往往具有批判的色彩。在风景画里主要是描 绘富有地方特色的大自然美景，作品中寄托着作术、工业设计也产生了影响。“构成主义”雕塑 家主要以塔特林(B. TaTJiHH, 1885-1953),佩 夫斯纳(A. FIeB3Hep, 1885-1953)、加博(H. ra6o, 1890-1977)为代表。“构成主义”艺术在 俄国的影响非常深远，成为苏联工业设计的主 要思潮，在建筑领域中也产生了重要的构成主义 建筑流派。","教学分析":"19世纪东欧各国在法国学院派主导的欧洲艺术体系下，却以**民族独立历史、下层民众生活、地方自然景观**为核心主题，有意识地构建**本土视觉叙事**。历史画歌颂民族独立，风俗画展示农民生活，风景画寄托乡土情感——这套体系正是对**文化全球化浪潮的在地性抵抗**。教师可引导：当今非西方设计师在面对国际主义风格时的在地性策略，与19世纪东欧画家的选择有何结构性相似？**在地性**是保守还是创新？","批注":"","标签":["5.2 全球化与在地性"],"image":"","link":"","importance":0},{"类别":"国外","年代":"19世纪下半叶","排序年":1850,"作品/事件名称":"莫里斯对【诚挚设计】的追求——工业物质与精神诚实的冲突","作者/设计师":"威廉·莫里斯（William Morris）","来源书目":"《世界现代设计史》","简介":"莫里斯拒绝工业化不只因为其丑陋，更因为机械化生产从根本上丧失了设计的精神诚挚性。在他看来，哥特式与中世纪设计【真正诚挚】，因为工匠与物品之间存在真实…","原文引用":"——《世界现代设计史》/ 第三章 工艺美术运动\n莫里斯是一位重要的设计先驱，但严格而言，他并不是现代设计的奠基人。因为他的探索重点恰恰是要取消工业化造成的“恶果”，恰恰是要否定现代设计赖以依存的基础——大工业化和批量化机械生产。他一方面否定机械化、工业化风格；另一方面也否定装饰过度的维多利亚风格。他认为只有哥特式、中世纪的设计才是真正“诚挚”的设计。其他的设计风格如果不是丑陋的，也是矫揉造作的、不真实的，因而应该否定，推翻。他认为只有复兴哥特风格和中世纪的行会精神，才可能在工业化咄咄逼人、矫饰风格横行霸道的时刻挽救设计的精神，保持民族的、民俗的、高品位的设计；在设计中，唯有中世纪的、哥特的、自然的这三个来源可以依赖。从这一点来说，他是在设计实践中，真正将英国艺术理论家拉斯金关于设计的理论思想付诸实践的第一人。","教学分析":"莫里斯拒绝工业化不只因为其丑陋，更因为机械化生产从根本上丧失了**设计的精神诚挚性**。在他看来，哥特式与中世纪设计【真正诚挚】，因为工匠与物品之间存在**真实的非物质联系**——劳动的意义、个人的情感、材料的本性。工业化使物品成为纯粹**物质的产品**，切断了设计作为人类精神表达的本质。教师可引导：今天的【手工】文化热是否寻找的是同样的**非物质价值**？**工业品**与**手工品**的本质差异，到底是物质层面的还是精神层面的？","批注":"","标签":["1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国外","年代":"现实主义（19世纪中叶，法国）","排序年":1850,"作品/事件名称":"库尔贝——现实主义宣言","作者/设计师":"古斯塔夫·库尔贝","来源书目":"《外国美术简史》","简介":"彩插-18 画室库尔贝1855　彩插・19 草地上的午餐马奈1863彩插-20 阿尔让特伊的游船莫奈1875　彩插-21 大碗岛星期天的下午修拉1884-1886彩插-22 星夜凡高1889　彩插・23 欧拉纳的玛利亚高更1891　彩插-24 伏尔加河上的纤夫列宾1873彩插・25 红色和谐马蒂斯1908　彩插-26 …","原文引用":"彩插-18 画室库尔贝1855　彩插・19 草地上的午餐马奈1863彩插-20 阿尔让特伊的游船莫奈1875　彩插-21 大碗岛星期天的下午修拉1884-1886彩插-22 星夜凡高1889　彩插・23 欧拉纳的玛利亚高更1891　彩插-24 伏尔加河上的纤夫列宾1873彩插・25 红色和谐马蒂斯1908　彩插-26 亚威农少女毕加索1907卷　彩插-27 呐喊蒙克1893 （上左）彩插-29 女人三阶段克利姆特1905彩插・28 准备简单早餐的天使克利192。（上右）*||　彩插-30 百老汇爵士乐 蒙德里安1942~1943■ ■ ■:：彩插・31 干杯双人像夏加尔1917-1918 （下左）彩插-32 L.H.O.O.Q 杜尚1919 （下右）　彩插-33 记","教学分析":"","批注":"","标签":["1.1 本体与客体","3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国外","年代":"现代（19世纪末—20世纪初，法国）","排序年":1850,"作品/事件名称":"罗丹——雕塑的现代性","作者/设计师":"奥古斯特·罗丹","来源书目":"《外国美术简史》","简介":"是米开朗基罗之后、罗丹之前最有才能的雕刻家 之一。他在创作上很有标新立异和突破传统的勇 气，他曾一再告诫学生既要继承传统，又不要墨 守成规，不要做别人的回声。他有为宗教服务的 一面，是个虔诚的宗教徒，但是在艺术创作上， 他又往往表现出强烈的世俗情结，表明他是一 个热爱生活的人…","原文引用":"是米开朗基罗之后、罗丹之前最有才能的雕刻家 之一。他在创作上很有标新立异和突破传统的勇 气，他曾一再告诫学生既要继承传统，又不要墨 守成规，不要做别人的回声。他有为宗教服务的 一面，是个虔诚的宗教徒，但是在艺术创作上， 他又往往表现出强烈的世俗情结，表明他是一 个热爱生活的人。","教学分析":"","批注":"","标签":["1.1 本体与客体","2.2 继承与创新"],"image":"","link":"","importance":0},{"类别":"国外","年代":"19世纪中叶（英国）","排序年":1850,"作品/事件名称":"约翰·拉斯金的设计思想","作者/设计师":"约翰·拉斯金","来源书目":"《世界现代设计史》","简介":"（二）设计改革的思想基础——拉斯金提出设计革命　英国美术理论家、教育家约翰·拉斯金（John Ruskin, 1819—1900），是最早提出现代设计思想的人物之一。他针对1851年伦敦世界博览会的建筑和展品尖锐地提出批评意见，之后推出了自己关于现代设计的理念，为19世纪末的设计家、建筑家提供了发展的依据和启示。虽然他…","原文引用":"（二）设计改革的思想基础——拉斯金提出设计革命　英国美术理论家、教育家约翰·拉斯金（John Ruskin, 1819—1900），是最早提出现代设计思想的人物之一。他针对1851年伦敦世界博览会的建筑和展品尖锐地提出批评意见，之后推出了自己关于现代设计的理念，为19世纪末的设计家、建筑家提供了发展的依据和启示。虽然他的理论仍有一些明显缺陷，但他所提出的设计应该与艺术区别开来，设计应该成为独立的学科，设计的功能主义立场，设　 计对工业化的承认和接纳等内容，则是设计理论史上的重大突破。","教学分析":"","批注":"","标签":["1.1 本体与客体","1.5 物质与非物质"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1860—1890年代","排序年":1860,"作品/事件名称":"浮世绘与欧洲印象主义陶瓷：日本艺术的西传","作者/设计师":"西多里·德克（Théodore Deck）及欧洲各窑","来源书目":"《外国工艺美术史》","简介":"1860年后日本艺术品大量进入欧洲市场，其平面性构成与对自然的直接描绘深刻影响了法国印象主义，后者甚至被称为「日本流派」。这种跨文明影响直接渗入…","原文引用":"——《外国工艺美术史》/ 第二十一章 近代工艺美术·艺术与工艺运动\n家受日本艺术原理的影响较深，日本艺术是孕育印象主义(Impressionism)①的摇篮，印象主义甚至有时被称为“日本流派”。由于印象主义，一种新型风格在塞弗尔窑产生，其主要声望属于该厂1887—1891年间的艺术主任，法国陶工西多里•德克(Theodore Deck, 1823—1891年)。他的作品在1878年的巴黎博览会特别成功，而　352外国工艺美术史神奈川冲浪里，浮世绘，「1832年①日本江户时期形成的民间风俗画。以表现风景、风俗、人物、戏曲和历史故事为主，为商人和其他中下阶层所喜爱。这种绘画刻成版画，由黑色或红色的单色版发展为多彩套色。有的连续数十幅，形成一大套。“浮世”意即“虚浮的、瞬间即逝的世界”。","教学分析":"1860年后日本艺术品大量进入欧洲市场，其平面性构成与对自然的直接描绘深刻影响了法国印象主义，后者甚至被称为「**日本流派**」。这种**跨文明影响**直接渗入工艺设计：法国塞弗尔窑在艺术主任德克主导下吸收日本美学，1878年巴黎博览会获最高奖。日本**本土**美学（浮世绘、漆器平面感）在**异域**（欧洲）土壤中引发审美革命，而欧洲人对日本艺术的吸收，也反过来推动了日本现代工艺的自我认知。这是**双向文明影响**的典型案例。","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1861—1896年，英国","排序年":1861,"作品/事件名称":"威廉·莫里斯与艺术与工艺运动：手工形式的坚守","作者/设计师":"威廉·莫里斯（William Morris）","来源书目":"《外国工艺美术史》","简介":"莫里斯的四大主张鲜明体现了其形式观：强调手工技能的优越性、中世纪形式的价值、设计师的一贯作业方式。他坚持手工形式的道德优越性，拒绝机械形式——这…","原文引用":"——《外国工艺美术史》/ 第二十一章 近代工艺美术·艺术与工艺运动\n畴；②强调手工操作的优异技能，认为机械生产必然导致产品质量的下降；③强调新的设计形式的建立不应忽视中世纪的价值，认为“人生存在这样丑恶的环境之中决不能构想出美的东西，所以，我们也无法创造出美的作品”；④他还强调“设计制作一贯作业”的方式。认为设计师应该到工场里去实验学习，从而获得正确的材料知识和制作技巧，仅埋首于设计桌只能闭门造车。","教学分析":"莫里斯的四大主张鲜明体现了其**形式观**：强调手工技能的优越性、中世纪形式的价值、设计师的一贯作业方式。他坚持**手工形式**的道德优越性，拒绝机械形式——这是以形式价值对抗功能效率的典型姿态。然而，这一立场导致了深刻的内在矛盾：手工产品成本高昂，只能服务于少数富人，与莫里斯「为大众创造美好环境」的初衷**背道而驰**。这是设计史上**理想与现实、形式信念与功能可及性**之间最著名的悖论之一。","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1861—1896年，英国","排序年":1861,"作品/事件名称":"威廉·莫里斯与艺术与工艺运动：手工形式的坚守","作者/设计师":"威廉·莫里斯（William Morris）","来源书目":"《外国工艺美术史》","简介":"工艺与艺术运动以中世纪手工传统为精神资源，对工业革命所代表的\"当代生产方式\"发出强烈批判。莫里斯的选择并非保守的复古，而是一种以传统为武器对抗当代的…","原文引用":"——《外国工艺美术史》/ 第二十一章 近代工艺美术·艺术与工艺运动\n畴；②强调手工操作的优异技能，认为机械生产必然导致产品质量的下降；③强调新的设计形式的建立不应忽视中世纪的价值，认为“人生存在这样丑恶的环境之中决不能构想出美的东西，所以，我们也无法创造出美的作品”；④他还强调“设计制作一贯作业”的方式。认为设计师应该到工场里去实验学习，从而获得正确的材料知识和制作技巧，仅埋首于设计桌只能闭门造车。","教学分析":"工艺与艺术运动以**中世纪手工传统**为精神资源，对工业革命所代表的\"当代生产方式\"发出强烈批判。莫里斯的选择并非保守的复古，而是一种**以传统为武器对抗当代的策略性姿态**：手工劳动被赋予道德与美学的双重优越性，机械生产被视为剥夺了工人与物品之间的人道关系。教师可引导：当代设计中的**手工复兴浪潮**（手作咖啡、手工皮具、独立家具）是否重演了同样的逻辑？对\"当代\"的抗拒是否可能成为一种设计语言？","批注":"","标签":["2.1 传统与当代"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1870—1923年","排序年":1870,"作品/事件名称":"俄罗斯巡回画派——艺术主动服务人民的宣言","作者/设计师":"列宾、苏里科夫、克拉姆斯科伊等","来源书目":"《外国美术简史》","简介":"巡回画派明确以别林斯基、车尔尼雪夫斯基的民主主义美学为纲领，在全俄举办近50次巡回展览，将艺术带出宫廷和贵族客厅，送进普通民众面前。他们反映人民生活…","原文引用":"——《外国美术简史》/ 第五章 19世纪欧洲美术·第十节 18—19世纪俄罗斯美术\n会”，简称巡回画派。该组织在创建之初有15位 画家在协会章程上签名，其中包括佩罗夫、克 拉姆斯科伊、米*索耶多夫、萨夫拉索夫、希 什金、盖依等人:在1870年至1923年的半个世 纪的时间里，巡回画派遵循别林斯基、车尔尼 雪夫斯基等人的美学主张，在俄国各地举办了 近50次巡回展览。画家们站在民主主义的立场 上，反映人民生活、历史事件和俄罗斯美丽的 大自然。列宾、苏里科夫、瓦斯涅佐夫、谢罗夫成为巡回画派的中坚力量，著名艺术评论家斯 塔索夫(B. CracoB, 1824-1906)是巡回画派的 有力支持者。富有的企业家、艺术收藏家特列恰 科夫(FI. TpeTbHKOB , 1832~1898)几乎从巡回 画派开始活动起，就立志要为进步的民族艺术 画廊奠基。1892年他把全部艺术收藏赠给他的 故乡莫斯科，今天，莫斯科的特列恰科夫画廊即 是以他的捐赠为基础而建立的。克拉姆斯科伊 (K. KpaMCKOfi, 1837〜1887)是巡回画派的组 织者和思想领导。还在彼得堡美术学院学习的 时候，他就成为民主和民族艺术的热烈追随者 们的中心人物。他的早期作品《荒野中的基督》(1872)表达出巡回画派的启蒙主义思想。与巡 回画派创作主流略显不同的是，克拉姆斯科伊 没有直接描绘社会贫穷现象，而是把注意力放 在刻画当代人的心理世界方面。在他看来，艺术 应该体现思想性，因此他的许多画作构思来自 文学作品的启示，其代表作有《月夜》(1880)、《无名女郎》(图5-60)、《悲痛》(1884)等。","教学分析":"巡回画派明确以**别林斯基、车尔尼雪夫斯基**的民主主义美学为纲领，在全俄举办近50次巡回展览，将艺术带出宫廷和贵族客厅，送进普通民众面前。他们反映**人民生活、历史事件与俄罗斯自然**，艺术收藏家特列恰科夫将收藏捐给莫斯科市——这一系列行动共同构成**艺术服务于谁**的有力回答。教师可对比同时期法国沙龙制度：两者在资助机制、展览形式、题材选择上如何体现了不同的**艺术服务对象**？","批注":"","标签":["3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1870—1923年","排序年":1870,"作品/事件名称":" 读到的一本设计史是日本设计家胜见胜（日文假名读音：かつみ まさ…","原文引用":"运动，具体时间是19世纪60年代。之后历经了“新艺术”（Art Nouveau, 1890—1910）、现代主义的演进。他的这种时间划分方式，特别是更替形式的论述，对后来的建筑史、设计史的论述有很大的影响，后面多位理论家都采用了这种理论阐述的模式。记得我较早读到的一本设计史是日本设计家胜见胜（日文假名读音：かつみ まさる　 ，Katsumi Masaru, 1909—1983）著的《设计运动一百年》，而稍微晚一点读的西格佛列德·吉迪翁（Sigried Giedion, 1888—1968）的《空间、时间和建筑》（Space Time and Architecture: The Growth of a New Tradition　 ），也是遵循这个线性模式的。胜见胜和吉迪翁都在书中提到了佩夫斯奈的观点。因此，如果说佩夫斯奈最早奠定了建筑史、设计史中的线性发展模式，应该不会有太大的差错。","教学分析":"","批注":"","标签":["4.1 形式与功能","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国外","年代":"现代主义建筑（1920—50年代）","排序年":1900,"作品/事件名称":"勒·柯布西耶——机器美学与居住机器","作者/设计师":"勒·柯布西耶","来源书目":"《世界现代设计史》","简介":"书原来基本以产品设计史为框架，因此最初叫作《世界工业设计史》，但是因为产品设计的发展和现代建筑的发展有千丝万缕的联系，并且早期的工业产品是现代建筑家设计的，勒·柯布西耶（Le Corbusier，原名Charles-Édouard Jeanneret-Gris, 1887—1965）、密斯·凡·德·洛（Ludwig M…","原文引用":"书原来基本以产品设计史为框架，因此最初叫作《世界工业设计史》，但是因为产品设计的发展和现代建筑的发展有千丝万缕的联系，并且早期的工业产品是现代建筑家设计的，勒·柯布西耶（Le Corbusier，原名Charles-Édouard Jeanneret-Gris, 1887—1965）、密斯·凡·德·洛（Ludwig Mies van der Rohe, 1886—1969）都设计过家具和其他产品，所以后来在改为《世界现代设计史》的时候稍微补充了一点现代建筑设计的背景，也略微补充了一点平面设计的内容。2012年11月，《世界现代建筑史》第二版已经在中国建筑工业出版社出版了，那本书140万字，比较详尽，因此在目前这本《世界现代设计史》中就没有必要兼顾太多建筑发展的背景；而《世界平面设计史》也已出版多年，目前亦在着手改写第二版，因此平面设计的内容也无须在产品设计史中占太多的位置，所以，对这些内容均做了大幅度的删减。这本新版的《世界现代设计史》，基本是以工业产品设计为主导的。","教学分析":"","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"斯堪的纳维亚现代设计（1950—60年代）","排序年":1900,"作品/事件名称":"阿纳·雅各布森——丹麦现代设计","作者/设计师":"阿纳·雅各布森","来源书目":"《世界现代设计史》","简介":"自那以后，与其他地区相比，丹麦、芬兰、挪威和瑞典创造出更多的设计经典来。从拼装积木LEGO到阿纳·雅各布森（Arne Jacobsen, 1902—1971，丹麦建筑师、设计师）的椅子，斯堪的纳维亚设计师们将极简主义转化为一种消费者可以负担得起的、有用的、受人欢迎的风格…","原文引用":"自那以后，与其他地区相比，丹麦、芬兰、挪威和瑞典创造出更多的设计经典来。从拼装积木LEGO到阿纳·雅各布森（Arne Jacobsen, 1902—1971，丹麦建筑师、设计师）的椅子，斯堪的纳维亚设计师们将极简主义转化为一种消费者可以负担得起的、有用的、受人欢迎的风格。","教学分析":"","批注":"","标签":["2.2 继承与创新","4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"野兽主义（1905—1910年，法国）","排序年":1905,"作品/事件名称":"马蒂斯与野兽主义","作者/设计师":"亨利·马蒂斯","来源书目":"《外国美术简史》","简介":"彩插・25 红色和谐马蒂斯1908　彩插-26 亚威农少女毕加索1907卷　彩插-27 呐喊蒙克1893 （上左）彩 —冷漠、几何、非人格化——与维多利亚时代的过度装饰形成了现代设计史上最尖锐的**二元对立**。这不只是审美偏好之争，而是两种设计哲学的根本分歧：**理性/功能/工业化**对阵**感性/装饰/手工性**。乌尔姆设计学院进一步强化了理性主义一极，而后现代主义则是对这种极端理性的强烈反弹。教师可引导：包豪斯的【非人格化】究竟是设计的进步还是对人性的压抑？这个争论在当代**简约主义**（苹果、无印良品）中以何种方式延续？","批注":"","标签":["1.2 二元与多元"],"image":"","link":"","importance":0},{"类别":"国外","年代":"装饰艺术（1920—1940年代）","排序年":1920,"作品/事件名称":"装饰艺术（Art Deco）","作者/设计师":"","来源书目":"《外国工艺美术史》","简介":"本书为高等院校艺术设计、工艺美术、装饰艺术专业的教材。著者以外国由古至今的石、陶瓷、玻璃、竹木、染织、金属、漆、牙玉等工艺美术的发展为主线，全面而系统地阐述了原始社会至20世纪9()年代各历史时期工艺美术在生产、发展过程中形成的各种艺术风格及其特征，包括以地中海区域文明为源头的欧洲工艺美术，古代大洋洲、美洲、非洲、古埃…","原文引用":"本书为高等院校艺术设计、工艺美术、装饰艺术专业的教材。著者以外国由古至今的石、陶瓷、玻璃、竹木、染织、金属、漆、牙玉等工艺美术的发展为主线，全面而系统地阐述了原始社会至20世纪9()年代各历史时期工艺美术在生产、发展过程中形成的各种艺术风格及其特征，包括以地中海区域文明为源头的欧洲工艺美术，古代大洋洲、美洲、非洲、古埃及、两河流域、波斯、印度、古伊斯兰、日本等国家和地区的工艺美术。","教学分析":"","批注":"","标签":["1.2 二元与多元","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1929—1930年代","排序年":1929,"作品/事件名称":"大萧条时代的新材料革命——塑料、镀铬与批量化设计的兴起","作者/设计师":"美国工业设计师群体","来源书目":"《世界现代设计史》","简介":"大萧条之后，经济压力推动设计转向新兴低成本材料：胶合板、镀铬铁材、塑料（酚醛塑料卡塔林等），这些材料因其易于仿真、适合批量化机械生产的特性，重新…","原文引用":"——《世界现代设计史》/ 第九章 美国现代设计·流线型设计\n1929年华尔街金融业崩溃引发了美国经济的大萧条，对奢华设计而言，是一个沉重的打击，但同时也开辟了另一个新的商机，更加提升了民众对那些价格实惠的日用消费品，那些符合现代机械美学观念、可以用现代的机械化方式进行批量生产的价廉物美产品的需求。因而，玻璃、胶合板、镀铬铁材、黑胶木和卡塔林（Catalin，一种铸塑酚醛塑料）等新兴塑料，由于适用性强、易于仿真（例如仿玳瑁、仿大理石等）、便于机械化批量化生产，也得到更加广泛的运用。","教学分析":"大萧条之后，经济压力推动设计转向**新兴低成本材料**：胶合板、镀铬铁材、塑料（酚醛塑料卡塔林等），这些材料因其**易于仿真、适合批量化机械生产**的特性，重新定义了日用品的视觉可能性。**媒介决定内容**：新材料带来了新的美学——流线型、光滑、反光、可模仿天然纹理——这些美学特征并非凭空而来，而是材料属性的直接呈现。教师可问：今天3D打印和碳纤维等**新媒介**正在以何种方式【决定】当代设计的形态可能性？","批注":"","标签":["4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国外","年代":"流线型（1930—40年代，美国）","排序年":1930,"作品/事件名称":"流线型设计——速度美学与大萧条","作者/设计师":"诺曼·贝尔·格迪斯","来源书目":"《世界现代设计史》","简介":"不仅是一种单纯的设计风格。和“新艺术”运动一样，它包括的范围相当广泛，从1920年代的色彩鲜艳的所谓“爵士”图案（Jazz Patterns），到1930年代的流线型设计式样，从简单的英国化妆品包装到美国纽约洛克菲勒中心的建筑群，都是属于这场运动的。它们之间虽有共性，但是个性更加强烈，因此，把“装饰艺术”单纯看作一种统…","原文引用":"不仅是一种单纯的设计风格。和“新艺术”运动一样，它包括的范围相当广泛，从1920年代的色彩鲜艳的所谓“爵士”图案（Jazz Patterns），到1930年代的流线型设计式样，从简单的英国化妆品包装到美国纽约洛克菲勒中心的建筑群，都是属于这场运动的。它们之间虽有共性，但是个性更加强烈，因此，把“装饰艺术”单纯看作一种统一的设计风格显然是不恰当的。","教学分析":"","批注":"","标签":["4.1 形式与功能","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1940—1960年代","排序年":1940,"作品/事件名称":"国际主义风格的形成——包豪斯欧洲体系与美国商业主义的混合","作者/设计师":"格罗皮乌斯、米斯·凡·德·罗等及美国设计师","来源书目":"《世界现代设计史》","简介":"包豪斯欧洲体系与美国商业主义的相遇，产生了一个复杂混合体：精神内核减弱，形式成分加大，商业味道强烈。这揭示了跨文化设计传播的普遍规律——本土文化…","原文引用":"——《世界现代设计史》/ 第十章 战后国际主义设计\n从长远的思想影响来看，包豪斯奠定了现代主义设计的观念基础，建立了现代主义设计的欧洲体系原则，比较完整地奠定了以观念为中心、以解决问题为中心的设计体系。从而与当时以美国为中心的，重视改变外形、强调商业效益的所谓“改形设计”，或者称为“式样改变设计”（styling）形成了现代设计当中两个非常不同的、战后被称为“欧洲设计体系”和“美国设计体系”的两种对立体系。二战中，包豪斯大批人员，包括它的主要领导人物移居美国，又把包豪斯体系的部分内容与美国的体系相结合，形成战后美国版本的“国际主义风格”，对世界各国造成更大影响。这种混合，形成了一个非常复杂的综合体，精神的内容减弱、形式的成分加大、商业主义味道强烈、理想主义内核消退——因此，国际主义设计不但引起理论界的批判，同时也造成了设计界的普遍反感，这些因素最终引发了1970年前后开始的“后现代主义设计运动”。但是，从后现代主义运动的发起、发展来看，也是基于和针对源于包豪斯的某些原则因素的。从本质来说，后现代主义是对现代主义的一个批判结果，它的起源依然可以上溯到包豪斯时期的一些思想和设计实践。包豪斯的影响一直没有消失，它不但依然存在、继续影响设计的发展，同时还有可能产生出新的衍生内容来。因此，对于包豪斯的研究，不但具有深刻的历史意义，同时也具有重要的现实指导意义。","教学分析":"包豪斯欧洲体系与美国商业主义的相遇，产生了一个复杂混合体：**精神内核减弱，形式成分加大，商业味道强烈**。这揭示了跨文化设计传播的普遍规律——**本土文化**（欧洲理性主义）在异域生根时，往往经历【稀释与变形】：美国的市场逻辑过滤掉了包豪斯的社会理想主义，保留了其视觉风格外壳。教师可引导：这种【去语境化传播】是否是所有**本土→异域**文化迁移的宿命？中国今天的设计教育中，有哪些被引入的西方设计概念同样经历了【空洞化】？","批注":"","标签":["5.1 本土与异域"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪后半期","排序年":1950,"作品/事件名称":"挪威现代染织工艺的「新传统主义」","作者/设计师":"艾丽诺·芙洛、凯琳·薇瑟尔等挪威工艺家","来源书目":"《外国工艺美术史》","简介":"挪威现代工艺家面对全球化压力，选择了「新传统主义」路径：既吸收东方（折纸、型染、扎染）等全球工艺技法的养分，又深耕挪威本土古代手工艺传统，将两者融合为*…","原文引用":"——《外国工艺美术史》/ 第二十二章 现代工艺美术·挪威现代工艺\n探索和考察来寻求艺术表现手法，其中几位受东方艺术折纸、型染以及扎染手工艺的影响，对染色和打褶工艺颇感兴趣。其他工艺家则对挪威独特的手工艺传统大胆创新，将当代创新思想与古代手工艺完美地结合在一起，被人们称之为“新传统主义”。","教学分析":"挪威现代工艺家面对全球化压力，选择了「**新传统主义**」路径：既吸收东方（折纸、型染、扎染）等全球工艺技法的养分，又深耕挪威本土古代手工艺传统，将两者融合为**具有本土身份**的当代设计语言。这是**全球化与在地性**张力下的一种创造性平衡策略——不是拒绝全球，也不是放弃本土，而是以本土为根、以全球为养分，创造出**既当代又在地**的新形式。引导学生讨论：在全球化语境中，一个设计师/设计机构如何同时保持**国际对话能力**与**本土文化根性**？","批注":"","标签":["5.2 全球化与在地性"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪下半叶—21世纪","排序年":1950,"作品/事件名称":"北欧设计的民族性现代化——内涵继承而非形式照搬","作者/设计师":"（北欧设计师群体）","来源书目":"《世界现代设计史》","简介":"北欧设计在继承上走了一条特殊路径：不照搬民族传统形式，而是将民族的审美内涵——人情味、自然材料、简洁节制——注入现代结构与功能之中。这与照搬传统…","原文引用":"——《世界现代设计史》/ 第十二章 战后现代设计·斯堪的纳维亚设计\n现代设计针对地方特点、民族文脉的发展在过去的20年中有了很大的发展。既具有现代的结构、功能，同时具有地方特点、民族特点的设计，形成具有民族性的现代设计。这种探索由来已久，到21世纪也依然是一个很引人注目的探索和设计方向。这种探索有两个方向：第一，体现一个民族审美习惯的现代设计，比如日本设计的紧凑、多功能、简洁，北欧设计的人情味和使用自然材料，这一类设计并没有沿用民族传统形式，而是在新设计中突出民族审美的内涵；第二，吸收一些民族传统形式而设计的现代作品，包括产品设计、建筑设计、平面设计等等。后面这类国内有人称之为“现代中式”，或者“中式现代”等等，这类型的词在西方建筑界的称谓也比较多，并没有达到约定俗成的水平，有人称之为“地方主义”“本土主义”，是英语中的“regionalism”“localism”的翻译，指的是现代设计上吸收本地的、民族的、民俗的风格，使现代设计中体　 现出地方特色来。这种设计上的主张，早在战后的日本现代建筑中已经得到体现，丹下健三的香川会所的设计，已经部分地吸收了日本当地的民族建筑动机，地方主义不等于地方、传统的仿古、复旧，地方主义依然是现代设计的组成部分，在功能上、在构造上都遵循现代的标准和需求，仅仅在形式上部分吸收传统的动机而已。","教学分析":"北欧设计在**继承**上走了一条特殊路径：不照搬民族传统形式，而是将民族的**审美内涵**——人情味、自然材料、简洁节制——注入现代结构与功能之中。这与照搬传统纹样的【民族化】截然不同：前者是**精神与价值观层面的继承**，后者是形式层面的挪用。这对理解【继承与创新】的真正含义极具启发：**创新可以不改变审美基因，传统可以不保留视觉形态**。教师可让学生分析宜家（IKEA）设计中哪些是【北欧性】，哪些是**全球化的妥协**？","批注":"","标签":["2.2 继承与创新"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪初—1939年","排序年":1950,"作品/事件名称":"美国家具工业的大众市场转向——批量化生产与民主化设计","作者/设计师":"美国家具工业（里奥·吉拉涅克等）","来源书目":"《世界现代设计史》","简介":"美国家具行业率先明确面向大众市场的方向，机械化批量生产使现代风格的优质设计进入普通家庭。这是设计史上精英品质民主化的重要节点——此前，现代风格家…","原文引用":"——《世界现代设计史》/ 第九章 美国现代设计·家具设计\n美国家具行业很早就明确了面向大众市场的方向，美国家具设计师、美国家具名人堂成员里奥·吉拉涅克（Leo Jiranek, 1900—1990）1939年接受“家具世界杂志”（Furniture World Magazine）采访的时候，就曾指出，未来的家具必定是为大众设计和制造的，在设计过程中必须考虑到批量化的生产。现代风格必然在批量生产的家具中占据重要地位，但传统风格并不会消失，只是要放弃一些过于精致的雕刻和装饰，根据现代生活空间加以简化、重新设定尺寸和比例……（*1　 ）美国家具行业早在20世纪初已经率先于世界各国而采用大批量机械化生产的方式。","教学分析":"美国家具行业率先明确**面向大众市场**的方向，机械化批量生产使现代风格的优质设计进入普通家庭。这是设计史上**精英品质民主化**的重要节点——此前，现代风格家具是少数精英的专属，批量化打破了这一壁垒。但王受之同时指出，批量化也迫使设计【放弃过于精致的雕刻和装饰】，意味着**大众化必然伴随某种质量的降格**。教师可引导：**设计的民主化**是否必然以设计的**简化**为代价？IKEA与定制家具之间的张力如何回应这一问题？","批注":"","标签":["3.1 精英与大众"],"image":"","link":"","importance":0},{"类别":"国外","年代":"1950—1980年代","排序年":1950,"作品/事件名称":"博朗公司产品设计——人体工程学作为设计的科学基础","作者/设计师":"迪特·拉姆斯（Dieter Rams）及博朗设计团队","来源书目":"《世界现代设计史》","简介":"博朗公司的成功核心之一是对人体工学因素的系统重视：产品不只是视觉美观，更是基于使用者手部尺寸、操作习惯、感知规律的科学设计。这将设计从直觉美学推…","原文引用":"——《世界现代设计史》/ 第十一章 德国战后设计·博朗公司\n该公司是由德国工程师马克斯·布劳恩（Max Braun，？—1951）1921年在法兰克福创建的，起初只是生产收音机零件，从1929年开始，生产整机无线电收音机。之后种类越来越多。公司在第二次世界大战中几乎被夷为平地，于1945年重建，除了继续生产公司传统强项产品收音机、录音机和Hi-Fi音响组合之外，在1950年代生产出第一款电动剃须刀S50，并以此作为1960年代里公司的主打产品。这个阶段里开发出来的各种家庭厨房用具，如电咖啡具、果汁机、食物搅拌器等相继在国际市场上获得成功。进入1970年代，公司又增添了电动吹风机等美发、美容用具，对于人体工学因素的重视令这些产品好用好看，深受消费者欢迎。1980年代里，电子钟表、个人用计算器等成为公司产品目录中新的生力军。从1950年代开始，公司已经逐步建立起世界性的声誉，其产品被纽约现代艺术博物馆等多家重要博物馆收藏。","教学分析":"博朗公司的成功核心之一是对**人体工学因素**的系统重视：产品不只是视觉美观，更是基于使用者手部尺寸、操作习惯、感知规律的**科学设计**。这将设计从直觉美学推向**实证科学**的范畴。人体工程学综合了心理学、生理学、工程学、统计学等多学科——是**艺术与科学交汇**在设计领域的最具体实践。教师可让学生拿起任何一件博朗产品（或现代鼠标/键盘），分析哪些细节体现了**人体测量**与**操作逻辑**的科学推导？","批注":"","标签":["4.2 艺术与科学"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪（1930年代至今）","排序年":1950,"作品/事件名称":"北欧斯堪的纳维亚现代工艺","作者/设计师":"","来源书目":"《外国工艺美术史》","简介":"北欧工艺设计以芬兰玻璃、丹麦银器为代表，将工艺传统与现代功能主义结合，形成\"民主设计\"风格，是传统与当代成功融合的典范。","原文引用":"","教学分析":"","批注":"","标签":["2.2 继承与创新","5.2 全球化与在地性"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪初（1907—1914年，德国）","排序年":1950,"作品/事件名称":"彼得·贝伦斯与AEG——首位工业设计师","作者/设计师":"彼得·贝伦斯","来源书目":"《世界现代设计史》","简介":"产阶级圈子里相当风行。Ashbee, 1863—1942）、查尔斯·马金托什（Charles Rennie Mackintosh, 1868—1928）、彼得·贝伦斯（Peter Behrens, 1868—1940）、德国工业同盟（the Werkbund）、维也纳工作坊（the Wiener Werkstätte）…","原文引用":"产阶级圈子里相当风行。Ashbee, 1863—1942）、查尔斯·马金托什（Charles Rennie Mackintosh, 1868—1928）、彼得·贝伦斯（Peter Behrens, 1868—1940）、德国工业同盟（the Werkbund）、维也纳工作坊（the Wiener Werkstätte），以及包豪斯（the Bauhaus）等设计先驱们。","教学分析":"","批注":"","标签":["4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪中叶（1930—60年代，美国）","排序年":1950,"作品/事件名称":"雷蒙德·罗维——美国商业设计的奠基人","作者/设计师":"雷蒙德·罗维","来源书目":"《世界现代设计史》","简介":"皮乌斯（Walter Adolph Georg Gropius, 1883—1969）设计了德绍包豪斯的门把手，勒·柯布西耶设计了一系列椅子，美国设计师雷蒙德·罗维（Raymond Loewy, 1893—1986）的设计，则从住宅、火车、协和式飞机内舱和用具、汽水瓶开始，到标志、广告、插图、服装，无所不包。因而，要严…","原文引用":"皮乌斯（Walter Adolph Georg Gropius, 1883—1969）设计了德绍包豪斯的门把手，勒·柯布西耶设计了一系列椅子，美国设计师雷蒙德·罗维（Raymond Loewy, 1893—1986）的设计，则从住宅、火车、协和式飞机内舱和用具、汽水瓶开始，到标志、广告、插图、服装，无所不包。因而，要严格地把建筑史和设计史分割开来并不容易。现代建筑和现代产品、现代平面之间有许多重叠的部分，也有许多出于同一批人、同一个运动的情况。因此，一本现代设计史很难不谈及建筑的运动和流派，但是，建筑和产品又有巨大的差异。即便同在现代设计范畴内，产品和平面设计的设计内容、设计手法也大相径庭。我写的《世界现代设计史》的几个初期版本（包括1996年、2000年两个版本在内）中，对于把握建筑阐述、产品阐述、平面设计阐述之间　 的平衡关系，并不是十分理想。比如在讨论后现代主义的时候，建筑所占的比例过大，而产品设计仅仅点到而已，平面设计则几乎没有讨论。在西","教学分析":"","批注":"","标签":["3.1 精英与大众","4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪中叶（1940—70年代，美国）","排序年":1950,"作品/事件名称":"查尔斯与蕾·伊姆斯——民主设计的实践","作者/设计师":"查尔斯·伊姆斯；蕾·伊姆斯","来源书目":"《世界现代设计史》","简介":"伊姆斯夫妇设计的模压塑料摇椅。　伊姆斯夫妇设计的休闲椅，（1956）…","原文引用":"伊姆斯夫妇设计的模压塑料摇椅。　伊姆斯夫妇设计的休闲椅，（1956）。","教学分析":"","批注":"","标签":["3.1 精英与大众","4.3 媒介、材料与内容"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪末至今","排序年":1950,"作品/事件名称":"绿色设计与可持续设计","作者/设计师":"","来源书目":"《世界现代设计史》","简介":"的审美价值水平急剧下降。在这个背景下，追求简洁、朴实、极限主义形式的新现代主义，探索性很强的解构主义，出于环境保护、可持续性生态设计（eco-design）、“绿色设计”（green design）的，讲究为所有人服务的“全设计”都提到议事日程上来了…","原文引用":"的审美价值水平急剧下降。在这个背景下，追求简洁、朴实、极限主义形式的新现代主义，探索性很强的解构主义，出于环境保护、可持续性生态设计（eco-design）、“绿色设计”（green design）的，讲究为所有人服务的“全设计”都提到议事日程上来了。","教学分析":"","批注":"","标签":["3.2 服务于谁"],"image":"","link":"","importance":0},{"类别":"国外","年代":"20世纪下半叶（1950—80年代，日本）","排序年":1950,"作品/事件名称":"索尼公司与日本工业设计崛起","作者/设计师":"索尼公司","来源书目":"《世界现代设计史》","简介":"时的设计活动的新的灵感源泉。自从18世纪以来，特别是19世纪期间，欧洲在世界考古上有很大的进步，考古学家深入到世界各个角落，研究人类的起源和人类文明的发展，从探索尼罗河流域的文明到考察美索不达米亚的灿烂过去，从戈壁滩到帕米尔高原，从安第斯山的南美洲印第安文化遗迹到记录了欧洲史前文明的法国和西班牙的洞穴壁画，到处都留下了…","原文引用":"时的设计活动的新的灵感源泉。自从18世纪以来，特别是19世纪期间，欧洲在世界考古上有很大的进步，考古学家深入到世界各个角落，研究人类的起源和人类文明的发展，从探索尼罗河流域的文明到考察美索不达米亚的灿烂过去，从戈壁滩到帕米尔高原，从安第斯山的南美洲印第安文化遗迹到记录了欧洲史前文明的法国和西班牙的洞穴壁画，到处都留下了这些考古者的踪迹。欧洲政府大都成立了自己的国家科学院，通过专项资金来资助这些考古和探险活动，取得了重大的成果。通过考古学和人类学的研究，人们对于古代文明有了更加清楚的认识，仅仅就建筑而言，人们所了解的不仅仅是书本上记录的建筑，而且能够通过考古发掘看到真实的古典的　 建筑形式。对意大利庞贝古城的发掘，把罗马的建筑、城市规划、室内设计、园林设计和环境艺术完整地呈现在欧洲人面前。加上大量的古代典籍被发现和翻译，更增加了人们对于古典文明的了解和认识。不少欧洲学者根据这些成果深入研究、撰写著作。他们对于古希腊、托斯坎尼文明的研究，以及随即对于埃及文明、两河流域文明的研究，为学术界和普通民众揭示了西方古典文明的真正根源，给当时的建筑研究提供了一个更加宽泛而深入的基础。在当时掀起的对古","教学分析":"","批注":"","标签":["5.2 全球化与在地性","4.1 形式与功能"],"image":"","link":"","importance":0},{"类别":"国外","年代":"乌尔姆学院（1953—1968年，德国）","排序年":1953,"作品/事件名称":"
